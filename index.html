<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DroneLab Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://skulpt.org/js/skulpt.min.js"></script>
<script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
<style>
/* ── THEME ─────────────────────────────── */
[data-theme=dark]{--bg0:#07090f;--bg1:#0d1117;--bg2:#161b22;--bg3:#21262d;--bdr:#30363d;--txt:#f0f6fc;--sub:#8b949e;--acc:#00e5ff;--acc2:#7c3aed;--grn:#3fb950;--red:#f85149;--yel:#e3b341;--cbg:#0d1117;--cso:#060a0f;--hdr:#010409}
[data-theme=light]{--bg0:#f6f8fa;--bg1:#fff;--bg2:#eaecef;--bg3:#d8dadd;--bdr:#d0d7de;--txt:#1f2328;--sub:#57606a;--acc:#0969da;--acc2:#8250df;--grn:#1a7f37;--red:#cf222e;--yel:#9a6700;--cbg:#fff;--cso:#f6f8fa;--hdr:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--txt);font-family:'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace;font-size:13px;transition:background .25s,color .25s}

/* ── HEADER ──────────────────────────── */
#H{height:44px;display:flex;align-items:center;padding:0 10px;gap:8px;background:var(--hdr);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:100}
#logo{display:flex;align-items:center;gap:7px;text-decoration:none}
#logo-i{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 100%);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 0 12px rgba(0,229,255,.3)}
#logo-t{font-size:14px;font-weight:800;letter-spacing:.3px}
#logo-t b{color:var(--acc)}
.tag{font-size:9px;padding:1px 5px;border-radius:6px;background:linear-gradient(90deg,var(--acc),var(--acc2));color:#fff;font-weight:700;letter-spacing:.8px}
#HTABS{flex:1;display:flex;align-items:center;justify-content:center;gap:2px}
.ht{height:32px;padding:0 12px;border:none;border-radius:5px;background:none;color:var(--sub);font-family:inherit;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:5px}
.ht.on{color:var(--txt);border-bottom-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent)}
.ht:hover:not(.on){color:var(--txt);background:rgba(255,255,255,.06)}
#HR{display:flex;align-items:center;gap:5px}
.hb{height:28px;padding:0 9px;border-radius:5px;border:1px solid var(--bdr);background:var(--bg3);color:var(--txt);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .18s;white-space:nowrap}
.hb:hover{border-color:var(--acc);color:var(--acc)}
#RUN{background:var(--grn);border-color:var(--grn);color:#000;height:30px;padding:0 13px;font-size:12px}
#RUN:hover{filter:brightness(1.12)}
#STP{background:var(--red);border-color:var(--red);color:#fff;height:30px;display:none}
#DOT{width:7px;height:7px;border-radius:50%;background:var(--bg3);flex-shrink:0;transition:all .3s}
#DOT.live{background:var(--grn);box-shadow:0 0 8px var(--grn)}
#DOT.err{background:var(--red);box-shadow:0 0 8px var(--red)}

/* ── LAYOUT ──────────────────────────── */
#MAIN{height:calc(100vh - 44px);display:flex;overflow:hidden}

/* ── SIM PANE ────────────────────────── */
#SP{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg0)}
#STB{display:flex;align-items:center;padding:4px 8px;gap:6px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto}
#STB::-webkit-scrollbar{display:none}
#STB label{font-size:9px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.ss{height:24px;padding:0 6px;border-radius:4px;border:1px solid var(--bdr);background:var(--bg1);color:var(--txt);font-family:inherit;font-size:11px;cursor:pointer;flex-shrink:0}
.ss:hover{border-color:var(--acc)}
.sb{height:24px;padding:0 8px;border-radius:4px;border:1px solid var(--bdr);background:var(--bg1);color:var(--txt);font-family:inherit;font-size:11px;cursor:pointer;flex-shrink:0;white-space:nowrap}
.sb:hover{border-color:var(--acc);color:var(--acc)}
#CVW{flex:1;position:relative;overflow:hidden}
canvas#C{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
canvas#C:active{cursor:grabbing}

/* HUD */
#HUD{position:absolute;top:8px;left:8px;pointer-events:none;display:flex;flex-direction:column;gap:4px}
.hr{display:flex;gap:4px}
.hc{display:flex;align-items:center;gap:4px;background:rgba(7,9,15,.84);border:1px solid rgba(48,54,61,.75);border-radius:5px;padding:3px 8px;backdrop-filter:blur(6px)}
[data-theme=light] .hc{background:rgba(246,248,250,.88);border-color:var(--bdr)}
.hl{font-size:8px;color:var(--sub);letter-spacing:.8px;text-transform:uppercase}
.hv{font-size:11px;font-weight:700;color:var(--acc);min-width:28px}
#HINT{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(139,148,158,.55);pointer-events:none;background:rgba(7,9,15,.55);padding:3px 10px;border-radius:16px;white-space:nowrap}

/* ── SPLITTER ────────────────────────── */
#SPL{width:4px;background:var(--bdr);cursor:col-resize;flex-shrink:0;transition:background .2s;position:relative}
#SPL:hover,#SPL.drag{background:var(--acc)}

/* ── CODE PANE ───────────────────────── */
#CP{width:46%;min-width:200px;display:flex;flex-direction:column;background:var(--cbg);border-left:1px solid var(--bdr)}
#CTB{display:flex;align-items:center;padding:0 8px;height:32px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;gap:5px}
.ct{height:26px;padding:0 10px;font-size:11px;color:var(--sub);border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:4px;border-bottom:2px solid transparent;transition:all .15s}
.ct.on{color:var(--acc);border-bottom-color:var(--acc)}
.cd{width:5px;height:5px;border-radius:50%;background:var(--acc)}
.ct-r{margin-left:auto;display:flex;gap:4px}
.ct-r .hb{height:20px;font-size:10px;padding:0 6px}
#CMW{flex:1;overflow:hidden;min-height:0}
.CodeMirror{height:100%!important;font-size:13px!important;line-height:1.72!important;font-family:inherit!important}
.CodeMirror-scroll{height:100%!important}
[data-theme=dark] .CodeMirror{background:#0d1117!important}
[data-theme=light] .CodeMirror{background:#fff!important}
.CodeMirror-gutters{border-right:1px solid var(--bdr)!important}
[data-theme=dark] .CodeMirror-gutters{background:#0d1117!important}
[data-theme=light] .CodeMirror-gutters{background:#f6f8fa!important}

/* ── CONSOLE ─────────────────────────── */
#CON{height:148px;display:flex;flex-direction:column;border-top:1px solid var(--bdr);flex-shrink:0}
#CONH{display:flex;align-items:center;padding:0 10px;height:26px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;gap:8px}
#CONH span{font-size:10px;color:var(--sub);letter-spacing:.8px;text-transform:uppercase}
#CONH button{margin-left:auto;background:none;border:1px solid var(--bdr);color:var(--sub);padding:1px 7px;font-size:10px;border-radius:4px;cursor:pointer;font-family:inherit}
#CONH button:hover{border-color:var(--acc);color:var(--acc)}
#OUT{flex:1;overflow-y:auto;padding:5px 10px;font-size:12px;line-height:1.75;background:var(--cso)}
#OUT::-webkit-scrollbar{width:3px}
#OUT::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.lo{color:var(--txt)}.lc{color:var(--acc)}.ls{color:var(--grn)}.le{color:var(--red)}.lw{color:var(--yel)}.li{color:#79c0ff}

/* ── MOBILE NAV ──────────────────────── */
#MN{display:none;height:52px;background:var(--hdr);border-top:1px solid var(--bdr);flex-shrink:0}
.mb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--sub);font-family:inherit;cursor:pointer;transition:color .2s;position:relative}
.mb.on{color:var(--acc)}
.mb.on::before{content:'';position:absolute;top:0;left:18%;right:18%;height:2px;background:var(--acc);border-radius:0 0 3px 3px}
.mi{font-size:19px}.ml{font-size:9px;font-weight:700;letter-spacing:.4px}

/* ── RESPONSIVE ──────────────────────── */
@media(max-width:760px){
  #HTABS,.dsk{display:none!important}
  #H{padding:0 8px;gap:6px}
  #logo-t,.tag{display:none}
  #RUN,#STP{padding:0 10px;height:28px;font-size:11px}
  #MAIN{flex-direction:column;height:calc(100vh - 44px - 52px)}
  #SP,#CP{width:100%!important;flex:1;display:none!important;border-left:none}
  #SP.ma,#CP.ma{display:flex!important}
  #SPL{display:none!important}
  #MN{display:flex!important}
  #STB{padding:3px 6px;gap:4px}
  #CON{height:120px}
  #OUT{font-size:11px}
}
@media(min-width:761px){
  #SP{display:flex!important}
  #CP{display:flex!important}
  #MN{display:none!important}
}

/* ── SPLASH ──────────────────────────── */
#SPL2{position:fixed;inset:0;z-index:9999;background:#07090f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;animation:splOut .5s 1.6s ease forwards}
@keyframes splOut{to{opacity:0;visibility:hidden;pointer-events:none}}
.si{font-size:50px;animation:hover 1.4s ease-in-out infinite}
@keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.st{font-size:21px;font-weight:900;letter-spacing:6px;color:#00e5ff}
.ss2{font-size:9px;color:#8b949e;letter-spacing:3px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── DROP OVERLAY ────────────────────── */
#DRP{position:fixed;inset:0;z-index:500;background:rgba(0,229,255,.08);border:3px dashed var(--acc);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--acc);font-size:18px}
#DRP.show{display:flex}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="SPL2">
  <div class="si">🚁</div>
  <div class="st">DRONELAB PRO</div>
  <div class="ss2">LOADING SIMULATION ENGINE...</div>
</div>

<!-- DROP OVERLAY -->
<div id="DRP"><div>📦</div><div style="font-size:13px">Drop .glb or .gltf to load custom drone</div></div>

<!-- HEADER -->
<div id="H">
  <a id="logo" href="#"><div id="logo-i">🚁</div><div id="logo-t">Drone<b>Lab</b></div></a>
  <div class="tag">PRO</div>
  <div id="HTABS">
    <button class="ht on" data-v="both">⬛ Split</button>
    <button class="ht" data-v="sim">🌐 Sim</button>
    <button class="ht" data-v="code">📝 Code</button>
  </div>
  <div id="HR">
    <div id="DOT"></div>
    <button class="hb dsk" id="SAVBTN">💾 Save</button>
    <button class="hb dsk" id="LOADBTN">📂 Load</button>
    <button class="hb dsk" id="UPBTN">📦 Model</button>
    <button class="hb" id="THBTN">🌙</button>
    <button class="hb" id="RUN">▶ Run</button>
    <button class="hb" id="STP">⛔ Stop</button>
  </div>
</div>

<input type="file" id="FPY" accept=".py" style="display:none">
<input type="file" id="FGLB" accept=".glb,.gltf" style="display:none">

<!-- MAIN -->
<div id="MAIN">

  <!-- SIM -->
  <div id="SP" class="ma">
    <div id="STB">
      <label>ENV</label>
      <select class="ss" id="ENVS">
        <option value="night" selected>🌙 Night</option>
        <option value="day">☀️ Day</option>
        <option value="afternoon">🌤 Afternoon</option>
        <option value="evening">🌅 Evening</option>
        <option value="indoor">🏠 Indoor</option>
        <option value="grass">🌿 Grass</option>
        <option value="road">🛣 Road</option>
        <option value="mountain">⛰ Mountain</option>
      </select>
      <label>DRONE</label>
      <select class="ss" id="DSEL">
        <option value="mavic">DJI Mavic</option>
        <option value="racing">Racing</option>
        <option value="delivery">Delivery</option>
        <option value="custom">Custom GLB</option>
      </select>
      <button class="sb" id="RCAM">⌖ Reset View</button>
    </div>
    <div id="CVW">
      <canvas id="C"></canvas>
      <div id="HUD">
        <div class="hr">
          <div class="hc"><span class="hl">X</span><span class="hv" id="HX">0.0</span></div>
          <div class="hc"><span class="hl">Y</span><span class="hv" id="HY">0.0</span></div>
          <div class="hc"><span class="hl">ALT</span><span class="hv" id="HZ">0.0m</span></div>
        </div>
        <div class="hr">
          <div class="hc"><span class="hl">YAW</span><span class="hv" id="HYAW">0°</span></div>
          <div class="hc"><span class="hl">SPD</span><span class="hv" id="HSPD">—</span></div>
          <div class="hc"><span class="hl">BAT</span><span class="hv" id="HBAT" style="color:var(--grn)">100%</span></div>
        </div>
      </div>
      <div id="HINT">🖱 Drag orbit · Scroll zoom · Right-drag pan · Pinch zoom</div>
    </div>
  </div>

  <div id="SPL"></div>

  <!-- CODE -->
  <div id="CP">
    <div id="CTB">
      <div class="ct on"><div class="cd"></div>mission.py</div>
      <div class="ct-r">
        <button class="hb" id="MSAV">💾</button>
        <button class="hb" id="MLOD">📂</button>
        <button class="hb" id="MMDL">📦</button>
      </div>
    </div>
    <div id="CMW"><textarea id="CODE"></textarea></div>
    <div id="CON">
      <div id="CONH">
        <span>▸ Console</span>
        <button onclick="document.getElementById('OUT').innerHTML=''">Clear</button>
      </div>
      <div id="OUT"></div>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div id="MN">
  <button class="mb on" id="MB_SIM"><span class="mi">🌐</span><span class="ml">SIM</span></button>
  <button class="mb" id="MB_CODE"><span class="mi">📝</span><span class="ml">CODE</span></button>
  <button class="mb" id="MB_RUN"><span class="mi" id="RICO">▶</span><span class="ml">RUN</span></button>
  <button class="mb" id="MB_MDL"><span class="mi">📦</span><span class="ml">MODEL</span></button>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════
// DEFAULT CODE  (PySimverse compatible)
// ════════════════════════════════════════════════════
const DEFAULT = `# DroneLab Pro — PySimverse API
# Same as FreeCodeCamp tutorial by Murtaza Hassan
from pysimverse import Drone
import math

drone = Drone()
drone.connect()

# ── Mission 1: Basic Square ────────────────────
drone.takeoff(height=5)

for i in range(4):
    drone.move_forward(distance=3, speed=1.5)
    drone.rotate_cw(degrees=90)

# ── Sensor data ────────────────────────────────
pos = drone.get_position()
print(f"Position: x={pos[0]:.1f}, y={pos[1]:.1f}, z={pos[2]:.1f}")
print(f"Battery: {drone.get_battery()}%")

# ── Mission 2: Ascend + Spiral ─────────────────
drone.move_up(distance=2)
drone.spiral(radius=2, height=3, turns=2)

# ── Mission 3: Orbit ───────────────────────────
drone.go_to(x=0, y=0, z=6)
drone.orbit(cx=0, cy=0, radius=3, laps=1)

# ── Mission 4: Flip ────────────────────────────
drone.go_to(x=0, y=0, z=5)
drone.flip('forward')
drone.hover(seconds=1)

# ── Mission 5: CV (FreeCodeCamp advanced) ──────
face = drone.detect_face()
print(f"Face detected: {face['detected']}")

gesture = drone.detect_gesture()
print(f"Gesture: {gesture}")

drone.follow_line(path=[(0,0),(2,0),(4,2),(6,2)], height=2)

# ── Land ───────────────────────────────────────
drone.return_home()
drone.land()
print("Mission complete!")
`;

// ════════════════════════════════════════════════════
// THREE.JS RENDERER
// ════════════════════════════════════════════════════
const cvs   = document.getElementById('C');
const cvw   = document.getElementById('CVW');
const rndr  = new THREE.WebGLRenderer({canvas:cvs, antialias:true});
rndr.setPixelRatio(Math.min(devicePixelRatio,2));
rndr.shadowMap.enabled = true;
rndr.shadowMap.type    = THREE.PCFSoftShadowMap;
rndr.toneMapping       = THREE.ACESFilmicToneMapping;
rndr.toneMappingExposure = 1.0;

const scene  = new THREE.Scene();
const cam    = new THREE.PerspectiveCamera(50, 1, 0.05, 600);

let camR=20, camTh=42, camPh=30;
const camTgt = new THREE.Vector3(0, 2, 0);
const panOff = new THREE.Vector3();

function updateCam() {
  const ph=camPh*Math.PI/180, th=camTh*Math.PI/180;
  cam.position.set(
    camTgt.x+panOff.x + camR*Math.cos(ph)*Math.sin(th),
    camTgt.y+panOff.y + camR*Math.sin(ph),
    camTgt.z+panOff.z + camR*Math.cos(ph)*Math.cos(th)
  );
  cam.lookAt(camTgt.x+panOff.x, camTgt.y+panOff.y, camTgt.z+panOff.z);
}

function resz() {
  const W=cvw.clientWidth||1, H=cvw.clientHeight||1;
  rndr.setSize(W,H); cam.aspect=W/H; cam.updateProjectionMatrix();
}
window.addEventListener('resize', resz);
new ResizeObserver(resz).observe(cvw);

// ── Orbit controls ──────────────────────────────
let dn=false, lx=0, ly=0, rmb=false, pd=0;
cvs.addEventListener('mousedown', e=>{ dn=true; lx=e.clientX; ly=e.clientY; rmb=e.button===2; e.preventDefault(); });
cvs.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('mousemove', e=>{
  if(!dn) return;
  const dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
  if(rmb){ panOff.x-=dx*.022; panOff.z-=dy*.022; }
  else { camTh-=dx*.38; camPh=Math.max(3,Math.min(88,camPh+dy*.30)); }
});
document.addEventListener('mouseup', ()=>dn=false);
cvs.addEventListener('wheel', e=>{ camR=Math.max(3,Math.min(80,camR+e.deltaY*.045)); }, {passive:true});
cvs.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===1){ dn=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY; }
  if(e.touches.length===2){ dn=false; pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
},{passive:false});
cvs.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1&&dn){
    const dx=e.touches[0].clientX-lx, dy=e.touches[0].clientY-ly;
    camTh-=dx*.42; camPh=Math.max(3,Math.min(88,camPh+dy*.32));
    lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    camR=Math.max(3,Math.min(80,camR-(d-pd)*.05)); pd=d;
  }
},{passive:false});
cvs.addEventListener('touchend', ()=>dn=false);
document.getElementById('RCAM').onclick=()=>{ camR=20; camTh=42; camPh=30; panOff.set(0,0,0); camTgt.set(0,2,0); };

// ════════════════════════════════════════════════════
// ENVIRONMENTS
// ════════════════════════════════════════════════════
let envObjs=[], sunL, fillL, ambL;

const ENVS = {
  night:    {sky:0x020508, fog:0x060a12, fd:.022, si:.35, sc:0x5577aa, sp:[12,22,8],  ai:.18, ac:0x1a2244},
  day:      {sky:0x5bb8e8, fog:0x99d4ef, fd:.010, si:1.2, sc:0xfffbe0, sp:[22,44,18], ai:.65, ac:0xfff5dd},
  afternoon:{sky:0x5a9ec8, fog:0x88c8e0, fd:.011, si:1.0, sc:0xffd888, sp:[10,28,22], ai:.55, ac:0xffeedd},

function mk(geo,color,rx=0,ry=0,rz=0,x=0,y=0,z=0,shadow=true){
  const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color}));
  m.rotation.set(rx,ry,rz); m.position.set(x,y,z);
  if(shadow){ m.castShadow=true; m.receiveShadow=true; }
  return m;
}

function setEnv(key){
  envObjs.forEach(o=>scene.remove(o)); envObjs=[];
  const E=ENVS[key]||ENVS.night;

  scene.fog=new THREE.FogExp2(E.fog, E.fd);
  if(sunL) scene.remove(sunL);
  if(fillL) scene.remove(fillL);
  if(ambL) scene.remove(ambL);
  ambL=new THREE.AmbientLight(E.ac, E.ai);
  sunL=new THREE.DirectionalLight(E.sc, E.si);
  sunL.position.set(...E.sp); sunL.castShadow=true;
  sunL.shadow.mapSize.set(2048,2048);
  sunL.shadow.camera.left=sunL.shadow.camera.bottom=-45;

  }

    add(stars(600,300,18,90));
    // Horizon glow strip
    const hg=new THREE.Mesh(new THREE.PlaneGeometry(140,20),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.18,side:THREE.DoubleSide}));hg.rotation.y=Math.PI/2;hg.position.set(-50,6,0);add(hg);

  else if(key==='road'){

let droneRoot=null, propGs=[], droneGlow=null, customMdl=null;

// Shared material factory
const mat=(color,shin=120,spec=0x000000,transp=false,opa=1,ds=THREE.FrontSide)=>new THREE.MeshPhongMaterial({color,shininess:shin,specular:spec,transparent:transp,opacity:opa,side:ds});

function buildMavic(){
  const G=new THREE.Group();
  const mBody = mat(0x1e2a38,160,0x5588bb);
  const mDark = mat(0x0e1520,80);
  const mArm  = mat(0x16202e,60);
  const mMot  = mat(0x080e18,220,0x336699);
  const mProp = mat(0x2a3848,30,0,true,.82,THREE.DoubleSide);
  const mGlass= mat(0x001828,280,0x88ccff,true,.65);
  const mLED  = new THREE.MeshBasicMaterial({color:0x00e5ff});
  const mRed  = new THREE.MeshBasicMaterial({color:0xff2222});
  const mGrn  = new THREE.MeshBasicMaterial({color:0x22ff55});

  // ── Body ───────────────────────────────────────
  G.add(mkm(new THREE.BoxGeometry(2.3,.3,1.1), mBody));
  G.add(mkm(new THREE.BoxGeometry(1.1,.2,.68), mBody, 0,0,0, -.1,.25,0));
  G.add(mkm(new THREE.BoxGeometry(.25,.2,.88), mDark, 0,0,0, .97,-.04,0));
  // LED accent strip
  G.add(mkm(new THREE.BoxGeometry(.52,.04,.05), mLED, 0,0,0, .72,.18,0));
  // Vent slots
  [-0.2,0,0.2].forEach(z=>G.add(mkm(new THREE.BoxGeometry(.06,.06,.55),mat(0x0a1218),0,0,0,-.5,.17,z)));

  // ── 4 Arms + Motors + Props ─────────────────────
  const mPos = [[1.85,0,-1.85],[1.85,0,1.85],[-1.85,0,-1.85],[-1.85,0,1.85]];
  propGs = [];
  mPos.forEach(([mx,my,mz],idx)=>{
    const al = Math.hypot(mx,mz)*.88;
    const aYaw = Math.atan2(mx,mz);
    // Arm tube (tapered)
    const arm=mkm(new THREE.BoxGeometry(al,.09,.09), mArm, 0,aYaw,0, mx*.5,0,mz*.5);
    G.add(arm);
    // Motor mount base plate
    G.add(mkm(new THREE.CylinderGeometry(.24,.24,.14,14), mMot, 0,0,0, mx,.07,mz));
    // Motor bell
    G.add(mkm(new THREE.CylinderGeometry(.15,.2,.1,12), mMot, 0,0,0, mx,.17,mz));
    // Prop shaft
    G.add(mkm(new THREE.CylinderGeometry(.04,.04,.12,8), mMot, 0,0,0, mx,.26,mz));

    // Propeller group (spins)
    const pg=new THREE.Group(); pg.position.set(mx,.3,mz);
    // 2-blade propeller
    for(let b=0;b<2;b++){
      const blade=mkm(new THREE.BoxGeometry(1.72,.02,.14), mProp, 0,b*Math.PI/2,0.065);
      pg.add(blade);
    }
    // Prop spinner cap
    const cap=new THREE.Mesh(new THREE.CylinderGeometry(.06,.09,.06,8), mMot);
    pg.add(cap);
    G.add(pg); propGs.push(pg);

    // Motor corner color lights (front=green, rear=red)
    const tipMat = idx<2 ? mGrn : mRed;
    G.add(mkm(new THREE.SphereGeometry(.07,6,6), tipMat, 0,0,0, mx,.31,mz));
  });

  // ── Landing gear ───────────────────────────────
  [-0.58,0.58].forEach(z=>{
    G.add(mkm(new THREE.BoxGeometry(1.85,.05,.07), mArm, 0,0,0, 0,-.28,z));
    [-0.68,0.68].forEach(x=>{G.add(mkm(new THREE.CylinderGeometry(.055,.055,.3,6), mArm, 0,0,0, x,-.14,z));});
  });

  // ── Camera gimbal ──────────────────────────────
  G.add(mkm(new THREE.SphereGeometry(.17,10,8), mDark, 0,0,0, .9,-.23,0));
  G.add(mkm(new THREE.SphereGeometry(.11,10,8), mGlass, 0,0,0, 1.0,-.23,0));
  G.add(new THREE.Mesh(new THREE.TorusGeometry(.11,.022,7,18), mMot).translateX(.99).translateY(-.23).rotateY(Math.PI/2));
  // Camera lens flare dot
  G.add(mkm(new THREE.CircleGeometry(.04,8), new THREE.MeshBasicMaterial({color:0x88ccff}), Math.PI/2,0,0, 1.06,-.23,0));

  // Glow point
  droneGlow = new THREE.PointLight(0x00e5ff, 0, 6);
  droneGlow.position.set(0,-1.2,0);
  G.add(droneGlow);

  G.traverse(c=>{ if(c.isMesh){ c.castShadow=true; c.receiveShadow=false; }});
  return G;
}

function buildRacing(){
  const G=new THREE.Group();
  const mF=mat(0x1a0806,120,0xff3300); const mA=mat(0x0a0808); const mP=mat(0xff2222,30,0,true,.82,THREE.DoubleSide);
  // X frame
  G.add(mkm(new THREE.CylinderGeometry(.35,.35,.1,5), mF));
  [[1,0,-1],[1,0,1],[-1,0,-1],[-1,0,1]].forEach(([mx,_,mz],i)=>{
    G.add(mkm(new THREE.BoxGeometry(Math.SQRT2*.9,.07,.07), mA, 0,Math.atan2(mx,mz),0, mx*.5,0,mz*.5));
    const pg=new THREE.Group(); pg.position.set(mx,.12,mz);
    for(let b=0;b<2;b++) pg.add(mkm(new THREE.BoxGeometry(1.3,.02,.11), mP, 0,b*Math.PI/2,0));
    G.add(pg); propGs.push(pg);
  });
  droneGlow=new THREE.PointLight(0xff3300,0,4); droneGlow.position.set(0,-.5,0); G.add(droneGlow);
  G.traverse(c=>{if(c.isMesh)c.castShadow=true;});
  return G;
}

function buildDelivery(){
  const G=new THREE.Group();
  const mB=mat(0xf0eee0,110,0x4488aa); const mA=mat(0xc8c2b8); const mP=mat(0x8899aa,30,0,true,.8,THREE.DoubleSide); const mBox=mat(0x2266cc,80,0x88aacc);
  G.add(mkm(new THREE.CylinderGeometry(.62,.62,.22,7), mB));
  G.add(mkm(new THREE.BoxGeometry(1.1,.7,1.1), mBox, 0,0,0, 0,-.46,0));
  propGs=[];
  [0,60,120,180,240,300].forEach((a,i)=>{
    const mx=2.1*Math.cos(a*Math.PI/180), mz=2.1*Math.sin(a*Math.PI/180);
    G.add(mkm(new THREE.BoxGeometry(2.1,.07,.07), mA, 0,Math.atan2(mx,mz),0, mx*.5,0,mz*.5));
    const pg=new THREE.Group(); pg.position.set(mx,.14,mz);
    for(let b=0;b<2;b++) pg.add(mkm(new THREE.BoxGeometry(1.4,.02,.12), mP, 0,b*Math.PI/2,0));
    G.add(pg); propGs.push(pg);
  });
  droneGlow=new THREE.PointLight(0xffffff,0,7); droneGlow.position.set(0,-1,0); G.add(droneGlow);
  G.traverse(c=>{if(c.isMesh)c.castShadow=true;});
  return G;
}

function mkm(geo,mat,rx=0,ry=0,rz=0,x=0,y=0,z=0){ const m=new THREE.Mesh(geo,mat); m.rotation.set(rx,ry,rz); m.position.set(x,y,z); return m; }

function setDrone(type){
  if(droneRoot) scene.remove(droneRoot);
  propGs=[]; droneGlow=null;
  if(type==='custom'&&customMdl){ droneRoot=customMdl; scene.add(droneRoot); return; }
  propGs=[];
  if(type==='racing') droneRoot=buildRacing();
  else if(type==='delivery') droneRoot=buildDelivery();
  else droneRoot=buildMavic();
  scene.add(droneRoot);
}

let aC=null,pO=null,pG=null,aOK=false;
function initAudio(){ if(aOK)return; try{ aC=new(window.AudioContext||window.webkitAudioContext)(); pO=aC.createOscillator(); const f=aC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=190; pG=aC.createGain(); pG.gain.value=0; pO.type='sawtooth'; pO.frequency.value=80; pO.connect(f); f.connect(pG); pG.connect(aC.destination); pO.start(); aOK=true; }catch(e){} }
function setHum(v,f){ if(!aOK)return; pG.gain.setTargetAtTime(v,aC.currentTime,.28); pO.frequency.setTargetAtTime(f,aC.currentTime,.45); }
function beep(f=880,d=.09,v=.1){ if(!aOK)return; try{ const o=aC.createOscillator(),g=aC.createGain(); o.frequency.value=f; g.gain.setValueAtTime(v,aC.currentTime); g.gain.exponentialRampToValueAtTime(.0001,aC.currentTime+d); o.connect(g); g.connect(aC.destination); o.start(); o.stop(aC.currentTime+d); }catch(e){} }
function tsound(){ if(!aOK)return; pO.frequency.setValueAtTime(62,aC.currentTime); pO.frequency.linearRampToValueAtTime(135,aC.currentTime+1.1); pG.gain.setValueAtTime(0,aC.currentTime); pG.gain.linearRampToValueAtTime(.08,aC.currentTime+1.1); }
function lsound(){ if(!aOK)return; pO.frequency.linearRampToValueAtTime(62,aC.currentTime+1); pG.gain.linearRampToValueAtTime(0,aC.currentTime+1.6); }
['click','touchstart'].forEach(ev=>document.addEventListener(ev,initAudio,{once:true}));

function sk(fn){ return new Sk.builtin.func(fn); }
const NONE = ()=>Sk.builtin.none.none$;
function N(v,d=0){ return (v!=null&&v!==Sk.builtin.none.none$)?Sk.ffi.remapToJs(v):d; }
function S(v,d=''){ return (v!=null&&v!==Sk.builtin.none.none$)?Sk.ffi.remapToJs(v):d; }

function setupBuiltins(){
  const b=Sk.builtins;

  b.__d_connect    = sk(()=>{ qfn(()=>{clog('🔗 drone.connect()','ls');beep(440,.1);}); return NONE(); });
  b.__d_disconnect = sk(()=>{ qfn(()=>clog('🔌 drone.disconnect()','li')); return NONE(); });

  b.__d_takeoff = sk((h)=>{
    const ht=N(h,3);
    if(P.flying){ clog('⚠ Already flying!','lw'); return NONE(); }
    P.flying=true;
    qm(P.x,P.y,ht,P.yaw, Math.max(900,ht*400/P.spd), '🚀 takeoff(height='+ht+')');
    qfn(()=>tsound());
    return NONE();
  });

  b.__d_land = sk(()=>{
    P.flying=false;
    qm(P.x,P.y,0,P.yaw, Math.max(900,P.z*400/P.spd), '🛬 land()');
    qfn(()=>lsound());
    return NONE();
  });

  b.__d_hover = sk((s)=>{ const sec=N(s,1); qh(sec*1000,'⏸ hover('+sec+'s)'); return NONE(); });

  b.__d_return_home = sk(()=>{
    const d=Math.hypot(P.x,P.y);
    qm(0,0,P.z,P.yaw, Math.max(600,d*380/P.spd), '🏠 return_home()');
    return NONE();
  });

  b.__d_emergency_land = sk(()=>{ P.flying=false; qm(P.x,P.y,0,P.yaw,400,'🚨 emergency_land()'); return NONE(); });

  // Movement helpers
  function mover(name, xs, zs){
    return sk((d,sp)=>{
      const dist=N(d,1), spd=N(sp,-1);
      if(spd>0) P.spd=Math.max(.1,Math.min(5,spd));
      const r=P.yaw*Math.PI/180;
      qm(P.x+xs(r)*dist, P.y+zs(r)*dist, P.z, P.yaw, Math.max(300,dist*380/P.spd), name+'('+dist+')');
      return NONE();
    });
  }
  b.__d_move_forward  = mover('⬆ move_forward',  r=>Math.sin(r), r=>Math.cos(r));
  b.__d_move_backward = mover('⬇ move_backward', r=>-Math.sin(r), r=>-Math.cos(r));
  b.__d_move_left     = mover('← move_left',     r=>-Math.cos(r), r=>Math.sin(r));
  b.__d_move_right    = mover('→ move_right',     r=>Math.cos(r), r=>-Math.sin(r));

  b.__d_move_up   = sk((d)=>{ const dist=N(d,1); qm(P.x,P.y,P.z+dist,P.yaw,Math.max(300,dist*360/P.spd),'↑ move_up('+dist+')'); return NONE(); });
  b.__d_move_down = sk((d)=>{ const dist=N(d,1); qm(P.x,P.y,Math.max(0,P.z-dist),P.yaw,Math.max(300,dist*360/P.spd),'↓ move_down('+dist+')'); return NONE(); });

  b.__d_go_to = sk((x,y,z,sp)=>{
    const tx=N(x,P.x), ty=N(y,P.y), tz=N(z,-999), sspd=N(sp,-1);
    const atz = tz===-999 ? P.z : tz;
    if(sspd>0) P.spd=Math.max(.1,Math.min(5,sspd));
    const d=Math.hypot(tx-P.x,ty-P.y,atz-P.z);
    qm(tx,ty,atz,P.yaw, Math.max(400,d*380/P.spd), '📍 go_to('+tx.toFixed(1)+','+ty.toFixed(1)+','+atz.toFixed(1)+')');
    return NONE();
  });

  b.__d_rotate_cw  = sk((deg)=>{ const d=N(deg,90); qm(P.x,P.y,P.z,P.yaw+d,Math.max(250,d*10/P.spd),'↻ rotate_cw('+d+'°)'); return NONE(); });
  b.__d_rotate_ccw = sk((deg)=>{ const d=N(deg,90); qm(P.x,P.y,P.z,P.yaw-d,Math.max(250,d*10/P.spd),'↺ rotate_ccw('+d+'°)'); return NONE(); });
  b.__d_set_yaw    = sk((a)=>{ const ang=N(a,0); qm(P.x,P.y,P.z,ang,350,'🧭 set_yaw('+ang+'°)'); return NONE(); });
  b.__d_face       = sk((d)=>{ const a={north:0,east:90,south:180,west:270,n:0,e:90,s:180,w:270}[S(d).toLowerCase()]??0; qm(P.x,P.y,P.z,a,350,"🧭 face('"+S(d)+"')"); return NONE(); });

  b.__d_set_speed = sk((s)=>{ P.spd=Math.max(.1,Math.min(5,N(s,1))); qfn(()=>{clog('⚡ set_speed('+P.spd.toFixed(1)+')','li');beep(660,.06);}); return NONE(); });
  b.__d_flip      = sk((d)=>{ qfl(S(d,'forward')); return NONE(); });

  // Patterns
  b.__d_orbit = sk((cx,cy,r,laps,dir)=>{
    const ocx=N(cx,0),ocy=N(cy,0),rad=N(r,2),l=N(laps,1),ddir=S(dir,'cw')==='ccw'?-1:1;
    clog('🔵 orbit(r='+rad+',laps='+l+')','li');
    const steps=Math.ceil(44*l);
    for(let i=1;i<=steps;i++){ const a=ddir*(i/44)*Math.PI*2; qm(ocx+rad*Math.cos(a),ocy+rad*Math.sin(a),P.z,P.yaw,90,null,true); }
    return NONE();
  });

  b.__d_circle = sk((r,laps)=>{
    const rad=N(r,2),l=N(laps,1),sx=P.x,sy=P.y;
    clog('⭕ circle(r='+rad+')','li');
    const steps=Math.ceil(44*l);
    for(let i=1;i<=steps;i++){ const a=(i/44)*Math.PI*2; qm(sx+rad*Math.sin(a),sy+rad-rad*Math.cos(a),P.z,P.yaw,90,null,true); }
    return NONE();
  });

  b.__d_spiral = sk((r,h,t)=>{
    const rad=N(r,2),ht=N(h,4),turns=N(t,2),sx=P.x,sy=P.y,sz=P.z;
    clog('🌀 spiral(r='+rad+',h='+ht+',turns='+turns+')','li');
    const steps=Math.ceil(44*turns);
    for(let i=1;i<=steps;i++){ const a=(i/44)*Math.PI*2; qm(sx+rad*Math.cos(a),sy+rad*Math.sin(a),sz+ht*(i/steps),P.yaw,90,null,true); }
    return NONE();
  });

  b.__d_figure_8 = sk((size)=>{
    const s=N(size,3),cx=P.x,cy=P.y;
    clog('∞ figure_8(size='+s+')','li');
    for(let i=1;i<=36;i++){ const a=(i/36)*Math.PI*2; qm(cx+s*Math.sin(a),cy+s*Math.sin(a)*Math.cos(a),P.z,P.yaw,90,null,true); }
    for(let i=1;i<=36;i++){ const a=(i/36)*Math.PI*2; qm(cx-s*Math.sin(a),cy+s*Math.sin(a)*Math.cos(a),P.z,P.yaw,90,null,true); }
    return NONE();
  });

  b.__d_square = sk((size)=>{
    const s=N(size,2); clog('⬛ square('+s+')','li');
    for(let i=0;i<4;i++){ const r=P.yaw*Math.PI/180; qm(P.x+Math.sin(r)*s,P.y+Math.cos(r)*s,P.z,P.yaw,Math.max(350,s*380),'  ↗ side '+(i+1)); qm(P.x,P.y,P.z,P.yaw+90,280,null); }
    return NONE();
  });

  b.__d_triangle = sk((size)=>{
    const s=N(size,2); clog('▲ triangle('+s+')','li');
    for(let i=0;i<3;i++){ const r=P.yaw*Math.PI/180; qm(P.x+Math.sin(r)*s,P.y+Math.cos(r)*s,P.z,P.yaw,Math.max(350,s*380),'  ↗ side '+(i+1)); qm(P.x,P.y,P.z,P.yaw+120,320,null); }
    return NONE();
  });

  b.__d_patrol = sk((wps)=>{
    const list=Sk.ffi.remapToJs(wps); clog('🗺 patrol('+list.length+' pts)','li');
    list.forEach(wp=>{ const a=Array.isArray(wp)?wp:Object.values(wp); const tx=+a[0]||0,ty=+a[1]||0,tz=a[2]!=null?+a[2]:P.z; qm(tx,ty,tz,P.yaw,Math.max(400,Math.hypot(tx-P.x,ty-P.y)*380),'  📍→('+tx+','+ty+','+tz.toFixed(1)+')'); });
    return NONE();
  });

  b.__d_lawnmower = sk((w,l,rows)=>{
    const ww=N(w,8),ll=N(l,6),rr=N(rows,4); clog('🌿 lawnmower','li');
    const sp=ww/rr;
    for(let i=0;i<=rr;i++){ const x=-ww/2+i*sp; qm(x,P.y,P.z,P.yaw,300,null); qm(x,P.y+(i%2===0?ll:-ll),P.z,P.yaw,Math.max(400,ll*320),null); }
    return NONE();
  });

  b.__d_zigzag = sk((w,d,n)=>{
    const ww=N(w,2),dd=N(d,5),nn=N(n,6); clog('↯ zigzag','li');
    const step=dd/nn;
    for(let i=0;i<nn;i++){ const r=P.yaw*Math.PI/180; const side=i%2===0?ww:-ww; qm(P.x+Math.sin(r)*step+Math.cos(r)*side,P.y+Math.cos(r)*step-Math.sin(r)*side,P.z,P.yaw,Math.max(200,step*300),null); }
    return NONE();
  });

  // Camera + CV
  b.__d_take_photo    = sk(()=>{ qfn(()=>{clog('📸 take_photo()','li');beep(1200,.08);}); return NONE(); });
  b.__d_camera_angle  = sk((p,y)=>{ qfn(()=>clog('🎥 camera_angle('+N(p)+','+N(y)+')','li')); return NONE(); });

  // Simulated CV — returns proper Python dicts/values
  b.__d_detect_face = sk(()=>{
    const x=+(Math.random()*.4-.2).toFixed(3), y=+(Math.random()*.4-.2).toFixed(3);
    clog('👤 detect_face() → face at ('+x+','+y+')','li');
    return Sk.ffi.remapToPy({detected:true,x,y,confidence:.92,label:'human_face'});
  });

  b.__d_detect_gesture = sk(()=>{
    const gs=['pointing','peace','thumbs_up','open_hand','fist','okay','pinky'];
    const g=gs[Math.floor(Math.random()*gs.length)];
    clog('🤚 detect_gesture() → "'+g+'"','li');
    return Sk.ffi.remapToPy(g);
  });

  b.__d_detect_object = sk((label)=>{
    const lbl=S(label,'object');
    clog('🔍 detect_object("'+lbl+'")','li');
    return Sk.ffi.remapToPy({detected:Math.random()>.3,label:lbl,x:Math.random()-.5,y:Math.random()-.5,confidence:+(Math.random()*.3+.7).toFixed(2)});
  });

  b.__d_follow_line = sk((path,height)=>{
    const pts=Sk.ffi.remapToJs(path), ht=N(height,-999);
    const atz = ht===-999 ? P.z : ht;
    clog('〰 follow_line('+pts.length+' pts)','li');
    pts.forEach(pt=>{ const a=Array.isArray(pt)?pt:Object.values(pt); qm(+a[0]||0,+a[1]||0,atz,P.yaw,300,'  →('+a[0]+','+a[1]+')',true); });
    return NONE();
  });

  b.__d_follow_body = sk(()=>{ clog('🚶 follow_body() → tracking','li'); qm(P.x+2,P.y,P.z,P.yaw,1200,'  tracking body...'); return NONE(); });
  b.__d_detect_color= sk((c)=>{ const cl=S(c,'red'); clog('🎨 detect_color("'+cl+'")','li'); return Sk.ffi.remapToPy({detected:Math.random()>.3,color:cl,x:Math.random()-.5,y:Math.random()-.5}); });
  b.__d_detect_qr   = sk(()=>{ clog('📱 detect_qr() → "DRONELAB-1"','li'); return Sk.ffi.remapToPy({detected:true,data:'DRONELAB-1',x:.01,y:-.04}); });
  b.__d_navigate_to_room = sk((room)=>{ const r=S(room,'garage'); clog('🏠 navigate_to_room("'+r+'")','li'); qm(P.x+3,P.y+3,P.z,P.yaw,1800,'  → '+r); return NONE(); });

  // Sensors
  b.__d_get_position = sk(()=>Sk.ffi.remapToPy([+P.x.toFixed(3),+P.y.toFixed(3),+P.z.toFixed(3)]));
  b.__d_get_altitude = sk(()=>Sk.ffi.remapToPy(+P.z.toFixed(3)));
  b.__d_get_x        = sk(()=>Sk.ffi.remapToPy(+P.x.toFixed(3)));
  b.__d_get_y        = sk(()=>Sk.ffi.remapToPy(+P.y.toFixed(3)));
  b.__d_get_yaw      = sk(()=>Sk.ffi.remapToPy(+P.yaw.toFixed(1)));
  b.__d_get_speed    = sk(()=>Sk.ffi.remapToPy(P.spd));
  b.__d_get_battery  = sk(()=>Sk.ffi.remapToPy(Math.round(P.battery)));
  b.__d_is_flying    = sk(()=>P.flying?Sk.builtin.bool.true$:Sk.builtin.bool.false$);
  b.__d_distance_to  = sk((x,y,z)=>Sk.ffi.remapToPy(Math.hypot(N(x)-P.x,N(y)-P.y,N(z)-P.z)));
  b.__d_print_status = sk(()=>{ clog('📊 x='+P.x.toFixed(1)+' y='+P.y.toFixed(1)+' z='+P.z.toFixed(1)+' yaw='+P.yaw.toFixed(0)+'° bat='+Math.round(P.battery)+'%','li'); return NONE(); });

function runPython(code){
  P={x:0,y:0,z:0,yaw:0,spd:1,flying:false,battery:100};
  cmdQ=[]; curC=null;

  // Configure Skulpt — intercept pysimverse import with Python source
  Sk.configure({
    output: (txt)=>txt.split('\n').forEach(l=>{ if(l.trim()) clog(l,'lo'); }),
    read: (x)=>{
      // Key fix: return Python source for pysimverse
      if(x==='pysimverse'||x.endsWith('/pysimverse.js')||x.endsWith('src/lib/pysimverse/__init__.js'))
        return PYSIMVERSE_PY;
      if(x.endsWith('/time.js')) return 'def sleep(s):\n  pass\n';
      if(Sk.builtinFiles&&Sk.builtinFiles['files'][x]!==undefined)
        return Sk.builtinFiles['files'][x];
      throw new Error("Module not found: '"+x+"'");
    },
    __future__: Sk.python3,
    execLimit: 150000,
  });

  // Register builtins AFTER configure
  setupBuiltins();

  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody('<stdin>',false,code,true))
    .then(()=>{
      clog('','lo');
      clog('▸ '+cmdQ.length+' commands queued — simulating...','ls');
      beginSim();
    })
    .catch(err=>{
      clog('','le');
      clog('❌ '+(err.tp$str?err.tp$str().v:String(err)),'le');
      document.getElementById('DOT').className='err';
      setRunning(false);
    });
}

// ════════════════════════════════════════════════════
// SIMULATION ENGINE
// ════════════════════════════════════════════════════
function beginSim(){
  trailPts=[];
  if(tGeo.attributes&&tGeo.attributes.position) tGeo.deleteAttribute('position');
  C={x:0,y:0,z:0,yaw:0,flying:false,battery:100};
  bDrain=0; mDone=false; fAngle=0; panOff.set(0,0,0);
}

function simTick(ts){
  if(mDone||shouldStop) return;

  // Flush instant fn commands
  while(cmdQ.length && cmdQ[0].t==='fn') cmdQ.shift().fn();

  if(!cmdQ.length && !curC){
    if(!mDone){
      mDone=true;
      clog('✅ Mission complete!','ls');
      beep(660,.2); setTimeout(()=>beep(880,.2),240); setTimeout(()=>beep(1100,.3),480);
      setRunning(false);
    }
    return;
  }

  if(!curC && cmdQ.length){
    curC=cmdQ.shift(); cFrom={x:C.x,y:C.y,z:C.z,yaw:C.yaw}; cT0=ts;
    if(curC.log) clog(curC.log,'lc');
    if(curC.t==='move'){
      if(curC.tz>.1&&cFrom.z<.1) tsound();
      else if(curC.tz<.1&&cFrom.z>.1) lsound();
      else if(!curC.fast) beep(520,.05,.06);
    }
  }
  if(!curC) return;

  const t=Math.min((ts-cT0)/Math.max(1,curC.dur),1);
  const e=curC.fast?t:ease(t);

  if(curC.t==='move'){
    C.x=cFrom.x+(curC.tx-cFrom.x)*e;
    C.y=cFrom.y+(curC.ty-cFrom.y)*e;
    C.z=cFrom.z+(curC.tz-cFrom.z)*e;
    C.yaw=cFrom.yaw+(curC.tyaw-cFrom.yaw)*e;
  } else if(curC.t==='flip'){
    fAngle=e*360;
  }
  // hover: just waits

  C.flying=C.z>.06;

  if(t>=1){
    if(curC.t==='move'){ C.x=curC.tx; C.y=curC.ty; C.z=curC.tz; C.yaw=curC.tyaw; }
    if(curC.t==='move'){ bDrain+=.28; C.battery=Math.max(0,100-bDrain); P.battery=C.battery; }
    fAngle=0; curC=null;
  }

  // Trail
  if(C.z>.06) addTrail(C.x, C.z, C.y); // Three.js Y=up
}

// ════════════════════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════════════════════
let propSpin=0;

function loop(ts){
  frameN++;
  simTick(ts);

  // Update drone position/rotation
  if(droneRoot){
    droneRoot.position.set(C.x, C.z, C.y); // Three.js: Y=altitude
    droneRoot.rotation.y  = -C.yaw*Math.PI/180;
    droneRoot.rotation.x  = fAngle*Math.PI/180;
    droneRoot.rotation.z  = 0;
  }

  // Spinning props
  const tSpd = C.flying ? (0.30+P.spd*.05) : 0;
  propSpin += (tSpd-propSpin)*.08;
  propGs.forEach((pg,i)=>{ pg.rotation.y += propSpin*(i%2===0?1:-1); });

  // Drone glow
  if(droneGlow) droneGlow.intensity = C.flying ? .55 : 0;

  // Prop hum
  if(frameN%30===0 && aOK){
    if(C.flying) setHum(.07, 82+C.z*3+propSpin*155);
    else if(!running) setHum(0, 82);
  }

  // Camera soft-follow drone
  if(droneRoot) camTgt.lerp(droneRoot.position, .028);
  updateCam();

  // HUD
  if(frameN%8===0){
    document.getElementById('HX').textContent    = C.x.toFixed(1);
    document.getElementById('HY').textContent    = C.y.toFixed(1);
    document.getElementById('HZ').textContent    = C.z.toFixed(1)+'m';
    document.getElementById('HYAW').textContent  = ((C.yaw%360+360)%360).toFixed(0)+'°';
    document.getElementById('HSPD').textContent  = running?P.spd.toFixed(1):'—';
    const bat=Math.round(C.battery);
    const bel=document.getElementById('HBAT');
    bel.textContent=bat+'%';
    bel.style.color=bat>50?'var(--grn)':bat>20?'var(--yel)':'var(--red)';
  }

  rndr.render(scene,cam);
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
// CONSOLE
// ════════════════════════════════════════════════════
const out=document.getElementById('OUT');
function clog(msg,cls='lo'){
  const d=document.createElement('div'); d.className=cls; d.textContent=msg;
  out.appendChild(d); out.scrollTop=9999;
  // Badge on mobile if not on console
  if(cls==='le'||cls==='ls') document.getElementById('DOT').className=running?'live':cls==='le'?'err':'';
}

// ════════════════════════════════════════════════════
// UI ACTIONS
// ════════════════════════════════════════════════════
function setRunning(r){
  running=r;
  document.getElementById('RUN').style.display=r?'none':'';
  document.getElementById('STP').style.display=r?'':'none';
  document.getElementById('DOT').className=r?'live':'';
  document.getElementById('RICO').textContent=r?'⏹':'▶';
}

function doRun(){
  if(running) return;
  initAudio();
  shouldStop=false; mDone=true; bDrain=0;
  trailPts=[]; if(tGeo.attributes&&tGeo.attributes.position) tGeo.deleteAttribute('position');
  if(droneRoot){ droneRoot.position.set(0,0,0); droneRoot.rotation.set(0,0,0); }
  C={x:0,y:0,z:0,yaw:0,flying:false,battery:100};
  out.innerHTML=''; clog('▸ Running mission.py...','li');
  setRunning(true);
  mobSwitch('sim');
  setTimeout(()=>runPython(editor.getValue()), 80);
}

function doStop(){
  shouldStop=true; curC=null; cmdQ=[];
  clog('⛔ Stopped.','lw'); setRunning(false);
  if(aOK) setHum(0,82);
}

['RUN','MB_RUN'].forEach(id=>document.getElementById(id).onclick=doRun);
document.getElementById('STP').onclick=doStop;

// Desktop view toggle
document.querySelectorAll('[data-v]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const v=btn.dataset.v, sp=document.getElementById('SP'), cp=document.getElementById('CP'), spl=document.getElementById('SPL');
    if(v==='sim'){ sp.style.cssText='flex:1;display:flex'; cp.style.display='none'; spl.style.display='none'; }
    else if(v==='code'){ sp.style.display='none'; cp.style.cssText='width:100%;display:flex'; spl.style.display='none'; }
    else{ sp.style.cssText='flex:1;display:flex'; cp.style.cssText='width:46%;display:flex'; spl.style.display='block'; }
    setTimeout(()=>{ resz(); editor.refresh(); }, 20);
  });
});

// Mobile nav
function mobSwitch(pane){
  const sp=document.getElementById('SP'), cp=document.getElementById('CP');
  sp.classList.remove('ma'); cp.classList.remove('ma');
  ['MB_SIM','MB_CODE'].forEach(id=>document.getElementById(id).classList.remove('on'));
  if(pane==='sim'){ sp.classList.add('ma'); document.getElementById('MB_SIM').classList.add('on'); setTimeout(resz,20); }
  else{ cp.classList.add('ma'); document.getElementById('MB_CODE').classList.add('on'); setTimeout(()=>editor.refresh(),20); }
}
document.getElementById('MB_SIM').onclick  = ()=>mobSwitch('sim');
document.getElementById('MB_CODE').onclick = ()=>mobSwitch('code');
document.getElementById('MB_MDL').onclick  = ()=>document.getElementById('FGLB').click();

// Save / Load Python
function saveCode(){ const b=new Blob([editor.getValue()],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='mission.py'; a.click(); clog('💾 Saved mission.py','ls'); }
function loadCode(){ document.getElementById('FPY').click(); }
['SAVBTN','MSAV'].forEach(id=>document.getElementById(id).onclick=saveCode);
['LOADBTN','MLOD'].forEach(id=>document.getElementById(id).onclick=loadCode);
document.getElementById('FPY').addEventListener('change',function(){
  if(!this.files[0]) return;
  const r=new FileReader();
  r.onload=e=>{ editor.setValue(e.target.result); clog('📂 '+this.files[0].name,'ls'); };
  r.readAsText(this.files[0]); this.value='';
});

// Upload 3D model (GLB/GLTF)
function loadGLB(file){
  if(!file) return;
  clog('📦 Loading '+file.name+'...','li');
  const loader=new THREE.GLTFLoader();
  loader.load(URL.createObjectURL(file), gltf=>{
    customMdl=gltf.scene;
    const box=new THREE.Box3().setFromObject(customMdl);
    const sz=box.getSize(new THREE.Vector3());
    const sc=4/Math.max(sz.x,sz.y,sz.z,0.01);
    customMdl.scale.setScalar(sc);
    customMdl.traverse(c=>{ if(c.isMesh) c.castShadow=true; });
    document.getElementById('DSEL').value='custom';
    setDrone('custom');
    clog('✅ Model loaded: '+file.name,'ls'); beep(880,.1);
  }, null, err=>clog('❌ '+err.message,'le'));
}
['UPBTN','MMDL'].forEach(id=>document.getElementById(id).onclick=()=>document.getElementById('FGLB').click());
document.getElementById('FGLB').addEventListener('change',function(){ loadGLB(this.files[0]); this.value=''; });
document.getElementById('DSEL').onchange=function(){
  if(this.value==='custom'){ document.getElementById('FGLB').click(); return; }
  setDrone(this.value);
};

// Drag-drop model
document.body.addEventListener('dragover',e=>{ e.preventDefault(); document.getElementById('DRP').classList.add('show'); });
document.body.addEventListener('dragleave',e=>{ if(!e.relatedTarget) document.getElementById('DRP').classList.remove('show'); });
document.body.addEventListener('drop',e=>{
  e.preventDefault(); document.getElementById('DRP').classList.remove('show');
  const f=e.dataTransfer.files[0];
  if(f&&(f.name.endsWith('.glb')||f.name.endsWith('.gltf'))) loadGLB(f);
  else clog('⚠ Drop a .glb or .gltf file','lw');
});

// Environment selector
document.getElementById('ENVS').onchange=function(){ setEnv(this.value); };

// Theme toggle
let dark=true;
document.getElementById('THBTN').onclick=()=>{
  dark=!dark;
  document.documentElement.dataset.theme=dark?'dark':'light';
  document.getElementById('THBTN').textContent=dark?'🌙':'☀️';
  editor.setOption('theme',dark?'dracula':'eclipse');
};

// Splitter
const splEl=document.getElementById('SPL');
let splDrag=false;
splEl.addEventListener('mousedown',e=>{ splDrag=true; splEl.classList.add('drag'); e.preventDefault(); });
document.addEventListener('mousemove',e=>{
  if(!splDrag) return;
  const rect=document.getElementById('MAIN').getBoundingClientRect();
  const pct=Math.min(78,Math.max(22,(e.clientX-rect.left)/rect.width*100));
  document.getElementById('SP').style.cssText='flex:0 0 '+pct+'%;display:flex';
  resz();
});
document.addEventListener('mouseup',()=>{ splDrag=false; splEl.classList.remove('drag'); });

// Ctrl+Enter, Ctrl+S
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); doRun(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveCode(); }
});

// ════════════════════════════════════════════════════
// CODEMIRROR
// ════════════════════════════════════════════════════
const editor=CodeMirror.fromTextArea(document.getElementById('CODE'),{
  mode:'python', theme:'dracula', lineNumbers:true,
  autoCloseBrackets:true, matchBrackets:true,
  indentUnit:4, tabSize:4, lineWrapping:false,
  extraKeys:{
    'Tab':cm=>cm.execCommand('indentMore'),
    'Shift-Tab':cm=>cm.execCommand('indentLess'),
    'Ctrl-Enter':()=>doRun(), 'Cmd-Enter':()=>doRun()
  }
});
editor.setValue(DEFAULT);
editor.setSize('100%','100%');

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
setEnv('night');
setDrone('mavic');
resz();
updateCam();

// Mobile: start on code tab
if(window.innerWidth<=760) mobSwitch('code');

clog('🚁 DroneLab Pro v5 ready — Python runs!','ls');
clog('  PySimverse API: from pysimverse import Drone','li');
clog('  Ctrl+Enter: Run · Ctrl+S: Save · Drop .glb: Custom model','li');

requestAnimationFrame(loop);
</script>
</body>
