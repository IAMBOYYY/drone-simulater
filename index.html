<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DroneLab Pro</title>
<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<!-- Skulpt EXACT SAME VERSION as working Google AI Studio app (npm 1.2.0) -->
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#07090f;color:#f0f6fc;font-family:'JetBrains Mono','Fira Code','SF Mono',Consolas,monospace;font-size:13px}

/* ── HEADER ── */
#hdr{height:44px;display:flex;align-items:center;padding:0 12px;gap:8px;background:#010409;border-bottom:1px solid #30363d;flex-shrink:0;z-index:100}
#logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#f0f6fc}
#logo-box{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#00e5ff,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
#logo-name{font-size:14px;font-weight:800}
#logo-name b{color:#00e5ff}
.tag{font-size:9px;padding:1px 6px;border-radius:8px;background:linear-gradient(90deg,#00e5ff,#7c3aed);color:#fff;font-weight:700;letter-spacing:1px}
#htabs{flex:1;display:flex;align-items:center;justify-content:center;gap:2px}
.htab{height:32px;padding:0 14px;border:none;border-radius:5px;background:none;color:#8b949e;font-family:inherit;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.htab.on{color:#f0f6fc;border-bottom-color:#00e5ff}
.htab:hover:not(.on){color:#f0f6fc}
#hdr-right{display:flex;align-items:center;gap:6px}
.hbtn{height:28px;padding:0 10px;border-radius:5px;border:1px solid #30363d;background:#21262d;color:#f0f6fc;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.hbtn:hover{border-color:#00e5ff;color:#00e5ff}
#btn-run{background:#238636;border-color:#238636;color:#fff;height:30px;padding:0 14px;font-size:12px}
#btn-run:hover{background:#2ea043}
#btn-stop{background:#da3633;border-color:#da3633;color:#fff;height:30px;display:none}
#dot{width:7px;height:7px;border-radius:50%;background:#30363d;flex-shrink:0;transition:all .3s}
#dot.live{background:#3fb950;box-shadow:0 0 7px #3fb950}
#dot.err{background:#f85149;box-shadow:0 0 7px #f85149}

/* ── LAYOUT ── */
#main{height:calc(100vh - 44px);display:flex;overflow:hidden}

/* ── SIM PANE ── */
#sim-pane{flex:1;min-width:0;display:flex;flex-direction:column;background:#07090f}
#sim-bar{display:flex;align-items:center;padding:4px 10px;gap:8px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;overflow-x:auto}
#sim-bar::-webkit-scrollbar{display:none}
#sim-bar label{font-size:9px;color:#8b949e;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.sctl{height:24px;padding:0 7px;border-radius:4px;border:1px solid #30363d;background:#0d1117;color:#f0f6fc;font-family:inherit;font-size:11px;cursor:pointer;flex-shrink:0}
.sctl:hover{border-color:#00e5ff}
#cvs-wrap{flex:1;position:relative;overflow:hidden}
canvas{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}

/* HUD */
#hud{position:absolute;top:8px;left:8px;pointer-events:none;display:flex;flex-direction:column;gap:4px}
.hrow{display:flex;gap:4px}
.hchip{background:rgba(7,9,15,.85);border:1px solid rgba(48,54,61,.8);border-radius:5px;padding:3px 9px;backdrop-filter:blur(6px);display:flex;align-items:center;gap:4px}
.hlbl{font-size:8px;color:#8b949e;letter-spacing:.8px;text-transform:uppercase}
.hval{font-size:11px;font-weight:700;color:#00e5ff;min-width:30px}
#sim-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(139,148,158,.5);pointer-events:none;background:rgba(7,9,15,.55);padding:3px 10px;border-radius:16px;white-space:nowrap}

/* ── SPLITTER ── */
#splitter{width:4px;background:#30363d;cursor:col-resize;flex-shrink:0;transition:background .2s}
#splitter:hover,#splitter.drag{background:#00e5ff}

/* ── CODE PANE ── */
#code-pane{width:46%;min-width:200px;display:flex;flex-direction:column;background:#0d1117;border-left:1px solid #30363d}
#code-tabs{display:flex;align-items:center;padding:0 10px;height:32px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;gap:6px}
.ctab{height:26px;padding:0 10px;font-size:11px;color:#8b949e;display:flex;align-items:center;gap:5px;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.ctab.on{color:#00e5ff;border-bottom-color:#00e5ff}
.ctab-dot{width:5px;height:5px;border-radius:50%;background:#00e5ff}
.ctab-actions{margin-left:auto;display:flex;gap:4px}
.ctab-actions .hbtn{height:20px;font-size:10px;padding:0 7px}
#editor-wrap{flex:1;overflow:hidden;min-height:0}
.CodeMirror{height:100%!important;font-size:13px!important;line-height:1.72!important;font-family:inherit!important;background:#0d1117!important}
.CodeMirror-scroll{height:100%!important}
.CodeMirror-gutters{background:#0d1117!important;border-right:1px solid #30363d!important}

/* ── CONSOLE ── */
#console{height:150px;display:flex;flex-direction:column;border-top:1px solid #30363d;flex-shrink:0}
#con-hdr{display:flex;align-items:center;padding:0 10px;height:26px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
#con-hdr span{font-size:10px;color:#8b949e;letter-spacing:.8px;text-transform:uppercase}
#con-hdr button{margin-left:auto;background:none;border:1px solid #30363d;color:#8b949e;padding:1px 7px;font-size:10px;border-radius:4px;cursor:pointer;font-family:inherit}
#con-hdr button:hover{border-color:#00e5ff;color:#00e5ff}
#console-out{flex:1;overflow-y:auto;padding:6px 12px;font-size:12px;line-height:1.75;background:#060a0f}
#console-out::-webkit-scrollbar{width:3px}
#console-out::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.log-info{color:#f0f6fc}.log-cmd{color:#00e5ff}.log-ok{color:#3fb950}.log-err{color:#f85149}.log-warn{color:#e3b341}.log-sys{color:#79c0ff}

/* ── MOBILE NAV ── */
#mob-nav{display:none;height:52px;background:#010409;border-top:1px solid #30363d;flex-shrink:0}
.mnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:#8b949e;font-family:inherit;cursor:pointer;transition:color .2s;position:relative}
.mnbtn.on{color:#00e5ff}
.mnbtn.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:#00e5ff;border-radius:0 0 3px 3px}
.mico{font-size:18px}.mlbl{font-size:9px;font-weight:700;letter-spacing:.5px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #htabs,.desk-only{display:none!important}
  #hdr{padding:0 8px;gap:5px}
  #logo-name,.tag{display:none}
  #btn-run,#btn-stop{padding:0 10px;height:28px;font-size:11px}
  #main{flex-direction:column;height:calc(100vh - 44px - 52px)}
  #sim-pane,#code-pane{width:100%!important;flex:1;border-left:none;display:none!important}
  #sim-pane.show,#code-pane.show{display:flex!important}
  #splitter{display:none!important}
  #mob-nav{display:flex!important}
  #console{height:130px}
}
@media(min-width:769px){
  #sim-pane{display:flex!important}
  #code-pane{display:flex!important}
  #mob-nav{display:none!important}
}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:9999;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;animation:splash-out .4s 2s forwards}
@keyframes splash-out{to{opacity:0;visibility:hidden;pointer-events:none}}
#splash-ico{font-size:52px;animation:float-ico 1.4s ease-in-out infinite}
@keyframes float-ico{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#splash-title{font-size:22px;font-weight:900;letter-spacing:6px;color:#00e5ff}
#splash-sub{font-size:9px;color:#8b949e;letter-spacing:3px;animation:blink-sub 1s infinite}
@keyframes blink-sub{0%,100%{opacity:1}50%{opacity:.2}}

/* DROP OVERLAY */
#drop-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,229,255,.07);border:3px dashed #00e5ff;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#00e5ff;font-size:18px}
#drop-overlay.show{display:flex}
</style>
</head>
<body>

<div id="splash">
  <div id="splash-ico">&#x1F681;</div>
  <div id="splash-title">DRONELAB PRO</div>
  <div id="splash-sub">LOADING SIMULATION ENGINE...</div>
</div>

<div id="drop-overlay">
  <div>&#x1F4E6;</div>
  <div style="font-size:13px">Drop .glb / .gltf to load custom drone model</div>
</div>

<!-- HEADER -->
<div id="hdr">
  <a id="logo" href="#">
    <div id="logo-box">&#x1F681;</div>
    <div id="logo-name">Drone<b>Lab</b></div>
  </a>
  <div class="tag">PRO</div>
  <div id="htabs">
    <button class="htab on" data-view="both">&#x2B1B; Split</button>
    <button class="htab" data-view="sim">&#x1F310; Sim Only</button>
    <button class="htab" data-view="code">&#x1F4DD; Code Only</button>
  </div>
  <div id="hdr-right">
    <div id="dot"></div>
    <button class="hbtn desk-only" id="btn-save">&#x1F4BE; Save</button>
    <button class="hbtn desk-only" id="btn-load">&#x1F4C2; Load</button>
    <button class="hbtn desk-only" id="btn-model">&#x1F4E6; Model</button>
    <button class="hbtn" id="btn-theme">&#x1F319;</button>
    <button class="hbtn" id="btn-run">&#x25B6; Run</button>
    <button class="hbtn" id="btn-stop">&#x26D4; Stop</button>
  </div>
</div>

<input type="file" id="file-py" accept=".py" style="display:none">
<input type="file" id="file-glb" accept=".glb,.gltf" style="display:none">

<div id="main">
  <!-- SIMULATION -->
  <div id="sim-pane" class="show">
    <div id="sim-bar">
      <label>ENV</label>
      <select class="sctl" id="env-select">
        <option value="night" selected>&#x1F319; Night</option>
        <option value="day">&#x2600; Day</option>
        <option value="afternoon">&#x26C5; Afternoon</option>
        <option value="evening">&#x1F305; Evening</option>
        <option value="indoor">&#x1F3E0; Indoor</option>
        <option value="grass">&#x1F33F; Grass</option>
        <option value="road">&#x1F6E3; Road</option>
        <option value="mountain">&#x26F0; Mountain</option>
      </select>
      <label>DRONE</label>
      <select class="sctl" id="drone-select">
        <option value="mavic">DJI Mavic</option>
        <option value="racing">Racing</option>
        <option value="delivery">Delivery</option>
        <option value="custom">Custom GLB</option>
      </select>
      <button class="sctl" id="btn-reset-cam">&#x29BB; Reset View</button>
    </div>
    <div id="cvs-wrap">
      <canvas id="cvs"></canvas>
      <div id="hud">
        <div class="hrow">
          <div class="hchip"><span class="hlbl">X</span><span class="hval" id="hud-x">0.0</span></div>
          <div class="hchip"><span class="hlbl">Y</span><span class="hval" id="hud-y">0.0</span></div>
          <div class="hchip"><span class="hlbl">ALT</span><span class="hval" id="hud-z">0.0m</span></div>
        </div>
        <div class="hrow">
          <div class="hchip"><span class="hlbl">YAW</span><span class="hval" id="hud-yaw">0</span></div>
          <div class="hchip"><span class="hlbl">BAT</span><span class="hval" id="hud-bat" style="color:#3fb950">100%</span></div>
          <div class="hchip"><span class="hlbl">STATUS</span><span class="hval" id="hud-status" style="color:#8b949e">IDLE</span></div>
        </div>
      </div>
      <div id="sim-hint">Drag: orbit | Scroll: zoom | Right-drag: pan | Pinch: zoom</div>
    </div>
  </div>

  <div id="splitter"></div>

  <!-- CODE -->
  <div id="code-pane">
    <div id="code-tabs">
      <div class="ctab on"><div class="ctab-dot"></div>mission.py</div>
      <div class="ctab-actions">
        <button class="hbtn" id="mob-save">&#x1F4BE;</button>
        <button class="hbtn" id="mob-load">&#x1F4C2;</button>
        <button class="hbtn" id="mob-model">&#x1F4E6;</button>
      </div>
    </div>
    <div id="editor-wrap"><textarea id="editor"></textarea></div>
    <div id="console">
      <div id="con-hdr">
        <span>&#x25B8; Console</span>
        <button onclick="document.getElementById('console-out').innerHTML=''">Clear</button>
      </div>
      <div id="console-out"></div>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div id="mob-nav">
  <button class="mnbtn on" id="mob-sim"><span class="mico">&#x1F310;</span><span class="mlbl">SIM</span></button>
  <button class="mnbtn" id="mob-code"><span class="mico">&#x1F4DD;</span><span class="mlbl">CODE</span></button>
  <button class="mnbtn" id="mob-run-btn"><span class="mico" id="mob-run-ico">&#x25B6;</span><span class="mlbl">RUN</span></button>
  <button class="mnbtn" id="mob-mdl"><span class="mico">&#x1F4E6;</span><span class="mlbl">MODEL</span></button>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════
// DEFAULT CODE  (exact same style as Google AI Studio)
// ══════════════════════════════════════════════════
var DEFAULT_CODE = [
  "# DroneLab Pro - PySimverse API",
  "# Based on FreeCodeCamp tutorial by Murtaza Hassan",
  "from pysimverse import Drone",
  "",
  "drone = Drone()",
  "drone.connect()",
  "",
  "# Basic square flight",
  "drone.takeoff(height=5)",
  "",
  "for i in range(4):",
  "    drone.move_forward(distance=3)",
  "    drone.rotate_cw(degrees=90)",
  "",
  "# Sensor readings",
  "pos = drone.get_position()",
  "print('Position: ' + str(pos))",
  "print('Battery: ' + str(drone.get_battery()) + '%')",
  "",
  "# Spiral ascent",
  "drone.move_up(distance=2)",
  "drone.spiral(radius=2, height=3, turns=2)",
  "",
  "# Orbit",
  "drone.go_to(x=0, y=0, z=6)",
  "drone.orbit(cx=0, cy=0, radius=3, laps=1)",
  "",
  "# Stunt",
  "drone.go_to(x=0, y=0, z=5)",
  "drone.flip('forward')",
  "drone.hover(seconds=1)",
  "",
  "# CV Missions (FreeCodeCamp advanced)",
  "face = drone.detect_face()",
  "print('Face: ' + str(face['detected']))",
  "",
  "gesture = drone.detect_gesture()",
  "print('Gesture: ' + str(gesture))",
  "",
  "drone.follow_line(path=[[0,0],[2,0],[4,2],[6,2]], height=2)",
  "",
  "# Return and land",
  "drone.return_home()",
  "drone.land()",
  "print('Mission complete!')"
].join('\n');

// ══════════════════════════════════════════════════
// PYSIMVERSE PYTHON SOURCE
// Exactly matching Google AI Studio working pattern:
// Uses _drone_* builtins (single underscore)
// ══════════════════════════════════════════════════
var PYSIMVERSE_SOURCE = [
  "class Drone:",
  "    def __init__(self): pass",
  "    def connect(self): _drone_connect()",
  "    def disconnect(self): _drone_disconnect()",
  "    def takeoff(self, height=3): _drone_takeoff(height)",
  "    def land(self): _drone_land()",
  "    def hover(self, seconds=1): _drone_hover(seconds)",
  "    def return_home(self): _drone_return_home()",
  "    def emergency_land(self): _drone_land()",
  "    def move_forward(self, distance=1, speed=1): _drone_move('forward', distance, speed)",
  "    def move_backward(self, distance=1, speed=1): _drone_move('backward', distance, speed)",
  "    def move_left(self, distance=1, speed=1): _drone_move('left', distance, speed)",
  "    def move_right(self, distance=1, speed=1): _drone_move('right', distance, speed)",
  "    def move_up(self, distance=1): _drone_move('up', distance, 1)",
  "    def move_down(self, distance=1): _drone_move('down', distance, 1)",
  "    def go_to(self, x=0, y=0, z=0, speed=1): _drone_goto(x, y, z, speed)",
  "    def set_position(self, x=0, y=0, z=0, speed=1): _drone_goto(x, y, z, speed)",
  "    def rotate_cw(self, degrees=90): _drone_rotate(degrees)",
  "    def rotate_ccw(self, degrees=90): _drone_rotate(-degrees)",
  "    def set_yaw(self, angle=0): _drone_setyaw(angle)",
  "    def set_speed(self, speed=1): _drone_setspeed(speed)",
  "    def flip(self, direction='forward'): _drone_flip(direction)",
  "    def flip_forward(self): _drone_flip('forward')",
  "    def flip_backward(self): _drone_flip('backward')",
  "    def flip_left(self): _drone_flip('left')",
  "    def flip_right(self): _drone_flip('right')",
  "    def orbit(self, cx=0, cy=0, radius=2, laps=1, direction='cw'): _drone_orbit(cx, cy, radius, laps, direction)",
  "    def circle(self, radius=2, laps=1): _drone_circle(radius, laps)",
  "    def spiral(self, radius=2, height=4, turns=2): _drone_spiral(radius, height, turns)",
  "    def figure_8(self, size=3): _drone_figure8(size)",
  "    def square(self, size=2): _drone_square(size)",
  "    def triangle(self, size=2): _drone_triangle(size)",
  "    def patrol(self, waypoints): _drone_patrol(waypoints)",
  "    def lawnmower(self, width=8, length=6, rows=4): _drone_lawnmower(width, length, rows)",
  "    def zigzag(self, width=2, distance=5, steps=6): _drone_zigzag(width, distance, steps)",
  "    def take_photo(self): _drone_takephoto()",
  "    def set_camera_angle(self, pitch=0, yaw=0): _drone_cameraangle(pitch, yaw)",
  "    def detect_face(self): return _drone_detectface()",
  "    def detect_gesture(self): return _drone_detectgesture()",
  "    def detect_object(self, label='object'): return _drone_detectobject(label)",
  "    def follow_line(self, path, height=0): _drone_followline(path, height)",
  "    def follow_body(self): _drone_followbody()",
  "    def detect_color(self, color='red'): return _drone_detectcolor(color)",
  "    def detect_qr(self): return _drone_detectqr()",
  "    def navigate_to_room(self, room='garage'): _drone_navroom(room)",
  "    def get_position(self): return _drone_getpos()",
  "    def get_altitude(self): return _drone_getalt()",
  "    def get_x(self): return _drone_getx()",
  "    def get_y(self): return _drone_gety()",
  "    def get_yaw(self): return _drone_getyaw()",
  "    def get_speed(self): return _drone_getspeed()",
  "    def get_battery(self): return _drone_getbat()",
  "    def is_flying(self): return _drone_isflying()",
  "    def distance_to(self, x=0, y=0, z=0): return _drone_distto(x, y, z)",
  "    def print_status(self): _drone_status()",
  "    def log(self, msg): print(str(msg))"
].join('\n');

// ══════════════════════════════════════════════════
// COMMAND QUEUE & VIRTUAL STATE
// Python fills this queue synchronously, then
// we animate it with requestAnimationFrame
// ══════════════════════════════════════════════════
var cmdQueue = [];
var vX=0, vY=0, vZ=0, vYaw=0, vSpd=1, vBat=100, vFlying=false;

function resetVirtualState() {
  cmdQueue = [];
  vX=0; vY=0; vZ=0; vYaw=0; vSpd=1; vBat=100; vFlying=false;
}

function pushCmd(type, params, duration, logMsg) {
  cmdQueue.push({ type: type, params: params || {}, duration: duration || 500, log: logMsg || null });
}

// Called by Python builtins - updates virtual state + pushes command
function pyCmdTakeoff(h) {
  if (vFlying) return;
  vFlying = true;
  var dur = Math.max(800, h * 380);
  pushCmd('goto', { tx:vX, ty:vY, tz:h, tyaw:vYaw }, dur, 'takeoff(height='+h+')');
  vZ = h;
}
function pyCmdLand() {
  vFlying = false;
  var dur = Math.max(800, vZ * 380);
  pushCmd('goto', { tx:vX, ty:vY, tz:0, tyaw:vYaw }, dur, 'land()');
  vZ = 0;
}
function pyCmdHover(s) { pushCmd('hover', {}, s * 1000, 'hover('+s+'s)'); }
function pyCmdReturnHome() {
  var d = Math.hypot(vX, vY);
  pushCmd('goto', { tx:0, ty:0, tz:vZ, tyaw:vYaw }, Math.max(600, d*380/vSpd), 'return_home()');
  vX=0; vY=0;
}
function pyCmdMove(dir, dist, spd) {
  if (spd > 0) vSpd = Math.min(5, Math.max(0.1, spd));
  var r = vYaw * Math.PI / 180;
  var nx=vX, ny=vY, nz=vZ;
  if (dir==='forward')  { nx+=Math.sin(r)*dist; ny+=Math.cos(r)*dist; }
  else if (dir==='backward'){ nx-=Math.sin(r)*dist; ny-=Math.cos(r)*dist; }
  else if (dir==='left')  { nx-=Math.cos(r)*dist; ny+=Math.sin(r)*dist; }
  else if (dir==='right') { nx+=Math.cos(r)*dist; ny-=Math.sin(r)*dist; }
  else if (dir==='up')    { nz+=dist; }
  else if (dir==='down')  { nz=Math.max(0,nz-dist); }
  pushCmd('goto', { tx:nx, ty:ny, tz:nz, tyaw:vYaw }, Math.max(300, dist*380/vSpd), dir+'('+dist+')');
  vX=nx; vY=ny; vZ=nz;
}
function pyCmdGoto(x, y, z, spd) {
  if (spd > 0) vSpd = Math.min(5, Math.max(0.1, spd));
  var d = Math.hypot(x-vX, y-vY, z-vZ);
  pushCmd('goto', { tx:x, ty:y, tz:z, tyaw:vYaw }, Math.max(400, d*380/vSpd), 'go_to('+x.toFixed(1)+','+y.toFixed(1)+','+z.toFixed(1)+')');
  vX=x; vY=y; vZ=z;
}
function pyCmdRotate(deg) {
  pushCmd('goto', { tx:vX, ty:vY, tz:vZ, tyaw:vYaw+deg }, Math.max(250, Math.abs(deg)*10/vSpd), 'rotate('+deg+'deg)');
  vYaw+=deg;
}
function pyCmdSetYaw(a) {
  pushCmd('goto', { tx:vX, ty:vY, tz:vZ, tyaw:a }, 350, 'set_yaw('+a+')');
  vYaw=a;
}
function pyCmdFlip(dir) { pushCmd('flip', { dir:dir }, 700, "flip('"+dir+"')"); }
function pyCmdOrbit(cx, cy, radius, laps, direction) {
  var dd = direction==='ccw' ? -1 : 1;
  var steps = Math.ceil(44 * laps);
  log('orbit(r='+radius+',laps='+laps+')', 'sys');
  for (var i=1; i<=steps; i++) {
    var a = dd*(i/44)*Math.PI*2;
    var nx=cx+radius*Math.cos(a), ny=cy+radius*Math.sin(a);
    pushCmd('goto', { tx:nx, ty:ny, tz:vZ, tyaw:vYaw }, 90, null);
    vX=nx; vY=ny;
  }
}
function pyCmdCircle(radius, laps) {
  var steps=Math.ceil(44*laps), sx=vX, sy=vY;
  log('circle(r='+radius+')', 'sys');
  for (var i=1; i<=steps; i++) {
    var a=(i/44)*Math.PI*2;
    var nx=sx+radius*Math.sin(a), ny=sy+radius-radius*Math.cos(a);
    pushCmd('goto', { tx:nx, ty:ny, tz:vZ, tyaw:vYaw }, 90, null);
    vX=nx; vY=ny;
  }
}
function pyCmdSpiral(radius, height, turns) {
  var steps=Math.ceil(44*turns), sx=vX, sy=vY, sz=vZ;
  log('spiral(r='+radius+',h='+height+')', 'sys');
  for (var i=1; i<=steps; i++) {
    var a=(i/44)*Math.PI*2;
    var nx=sx+radius*Math.cos(a), ny=sy+radius*Math.sin(a), nz=sz+height*(i/steps);
    pushCmd('goto', { tx:nx, ty:ny, tz:nz, tyaw:vYaw }, 90, null);
    vX=nx; vY=ny; vZ=nz;
  }
}
function pyCmdFigure8(size) {
  var cx=vX, cy=vY;
  log('figure_8(size='+size+')', 'sys');
  for (var i=1;i<=36;i++) { var a=(i/36)*Math.PI*2; pushCmd('goto',{tx:cx+size*Math.sin(a),ty:cy+size*Math.sin(a)*Math.cos(a),tz:vZ,tyaw:vYaw},90,null); }
  for (var i=1;i<=36;i++) { var a=(i/36)*Math.PI*2; pushCmd('goto',{tx:cx-size*Math.sin(a),ty:cy+size*Math.sin(a)*Math.cos(a),tz:vZ,tyaw:vYaw},90,null); }
}
function pyCmdSquare(size) {
  log('square('+size+')', 'sys');
  for (var i=0;i<4;i++) { pyCmdMove('forward',size,1); pyCmdRotate(90); }
}
function pyCmdTriangle(size) {
  log('triangle('+size+')', 'sys');
  for (var i=0;i<3;i++) { pyCmdMove('forward',size,1); pyCmdRotate(120); }
}
function pyCmdPatrol(wps) {
  log('patrol('+wps.length+' pts)', 'sys');
  for (var i=0;i<wps.length;i++) { var wp=wps[i], a=Array.isArray(wp)?wp:Object.values(wp); pyCmdGoto(+a[0]||0,+a[1]||0,a[2]!=null?+a[2]:vZ,1); }
}
function pyCmdLawnmower(w,l,rows) {
  log('lawnmower', 'sys'); var sp=w/rows;
  for (var i=0;i<=rows;i++) { var x=-w/2+i*sp; pyCmdGoto(x,vY,vZ,1); pyCmdGoto(x,vY+(i%2===0?l:-l),vZ,1); }
}
function pyCmdZigzag(w,d,n) {
  log('zigzag', 'sys'); var step=d/n;
  for (var i=0;i<n;i++) { var r=vYaw*Math.PI/180; var side=i%2===0?w:-w; var nx=vX+Math.sin(r)*step+Math.cos(r)*side, ny=vY+Math.cos(r)*step-Math.sin(r)*side; pushCmd('goto',{tx:nx,ty:ny,tz:vZ,tyaw:vYaw},Math.max(200,step*300),null); vX=nx; vY=ny; }
}
function pyCmdFollowLine(path, height) {
  log('follow_line('+path.length+' pts)', 'sys');
  var ht=height||vZ;
  for (var i=0;i<path.length;i++) { var pt=path[i], a=Array.isArray(pt)?pt:Object.values(pt); pushCmd('goto',{tx:+a[0]||0,ty:+a[1]||0,tz:ht,tyaw:vYaw},300,'->('+a[0]+','+a[1]+')'); vX=+a[0]||0; vY=+a[1]||0; }
}

// SKULPT SETUP
// Register _drone_* builtins (exact same naming as Google AI Studio)
// Called BEFORE Sk.configure and BEFORE Python execution
// ══════════════════════════════════════════════════
function setupSkulptBuiltins() {
  var b = Sk.builtins;
  var NONE = Sk.builtin.none.none$;

  function skfn(fn) { return new Sk.builtin.func(fn); }
  function jsVal(v, def) {
    if (def === undefined) def = 0;
    if (v == null || v === NONE) return def;
    return Sk.ffi.remapToJs(v);
  }

  b._drone_connect    = skfn(function() { log('drone.connect()', 'ok'); beep(440,.1); return NONE; });
  b._drone_disconnect = skfn(function() { log('drone.disconnect()', 'sys'); return NONE; });
  b._drone_takeoff    = skfn(function(h)   { pyCmdTakeoff(jsVal(h,3)); return NONE; });
  b._drone_land       = skfn(function()    { pyCmdLand(); return NONE; });
  b._drone_hover      = skfn(function(s)   { pyCmdHover(jsVal(s,1)); return NONE; });
  b._drone_return_home= skfn(function()    { pyCmdReturnHome(); return NONE; });
  b._drone_move       = skfn(function(dir,dist,spd) { pyCmdMove(jsVal(dir,'forward'),jsVal(dist,1),jsVal(spd,1)); return NONE; });
  b._drone_goto       = skfn(function(x,y,z,spd) { pyCmdGoto(jsVal(x,0),jsVal(y,0),jsVal(z,vZ),jsVal(spd,1)); return NONE; });
  b._drone_rotate     = skfn(function(deg) { pyCmdRotate(jsVal(deg,90)); return NONE; });
  b._drone_setyaw     = skfn(function(a)   { pyCmdSetYaw(jsVal(a,0)); return NONE; });
  b._drone_setspeed   = skfn(function(s)   { vSpd=Math.max(.1,Math.min(5,jsVal(s,1))); return NONE; });
  b._drone_flip       = skfn(function(dir) { pyCmdFlip(jsVal(dir,'forward')); return NONE; });
  b._drone_orbit      = skfn(function(cx,cy,r,laps,dir) { pyCmdOrbit(jsVal(cx,0),jsVal(cy,0),jsVal(r,2),jsVal(laps,1),jsVal(dir,'cw')); return NONE; });
  b._drone_circle     = skfn(function(r,laps) { pyCmdCircle(jsVal(r,2),jsVal(laps,1)); return NONE; });
  b._drone_spiral     = skfn(function(r,h,t) { pyCmdSpiral(jsVal(r,2),jsVal(h,4),jsVal(t,2)); return NONE; });
  b._drone_figure8    = skfn(function(size) { pyCmdFigure8(jsVal(size,3)); return NONE; });
  b._drone_square     = skfn(function(size) { pyCmdSquare(jsVal(size,2)); return NONE; });
  b._drone_triangle   = skfn(function(size) { pyCmdTriangle(jsVal(size,2)); return NONE; });
  b._drone_patrol     = skfn(function(wps) { pyCmdPatrol(Sk.ffi.remapToJs(wps)); return NONE; });
  b._drone_lawnmower  = skfn(function(w,l,rows) { pyCmdLawnmower(jsVal(w,8),jsVal(l,6),jsVal(rows,4)); return NONE; });
  b._drone_zigzag     = skfn(function(w,d,n) { pyCmdZigzag(jsVal(w,2),jsVal(d,5),jsVal(n,6)); return NONE; });
  b._drone_takephoto  = skfn(function() { log('take_photo() - snap!','sys'); beep(1200,.08); return NONE; });
  b._drone_cameraangle= skfn(function(p,y) { log('camera_angle('+jsVal(p)+','+jsVal(y)+')','sys'); return NONE; });
  // CV simulated
  b._drone_detectface = skfn(function() { var x=+(Math.random()*.4-.2).toFixed(3),y=+(Math.random()*.4-.2).toFixed(3); log('detect_face() -> ('+x+','+y+')','sys'); return Sk.ffi.remapToPy({detected:true,x:x,y:y,confidence:.92,label:'human_face'}); });
  b._drone_detectgesture = skfn(function() { var gs=['pointing','peace','thumbs_up','open_hand','fist','okay']; var g=gs[Math.floor(Math.random()*gs.length)]; log('detect_gesture() -> '+g,'sys'); return Sk.ffi.remapToPy(g); });
  b._drone_detectobject = skfn(function(label) { var l=jsVal(label,'object'); log('detect_object("'+l+'")','sys'); return Sk.ffi.remapToPy({detected:Math.random()>.3,label:l,confidence:+(Math.random()*.3+.7).toFixed(2)}); });
  b._drone_followline = skfn(function(path,height) { pyCmdFollowLine(Sk.ffi.remapToJs(path),jsVal(height,vZ)); return NONE; });
  b._drone_followbody = skfn(function() { log('follow_body()','sys'); pyCmdMove('forward',2,1); return NONE; });
  b._drone_detectcolor= skfn(function(c) { var cl=jsVal(c,'red'); log('detect_color("'+cl+'")','sys'); return Sk.ffi.remapToPy({detected:Math.random()>.3,color:cl}); });
  b._drone_detectqr   = skfn(function() { log('detect_qr() -> DRONELAB-1','sys'); return Sk.ffi.remapToPy({detected:true,data:'DRONELAB-1'}); });
  b._drone_navroom    = skfn(function(room) { var r=jsVal(room,'garage'); log('navigate_to_room("'+r+'")','sys'); pyCmdGoto(vX+3,vY+3,vZ,1); return NONE; });
  // Sensors
  b._drone_getpos   = skfn(function() { return Sk.ffi.remapToPy([+vX.toFixed(3),+vY.toFixed(3),+vZ.toFixed(3)]); });
  b._drone_getalt   = skfn(function() { return Sk.ffi.remapToPy(+vZ.toFixed(3)); });
  b._drone_getx     = skfn(function() { return Sk.ffi.remapToPy(+vX.toFixed(3)); });
  b._drone_gety     = skfn(function() { return Sk.ffi.remapToPy(+vY.toFixed(3)); });
  b._drone_getyaw   = skfn(function() { return Sk.ffi.remapToPy(+vYaw.toFixed(1)); });
  b._drone_getspeed = skfn(function() { return Sk.ffi.remapToPy(vSpd); });
  b._drone_getbat   = skfn(function() { return Sk.ffi.remapToPy(Math.round(vBat)); });
  b._drone_isflying = skfn(function() { return vFlying ? Sk.builtin.bool.true$ : Sk.builtin.bool.false$; });
  b._drone_distto   = skfn(function(x,y,z) { return Sk.ffi.remapToPy(Math.hypot(jsVal(x)-vX,jsVal(y)-vY,jsVal(z)-vZ)); });
  b._drone_status   = skfn(function() { log('x='+vX.toFixed(1)+' y='+vY.toFixed(1)+' z='+vZ.toFixed(1)+' yaw='+vYaw.toFixed(0)+' bat='+Math.round(vBat)+'%','sys'); return NONE; });
}

// ══════════════════════════════════════════════════
// SKULPT READ FUNCTION
// filename.includes('pysimverse') catches ALL patterns
// Exact pattern from Google AI Studio working code
// ══════════════════════════════════════════════════
function skulptRead(filename) {
  if (filename.includes('pysimverse')) {
    return PYSIMVERSE_SOURCE;
  }
  if (Sk.builtinFiles && Sk.builtinFiles['files'] && Sk.builtinFiles['files'][filename] !== undefined) {
    return Sk.builtinFiles['files'][filename];
  }
  throw new Error('File not found: ' + filename);
}

var canvas = document.getElementById('cvs');
var cvwrap = document.getElementById('cvs-wrap');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(50, 1, 0.05, 600);
var camR=20, camTh=42, camPh=30;
var camTarget = new THREE.Vector3(0, 2, 0);
var panOffset = new THREE.Vector3();

function updateCamera() {
  var ph=camPh*Math.PI/180, th=camTh*Math.PI/180;
  camera.position.set(
    camTarget.x+panOffset.x + camR*Math.cos(ph)*Math.sin(th),
    camTarget.y+panOffset.y + camR*Math.sin(ph),
    camTarget.z+panOffset.z + camR*Math.cos(ph)*Math.cos(th)
  );
  camera.lookAt(camTarget.x+panOffset.x, camTarget.y+panOffset.y, camTarget.z+panOffset.z);
}

function resizeRenderer() {
  var W=cvwrap.clientWidth||1, H=cvwrap.clientHeight||1;
  renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeRenderer);
new ResizeObserver(resizeRenderer).observe(cvwrap);

// Mouse/touch orbit
var isDragging=false, lastMX=0, lastMY=0, isRMB=false, pinchDist=0;
canvas.addEventListener('mousedown', function(e) { isDragging=true; lastMX=e.clientX; lastMY=e.clientY; isRMB=e.button===2; e.preventDefault(); });
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var dx=e.clientX-lastMX, dy=e.clientY-lastMY; lastMX=e.clientX; lastMY=e.clientY;
  if (isRMB) { panOffset.x-=dx*.022; panOffset.z-=dy*.022; }
  else { camTh-=dx*.38; camPh=Math.max(3,Math.min(88,camPh+dy*.30)); }
});
document.addEventListener('mouseup', function() { isDragging=false; });
canvas.addEventListener('wheel', function(e) { camR=Math.max(3,Math.min(80,camR+e.deltaY*.045)); }, {passive:true});
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length===1) { isDragging=true; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; }
  if (e.touches.length===2) { isDragging=false; pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
}, {passive:false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length===1&&isDragging) { camTh-=(e.touches[0].clientX-lastMX)*.42; camPh=Math.max(3,Math.min(88,camPh+(e.touches[0].clientY-lastMY)*.32)); lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; }
  if (e.touches.length===2) { var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); camR=Math.max(3,Math.min(80,camR-(d-pinchDist)*.05)); pinchDist=d; }
}, {passive:false});
canvas.addEventListener('touchend', function() { isDragging=false; });
document.getElementById('btn-reset-cam').onclick = function() { camR=20; camTh=42; camPh=30; panOffset.set(0,0,0); camTarget.set(0,2,0); };

var envObjs=[], sunLight, fillLight, ambLight;
var ENV_CONFIGS = {
  night:    {sky:0x020508,fog:0x060a12,fd:.022,si:.35,sc:0x5577aa,sp:[12,22,8], ai:.18,ac:0x1a2244},
  day:      {sky:0x5bb8e8,fog:0x99d4ef,fd:.010,si:1.2,sc:0xfffbe0,sp:[22,44,18],ai:.65,ac:0xfff5dd},
  afternoon:{sky:0x5a9ec8,fog:0x88c8e0,fd:.011,si:1.0,sc:0xffd888,sp:[10,28,22],ai:.55,ac:0xffeedd},
  evening:  {sky:0x16082e,fog:0x2e1222,fd:.020,si:.65,sc:0xff5522,sp:[-4,9,22], ai:.30,ac:0xff8844},
  indoor:   {sky:0x181824,fog:0x181824,fd:.050,si:.85,sc:0xfff5cc,sp:[0,12,0],  ai:.55,ac:0xfff2cc},
  grass:    {sky:0x5bbee2,fog:0x88d8ee,fd:.010,si:1.1,sc:0xffffff,sp:[16,38,12],ai:.60,ac:0xddfadd},
  road:     {sky:0x78b0cc,fog:0x99c8de,fd:.011,si:1.0,sc:0xffffff,sp:[22,32,12],ai:.52,ac:0xddeeff},
  mountain: {sky:0x325a74,fog:0x224466,fd:.016,si:.92,sc:0xffeebb,sp:[22,44,6], ai:.42,ac:0xddeeff}
};

function buildMesh(geo, color) { var m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:color})); m.castShadow=true; m.receiveShadow=true; return m; }
function makeStarField(n, range, ymin, ymax) {
  var pts=[]; for(var i=0;i<n;i++) pts.push((Math.random()-.5)*range,Math.random()*(ymax-ymin)+ymin,(Math.random()-.5)*range);
  var g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  return new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff,size:.22,transparent:true,opacity:.9}));
}

function setEnvironment(key) {
  envObjs.forEach(function(o){scene.remove(o);}); envObjs=[];
  var E = ENV_CONFIGS[key] || ENV_CONFIGS.night;
  renderer.setClearColor(E.sky); scene.background=new THREE.Color(E.sky);
  scene.fog = new THREE.FogExp2(E.fog, E.fd);
  if(sunLight)scene.remove(sunLight); if(fillLight)scene.remove(fillLight); if(ambLight)scene.remove(ambLight);
  ambLight=new THREE.AmbientLight(E.ac, E.ai);
  sunLight=new THREE.DirectionalLight(E.sc, E.si); sunLight.position.set(E.sp[0],E.sp[1],E.sp[2]); sunLight.castShadow=true;
  sunLight.shadow.mapSize.set(2048,2048); sunLight.shadow.camera.left=-45; sunLight.shadow.camera.right=45; sunLight.shadow.camera.bottom=-45; sunLight.shadow.camera.top=45; sunLight.shadow.camera.near=.5; sunLight.shadow.camera.far=130;
  fillLight=new THREE.PointLight(0x00e5ff,.4,40); fillLight.position.set(-8,10,-8);
  scene.add(ambLight,sunLight,fillLight);

  function add(o){scene.add(o);envObjs.push(o);}
  function floor(c,s){s=s||120;var m=buildMesh(new THREE.PlaneGeometry(s,s),c);m.rotation.x=-Math.PI/2;return m;}

  if(key==='night'){
    add(floor(0x060810)); add(new THREE.GridHelper(100,50,0x0d2030,0x0a1820));
    add(makeStarField(800,300,15,90));
    var moon=new THREE.Mesh(new THREE.SphereGeometry(3.5,14,10),new THREE.MeshBasicMaterial({color:0xeeeedd}));moon.position.set(-50,56,-65);add(moon);
    for(var i=-2;i<=2;i++){
      var pole=buildMesh(new THREE.CylinderGeometry(.1,.1,5.5,6),0x334455);pole.position.set(i*10,2.75,16);add(pole);
      var bulb=new THREE.Mesh(new THREE.SphereGeometry(.3,7,7),new THREE.MeshBasicMaterial({color:0xffee88}));bulb.position.set(i*10,5.65,16);add(bulb);
      var pl=new THREE.PointLight(0xffee88,.9,14);pl.position.set(i*10,5.3,16);add(pl);
    }
  } else if(key==='day'||key==='afternoon'){
    add(floor(0x4a9038));
    var grid=new THREE.GridHelper(100,50,0x2a7020,0x2a7020);grid.material.opacity=.28;grid.material.transparent=true;add(grid);
    for(var t=0;t<10;t++){var tx=(Math.random()-.5)*80,tz=(Math.random()-.5)*80;if(Math.abs(tx)<10&&Math.abs(tz)<10)continue;var trunk=buildMesh(new THREE.CylinderGeometry(.3,.5,3,7),0x5a3200);trunk.position.set(tx,1.5,tz);add(trunk);var top=buildMesh(new THREE.ConeGeometry(1.8,3.5,8),0x267a26);top.position.set(tx,4.5,tz);add(top);}
    for(var c=0;c<6;c++){var cloud=buildMesh(new THREE.SphereGeometry(2+Math.random()*3,8,6),0xffffff);cloud.position.set((Math.random()-.5)*80,25+Math.random()*15,(Math.random()-.5)*80);add(cloud);}
  } else if(key==='evening'){
    add(floor(0x2a1a10)); add(makeStarField(600,300,18,90));
    var glow=new THREE.Mesh(new THREE.PlaneGeometry(140,20),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.18,side:THREE.DoubleSide}));glow.rotation.y=Math.PI/2;glow.position.set(-50,6,0);add(glow);
  } else if(key==='indoor'){
    add(floor(0x8a7a68,22));
    var rm=new THREE.Mesh(new THREE.BoxGeometry(24,14,24),new THREE.MeshLambertMaterial({color:0xc8b898,side:THREE.BackSide}));rm.position.y=7;add(rm);

var droneGroup=null, propGroups=[], dronePointLight=null, customModel=null;

function phong(color, shininess, specular, transparent, opacity, side) {
  return new THREE.MeshPhongMaterial({color:color,shininess:shininess||100,specular:specular||0,transparent:transparent||false,opacity:opacity!==undefined?opacity:1,side:side||THREE.FrontSide});
}
function addPart(group, geo, mat, px, py, pz, rx, ry, rz) {
  px=px||0;py=py||0;pz=pz||0;rx=rx||0;ry=ry||0;rz=rz||0;
  var m=new THREE.Mesh(geo,mat); m.position.set(px,py,pz); m.rotation.set(rx,ry,rz); m.castShadow=true; group.add(m); return m;
}

function buildMavicDrone() {
  var G=new THREE.Group();
  var mBody=phong(0x1e2a38,160,0x5588bb), mDark=phong(0x0e1520,80), mArm=phong(0x16202e,60);
  var mMotor=phong(0x080e18,220,0x336699), mProp=phong(0x2a3848,30,0,true,.82,THREE.DoubleSide);
  var mGlass=phong(0x001828,280,0x88ccff,true,.65);
  var mLED=new THREE.MeshBasicMaterial({color:0x00e5ff}), mRed=new THREE.MeshBasicMaterial({color:0xff2222}), mGrn=new THREE.MeshBasicMaterial({color:0x22ff55});

  addPart(G, new THREE.BoxGeometry(2.3,.3,1.1), mBody);
  addPart(G, new THREE.BoxGeometry(1.1,.2,.68), mBody, -.1,.25,0);
  addPart(G, new THREE.BoxGeometry(.25,.2,.88), mDark, .97,-.04,0);
  addPart(G, new THREE.BoxGeometry(.52,.04,.05), mLED, .72,.18,0);

  propGroups = [];
  var motorPos = [[1.85,0,-1.85],[1.85,0,1.85],[-1.85,0,-1.85],[-1.85,0,1.85]];
  for (var i=0; i<motorPos.length; i++) {
    var mx=motorPos[i][0], mz=motorPos[i][2];
    var armLen=Math.sqrt(mx*mx+mz*mz)*.88;
    var armAngle=Math.atan2(mx,mz);
    addPart(G, new THREE.BoxGeometry(armLen,.09,.09), mArm, mx*.5,0,mz*.5, 0,armAngle,0);
    addPart(G, new THREE.CylinderGeometry(.24,.24,.14,14), mMotor, mx,.07,mz);
    addPart(G, new THREE.CylinderGeometry(.15,.2,.1,12), mMotor, mx,.17,mz);
    var pg=new THREE.Group(); pg.position.set(mx,.3,mz);
    for(var b=0;b<2;b++){var blade=new THREE.Mesh(new THREE.BoxGeometry(1.72,.02,.14),mProp);blade.rotation.set(0,b*Math.PI/2,.065);pg.add(blade);}
    pg.add(new THREE.Mesh(new THREE.CylinderGeometry(.06,.09,.06,8),mMotor));
    G.add(pg); propGroups.push(pg);
    var tipMat=i<2?mGrn:mRed; addPart(G,new THREE.SphereGeometry(.07,6,6),tipMat,mx,.31,mz);
  }
  var lzArr=[-0.58,0.58];
  for(var li=0;li<lzArr.length;li++){
    addPart(G,new THREE.BoxGeometry(1.85,.05,.07),mArm,0,-.28,lzArr[li]);
    addPart(G,new THREE.CylinderGeometry(.055,.055,.3,6),mArm,-0.68,-.14,lzArr[li]);
    addPart(G,new THREE.CylinderGeometry(.055,.055,.3,6),mArm,0.68,-.14,lzArr[li]);
  }
  addPart(G,new THREE.SphereGeometry(.17,10,8),mDark,.9,-.23,0);
  addPart(G,new THREE.SphereGeometry(.11,10,8),mGlass,1.0,-.23,0);
  dronePointLight=new THREE.PointLight(0x00e5ff,0,6); dronePointLight.position.set(0,-1.2,0); G.add(dronePointLight);
  G.traverse(function(c){if(c.isMesh)c.castShadow=true;});
  return G;
}

function buildRacingDrone() {
  var G=new THREE.Group(), mF=phong(0x1a0806,120,0xff3300), mA=phong(0x0a0808), mP=phong(0xff2222,30,0,true,.82,THREE.DoubleSide);
  G.add(new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,.1,5),mF)); propGroups=[];
  [[1,0,-1],[1,0,1],[-1,0,-1],[-1,0,1]].forEach(function(r,i){
    var rm=new THREE.Mesh(new THREE.BoxGeometry(Math.SQRT2*.9,.07,.07),mA);rm.position.set(r[0]*.5,0,r[2]*.5);rm.rotation.y=Math.atan2(r[0],r[2]);G.add(rm);
    var pg=new THREE.Group();pg.position.set(r[0],.12,r[2]);for(var b=0;b<2;b++){var bl=new THREE.Mesh(new THREE.BoxGeometry(1.3,.02,.11),mP);bl.rotation.y=b*Math.PI/2;pg.add(bl);}G.add(pg);propGroups.push(pg);
  });
  dronePointLight=new THREE.PointLight(0xff3300,0,4);dronePointLight.position.set(0,-.5,0);G.add(dronePointLight);
  G.traverse(function(c){if(c.isMesh)c.castShadow=true;});return G;
}

function buildDeliveryDrone() {
  var G=new THREE.Group(), mB=phong(0xf0eee0,110,0x4488aa), mA=phong(0xc8c2b8), mP=phong(0x8899aa,30,0,true,.8,THREE.DoubleSide), mBox=phong(0x2266cc,80,0x88aacc);
  G.add(new THREE.Mesh(new THREE.CylinderGeometry(.62,.62,.22,7),mB));
  var bx=new THREE.Mesh(new THREE.BoxGeometry(1.1,.7,1.1),mBox);bx.position.set(0,-.46,0);G.add(bx); propGroups=[];
  [0,60,120,180,240,300].forEach(function(angDeg){var ha=angDeg*Math.PI/180,hmx=2.1*Math.cos(ha),hmz=2.1*Math.sin(ha);var am=new THREE.Mesh(new THREE.BoxGeometry(2.1,.07,.07),mA);am.position.set(hmx*.5,0,hmz*.5);am.rotation.y=Math.atan2(hmx,hmz);G.add(am);var pg=new THREE.Group();pg.position.set(hmx,.14,hmz);for(var b=0;b<2;b++){var bl=new THREE.Mesh(new THREE.BoxGeometry(1.4,.02,.12),mP);bl.rotation.y=b*Math.PI/2;pg.add(bl);}G.add(pg);propGroups.push(pg);});
  dronePointLight=new THREE.PointLight(0xffffff,0,7);dronePointLight.position.set(0,-1,0);G.add(dronePointLight);
  G.traverse(function(c){if(c.isMesh)c.castShadow=true;});return G;
}

function setDroneModel(type) {
  if(droneGroup) scene.remove(droneGroup);
  propGroups=[]; dronePointLight=null;
  if(type==='custom'&&customModel){droneGroup=customModel;scene.add(droneGroup);return;}
  if(type==='racing') droneGroup=buildRacingDrone();
  else if(type==='delivery') droneGroup=buildDeliveryDrone();
  else droneGroup=buildMavicDrone();
  scene.add(droneGroup);
}

var audioCtx=null, propOsc=null, propGain=null, audioReady=false;
function initAudio(){if(audioReady)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();propOsc=audioCtx.createOscillator();var f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=190;propGain=audioCtx.createGain();propGain.gain.value=0;propOsc.type='sawtooth';propOsc.frequency.value=80;propOsc.connect(f);f.connect(propGain);propGain.connect(audioCtx.destination);propOsc.start();audioReady=true;}catch(e){}}
function setHum(v,f){if(!audioReady)return;propGain.gain.setTargetAtTime(v,audioCtx.currentTime,.28);propOsc.frequency.setTargetAtTime(f,audioCtx.currentTime,.45);}
function beep(f,d,v){f=f||880;d=d||.09;v=v||.1;if(!audioReady)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}
['click','touchstart'].forEach(function(ev){document.addEventListener(ev,initAudio,{once:true});});

// ══════════════════════════════════════════════════
// ANIMATION ENGINE
// Executes command queue with requestAnimationFrame
// This is the SAME pattern as Google AI Studio's useDrone.ts
// ══════════════════════════════════════════════════
var animating=false, stopFlag=false;
var droneX=0,droneY=0,droneZ=0,droneYaw=0,droneBat=100,droneFlying=false,droneFlipping=false;
var propSpeed=0, frameCount=0;

function executeCommands(queue) {
  if (!queue.length || stopFlag) {
    animating=false;
    if (!stopFlag) {
      log('Mission complete!', 'ok');
      beep(660,.2); setTimeout(function(){beep(880,.2);},240); setTimeout(function(){beep(1100,.3);},480);
    }
    setUIRunning(false);
    return;
  }

  var cmd = queue.shift();
  if (cmd.log) log(cmd.log, 'cmd');

  // Takeoff/land sounds
  if (cmd.type==='goto') {
    if (cmd.params.tz>.1&&droneZ<.1 && audioReady) { propOsc.frequency.setValueAtTime(62,audioCtx.currentTime); propOsc.frequency.linearRampToValueAtTime(135,audioCtx.currentTime+1.1); propGain.gain.setValueAtTime(0,audioCtx.currentTime); propGain.gain.linearRampToValueAtTime(.08,audioCtx.currentTime+1.1); }
    else if (cmd.params.tz<.1&&droneZ>.1 && audioReady) { propOsc.frequency.linearRampToValueAtTime(62,audioCtx.currentTime+1); propGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.6); }
    else beep(520,.05,.06);
  }

  var startX=droneX, startY=droneY, startZ=droneZ, startYaw=droneYaw;
  var startTime=performance.now(), dur=Math.max(50,cmd.duration||cmd.dur||500);

  function animate(ts) {
    if (stopFlag) { animating=false; setUIRunning(false); return; }
    var progress = Math.min((ts-startTime)/dur, 1);
    var e = progress<.5 ? 2*progress*progress : -1+(4-2*progress)*progress; // easeInOut

    if (cmd.type==='goto') {
      droneX = startX + (cmd.params.tx-startX)*e;
      droneY = startY + (cmd.params.ty-startY)*e;
      droneZ = startZ + (cmd.params.tz-startZ)*e;
      droneYaw = startYaw + (cmd.params.tyaw-startYaw)*e;
      droneFlying = droneZ > 0.05;
    } else if (cmd.type==='flip') {
      droneFlipping = progress < 1;
    }
    // hover: just waits the duration

    droneBat = Math.max(0, droneBat - 0.002);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      droneFlipping = false;
      if (cmd.type==='goto') { droneX=cmd.params.tx; droneY=cmd.params.ty; droneZ=cmd.params.tz; droneYaw=cmd.params.tyaw; droneFlying=droneZ>0.05; }
      executeCommands(queue); // next command
    }
  }
  requestAnimationFrame(animate);
}

// ══════════════════════════════════════════════════
// THREE.JS RENDER LOOP
// ══════════════════════════════════════════════════
function renderLoop() {
  frameCount++;

  // Update drone position/rotation in 3D world
  // Note: Three.js Y is up, so drone altitude = Y, XZ = horizontal plane
  if (droneGroup) {
    droneGroup.position.set(droneX, droneZ, droneY);
    droneGroup.rotation.y = -droneYaw * Math.PI / 180;
    droneGroup.rotation.x = droneFlipping ? Math.sin(frameCount * .3) * Math.PI * 1.8 : 0;
    droneGroup.rotation.z = 0;
  }

  // Spin propellers
  var targetPropSpeed = droneFlying ? (0.28 + vSpd * .05) : 0;
  propSpeed += (targetPropSpeed - propSpeed) * .09;
  for (var i=0; i<propGroups.length; i++) propGroups[i].rotation.y += propSpeed * (i%2===0?1:-1);

  // Drone glow
  if (dronePointLight) dronePointLight.intensity = droneFlying ? .55 : 0;

  // Prop hum audio
  if (frameCount%30===0 && audioReady) {
    if (droneFlying) setHum(.07, 82+droneZ*3+propSpeed*155);
    else if (!animating) setHum(0, 82);
  }

  // Trail
  if (droneZ > 0.06) addTrailPoint(droneX, droneZ, droneY);

  // Camera soft-follow drone
  if (droneGroup) camTarget.lerp(droneGroup.position, .025);
  updateCamera();

  // HUD
  if (frameCount%8===0) {
    document.getElementById('hud-x').textContent = droneX.toFixed(1);
    document.getElementById('hud-y').textContent = droneY.toFixed(1);
    document.getElementById('hud-z').textContent = droneZ.toFixed(1)+'m';
    document.getElementById('hud-yaw').textContent = ((droneYaw%360+360)%360).toFixed(0);
    var bat=Math.round(droneBat);
    var batEl=document.getElementById('hud-bat');
    batEl.textContent=bat+'%'; batEl.style.color=bat>50?'#3fb950':bat>20?'#e3b341':'#f85149';
    var statEl=document.getElementById('hud-status');
    statEl.textContent=droneFlying?(animating?'FLYING':'HOVERING'):'LANDED';
    statEl.style.color=droneFlying?'#00e5ff':'#8b949e';
  }

  renderer.render(scene, camera);
  requestAnimationFrame(renderLoop);
}

  type = type||'info';
  var cls = {info:'log-info',cmd:'log-cmd',ok:'log-ok',err:'log-err',warn:'log-warn',sys:'log-sys'}[type]||'log-info';

// ══════════════════════════════════════════════════
// MAIN RUN FUNCTION
// STEP 1: Python runs fast, just fills cmdQueue
// STEP 2: executeCommands() animates the queue
// Exact same two-phase pattern as Google AI Studio
// ══════════════════════════════════════════════════
function runMission() {
  if (animating) return;
  initAudio();

  // Reset everything
  stopFlag = false;
  resetVirtualState();
  droneX=0; droneY=0; droneZ=0; droneYaw=0; droneBat=100; droneFlying=false; droneFlipping=false;
  trailPoints=[];
  if(trailGeo.attributes&&trailGeo.attributes.position) trailGeo.deleteAttribute('position');
  if(droneGroup){droneGroup.position.set(0,0,0);droneGroup.rotation.set(0,0,0);}
  panOffset.set(0,0,0);

  consoleOut.innerHTML='';
  log('Running mission.py...', 'sys');
  setUIRunning(true);

  // Switch to sim on mobile
  mobSwitch('sim');

  // STEP 1: Configure Skulpt
  // setupSkulptBuiltins() MUST be called BEFORE Sk.configure
  setupSkulptBuiltins();

  Sk.configure({
    output: function(text) {
      if (text.trim()) log(text.trim(), 'info');
    },
    read: skulptRead,
    __future__: Sk.python3,
    execLimit: 120000
  });

  // STEP 2: Execute Python - collects commands into cmdQueue
  Sk.misceval.asyncToPromise(function() {
    return Sk.importMainWithBody('<stdin>', false, cmEditor.getValue(), true);
  }).then(function() {
    var total = cmdQueue.length;
    log('Compiled OK. ' + total + ' commands queued.', 'ok');
    if (total === 0) {
      log('No commands! Write some code first.', 'warn');
      setUIRunning(false);
      return;
    }
    // STEP 3: Animate the collected commands
    animating = true;
    executeCommands(cmdQueue.slice()); // copy so we don't mutate
  }).catch(function(err) {
    var msg = err.tp$str ? err.tp$str().v : String(err);
    log('Python Error: ' + msg, 'err');
    document.getElementById('dot').className = 'err';
    setUIRunning(false);
  });
}

function stopMission() {
  stopFlag=true; animating=false;
  log('Stopped.', 'warn'); setUIRunning(false);
  if(audioReady)setHum(0,82);
}

function loadGLB(file){
  if(!file)return;log('Loading model: '+file.name,'sys');
  new THREE.GLTFLoader().load(URL.createObjectURL(file),function(gltf){
    customModel=gltf.scene;
    var box=new THREE.Box3().setFromObject(customModel),sz=box.getSize(new THREE.Vector3());
    customModel.scale.setScalar(4/Math.max(sz.x,sz.y,sz.z,.01));
    customModel.traverse(function(c){if(c.isMesh)c.castShadow=true;});
    document.getElementById('drone-select').value='custom';setDroneModel('custom');log('Loaded: '+file.name,'ok');beep(880,.1);
  },null,function(err){log('Model error: '+err.message,'err');});
}
['btn-model','mob-model'].forEach(function(id){document.getElementById(id).onclick=function(){document.getElementById('file-glb').click();};});
document.getElementById('file-glb').addEventListener('change',function(){loadGLB(this.files[0]);this.value='';});
document.getElementById('drone-select').onchange=function(){if(this.value==='custom'){document.getElementById('file-glb').click();}else{setDroneModel(this.value);}};

// Drag-drop model
document.body.addEventListener('dragover',function(e){e.preventDefault();document.getElementById('drop-overlay').classList.add('show');});
document.body.addEventListener('dragleave',function(e){if(!e.relatedTarget)document.getElementById('drop-overlay').classList.remove('show');});
document.body.addEventListener('drop',function(e){e.preventDefault();document.getElementById('drop-overlay').classList.remove('show');var f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.glb')||f.name.endsWith('.gltf')))loadGLB(f);else log('Drop a .glb or .gltf file','warn');});

// Environment
document.getElementById('env-select').onchange=function(){setEnvironment(this.value);};

// Theme toggle
var isDark=true;
document.getElementById('btn-theme').onclick=function(){isDark=!isDark;document.documentElement.dataset.theme=isDark?'dark':'light';document.getElementById('btn-theme').textContent=isDark?'Dark':'Light';cmEditor.setOption('theme',isDark?'dracula':'default');};

// Splitter drag
var splEl=document.getElementById('splitter'),splDragging=false;
splEl.addEventListener('mousedown',function(e){splDragging=true;splEl.classList.add('drag');e.preventDefault();});
document.addEventListener('mousemove',function(e){if(!splDragging)return;var rect=document.getElementById('main').getBoundingClientRect();var pct=Math.min(78,Math.max(22,(e.clientX-rect.left)/rect.width*100));document.getElementById('sim-pane').style.cssText='flex:0 0 '+pct+'%;display:flex';resizeRenderer();});
document.addEventListener('mouseup',function(){splDragging=false;splEl.classList.remove('drag');});

// Keyboard shortcuts
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runMission();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCode();}
});

// ══════════════════════════════════════════════════
// CODEMIRROR EDITOR
// ══════════════════════════════════════════════════
var cmEditor = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode: 'python',
  theme: 'dracula',
  lineNumbers: true,
  autoCloseBrackets: true,
  indentUnit: 4,
  tabSize: 4,
  lineWrapping: false,
  extraKeys: {
    'Tab': function(cm){cm.execCommand('indentMore');},
    'Shift-Tab': function(cm){cm.execCommand('indentLess');},
    'Ctrl-Enter': runMission,
    'Cmd-Enter': runMission
  }
});
cmEditor.setValue(DEFAULT_CODE);
cmEditor.setSize('100%', '100%');

// ══════════════════════════════════════════════════
// INITIALIZE
// ══════════════════════════════════════════════════
setEnvironment('night');
setDroneModel('mavic');
resizeRenderer();
updateCamera();

// Mobile: start on code tab
if (window.innerWidth <= 768) mobSwitch('code');

log('DroneLab Pro ready! Press Run to fly.', 'ok');
log('Ctrl+Enter: Run  |  Ctrl+S: Save  |  Drop .glb: 3D model', 'sys');

requestAnimationFrame(renderLoop);
</script>
</body>
</html>
