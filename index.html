<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DroneLab Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#07090f;color:#f0f6fc;font-family:'JetBrains Mono','Fira Code','SF Mono',Consolas,monospace;font-size:13px}
#hdr{height:44px;display:flex;align-items:center;padding:0 12px;gap:8px;background:#010409;border-bottom:1px solid #30363d;flex-shrink:0;z-index:100}
#logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#f0f6fc}
#logo-box{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#00e5ff,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
#logo-name{font-size:14px;font-weight:800}#logo-name b{color:#00e5ff}
.tag{font-size:9px;padding:1px 6px;border-radius:8px;background:linear-gradient(90deg,#00e5ff,#7c3aed);color:#fff;font-weight:700;letter-spacing:1px}
#htabs{flex:1;display:flex;align-items:center;justify-content:center;gap:2px}
.ht{height:32px;padding:0 14px;border:none;border-radius:5px;background:none;color:#8b949e;font-family:inherit;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.ht.on{color:#f0f6fc;border-bottom-color:#00e5ff}.ht:hover:not(.on){color:#f0f6fc}
#hr{display:flex;align-items:center;gap:6px}
.hb{height:28px;padding:0 10px;border-radius:5px;border:1px solid #30363d;background:#21262d;color:#f0f6fc;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.hb:hover{border-color:#00e5ff;color:#00e5ff}
#RUNBTN{background:#238636;border-color:#238636;color:#fff;height:30px;padding:0 14px;font-size:12px}
#RUNBTN:hover{background:#2ea043}
#STOPBTN{background:#da3633;border-color:#da3633;color:#fff;height:30px;display:none}
#dot{width:7px;height:7px;border-radius:50%;background:#30363d;flex-shrink:0;transition:all .3s}
#dot.live{background:#3fb950;box-shadow:0 0 7px #3fb950}
#dot.err{background:#f85149;box-shadow:0 0 7px #f85149}
#main{height:calc(100vh - 44px);display:flex;overflow:hidden}
#SIM{flex:1;min-width:0;display:flex;flex-direction:column;background:#07090f}
#simbar{display:flex;align-items:center;padding:4px 10px;gap:8px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;overflow-x:auto}
#simbar::-webkit-scrollbar{display:none}
#simbar label{font-size:9px;color:#8b949e;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.sc{height:24px;padding:0 7px;border-radius:4px;border:1px solid #30363d;background:#0d1117;color:#f0f6fc;font-family:inherit;font-size:11px;cursor:pointer;flex-shrink:0}
.sc:hover{border-color:#00e5ff}
#cvw{flex:1;position:relative;overflow:hidden}
canvas{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
#hud{position:absolute;top:8px;left:8px;pointer-events:none;display:flex;flex-direction:column;gap:4px}
.hr{display:flex;gap:4px}
.hc{background:rgba(7,9,15,.87);border:1px solid rgba(48,54,61,.85);border-radius:5px;padding:3px 9px;backdrop-filter:blur(6px);display:flex;align-items:center;gap:4px}
.hl{font-size:8px;color:#8b949e;letter-spacing:.8px;text-transform:uppercase}
.hv{font-size:11px;font-weight:700;color:#00e5ff;min-width:30px}
#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(139,148,158,.5);pointer-events:none;background:rgba(7,9,15,.55);padding:3px 10px;border-radius:16px;white-space:nowrap}
#spl{width:4px;background:#30363d;cursor:col-resize;flex-shrink:0;transition:background .2s}
#spl:hover,#spl.drag{background:#00e5ff}
#CODE{width:46%;min-width:200px;display:flex;flex-direction:column;background:#0d1117;border-left:1px solid #30363d}
#ctab{display:flex;align-items:center;padding:0 10px;height:32px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;gap:6px}
.ct{height:26px;padding:0 10px;font-size:11px;color:#8b949e;display:flex;align-items:center;gap:5px;border-bottom:2px solid transparent;cursor:pointer}
.ct.on{color:#00e5ff;border-bottom-color:#00e5ff}
.ctd{width:5px;height:5px;border-radius:50%;background:#00e5ff}
.ctr{margin-left:auto;display:flex;gap:4px}
.ctr .hb{height:20px;font-size:10px;padding:0 7px}
#edwrap{flex:1;overflow:hidden;min-height:0}
.CodeMirror{height:100%!important;font-size:13px!important;line-height:1.72!important;font-family:inherit!important;background:#0d1117!important}
.CodeMirror-scroll{height:100%!important}
.CodeMirror-gutters{background:#0d1117!important;border-right:1px solid #30363d!important}
#CON{height:150px;display:flex;flex-direction:column;border-top:1px solid #30363d;flex-shrink:0}
#conh{display:flex;align-items:center;padding:0 10px;height:26px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
#conh span{font-size:10px;color:#8b949e;letter-spacing:.8px;text-transform:uppercase}
#conh button{margin-left:auto;background:none;border:1px solid #30363d;color:#8b949e;padding:1px 7px;font-size:10px;border-radius:4px;cursor:pointer;font-family:inherit}
#conh button:hover{border-color:#00e5ff;color:#00e5ff}
#cout{flex:1;overflow-y:auto;padding:6px 12px;font-size:12px;line-height:1.75;background:#060a0f}
#cout::-webkit-scrollbar{width:3px}
#cout::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.li{color:#f0f6fc}.lc{color:#00e5ff}.lo{color:#3fb950}.le{color:#f85149}.lw{color:#e3b341}.ls{color:#79c0ff}
#mobnav{display:none;height:52px;background:#010409;border-top:1px solid #30363d;flex-shrink:0}
.mb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:#8b949e;font-family:inherit;cursor:pointer;transition:color .2s;position:relative}
.mb.on{color:#00e5ff}
.mb.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:#00e5ff;border-radius:0 0 3px 3px}
.mi{font-size:18px}.ml{font-size:9px;font-weight:700;letter-spacing:.5px}
@media(max-width:768px){
  #htabs,.dsk{display:none!important}
  #hdr{padding:0 8px;gap:5px}
  #logo-name,.tag{display:none}
  #RUNBTN,#STOPBTN{padding:0 10px;height:28px;font-size:11px}
  #main{flex-direction:column;height:calc(100vh - 44px - 52px)}
  #SIM,#CODE{width:100%!important;flex:1;border-left:none;display:none!important}
  #SIM.on,#CODE.on{display:flex!important}
  #spl{display:none!important}
  #mobnav{display:flex!important}
  #CON{height:130px}
}
@media(min-width:769px){#SIM{display:flex!important}#CODE{display:flex!important}#mobnav{display:none!important}}
#splash{position:fixed;inset:0;z-index:9999;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;animation:so .4s 2s forwards}
@keyframes so{to{opacity:0;visibility:hidden;pointer-events:none}}
#si{font-size:52px;animation:fl 1.4s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#st{font-size:22px;font-weight:900;letter-spacing:6px;color:#00e5ff}
#ss{font-size:9px;color:#8b949e;letter-spacing:3px;animation:bk 1s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
#drp{position:fixed;inset:0;z-index:500;background:rgba(0,229,255,.07);border:3px dashed #00e5ff;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#00e5ff;font-size:18px}
#drp.on{display:flex}
</style>
</head>
<body>

<div id="splash"><div id="si">&#x1F681;</div><div id="st">DRONELAB PRO</div><div id="ss">LOADING...</div></div>
<div id="drp"><div>&#x1F4E6;</div><div style="font-size:13px">Drop .glb / .gltf to use custom drone</div></div>

<div id="hdr">
  <a id="logo" href="#"><div id="logo-box">&#x1F681;</div><div id="logo-name">Drone<b>Lab</b></div></a>
  <div class="tag">PRO</div>
  <div id="htabs">
    <button class="ht on" data-v="both">&#x2B1B; Split</button>
    <button class="ht" data-v="sim">&#x1F310; Sim</button>
    <button class="ht" data-v="code">&#x1F4DD; Code</button>
  </div>
  <div id="hr">
    <div id="dot"></div>
    <button class="hb dsk" id="SAVBTN">&#x1F4BE; Save</button>
    <button class="hb dsk" id="LOADBTN">&#x1F4C2; Load</button>
    <button class="hb dsk" id="UPBTN">&#x1F4E6; Model</button>
    <button class="hb" id="THBTN">&#x263D;</button>
    <button class="hb" id="RUNBTN">&#x25B6; Run</button>
    <button class="hb" id="STOPBTN">&#x26D4; Stop</button>
  </div>
</div>

<input type="file" id="fpy" accept=".py" style="display:none">
<input type="file" id="fglb" accept=".glb,.gltf" style="display:none">

<div id="main">
  <div id="SIM" class="on">
    <div id="simbar">
      <label>ENV</label>
      <select class="sc" id="envsel">
        <option value="night" selected>Night</option>
        <option value="day">Day</option>
        <option value="afternoon">Afternoon</option>
        <option value="evening">Evening</option>
        <option value="indoor">Indoor</option>
        <option value="grass">Grass</option>
        <option value="road">Road</option>
        <option value="mountain">Mountain</option>
      </select>
      <label>DRONE</label>
      <select class="sc" id="dsel">
        <option value="mavic">DJI Mavic</option>
        <option value="racing">Racing</option>
        <option value="delivery">Delivery</option>
        <option value="custom">Custom GLB</option>
      </select>
      <button class="sc" id="resetcam">Reset View</button>
    </div>
    <div id="cvw">
      <canvas id="cvs"></canvas>
      <div id="hud">
        <div class="hr">
          <div class="hc"><span class="hl">X</span><span class="hv" id="hx">0.0</span></div>
          <div class="hc"><span class="hl">Y</span><span class="hv" id="hy">0.0</span></div>
          <div class="hc"><span class="hl">ALT</span><span class="hv" id="hz">0.0m</span></div>
        </div>
        <div class="hr">
          <div class="hc"><span class="hl">YAW</span><span class="hv" id="hyaw">0</span></div>
          <div class="hc"><span class="hl">BAT</span><span class="hv" id="hbat" style="color:#3fb950">100%</span></div>
          <div class="hc"><span class="hl">STATE</span><span class="hv" id="hstat" style="color:#8b949e">IDLE</span></div>
        </div>
      </div>
      <div id="hint">Drag: orbit | Scroll: zoom | Right-drag: pan | Pinch: zoom</div>
    </div>
  </div>
  <div id="spl"></div>
  <div id="CODE">
    <div id="ctab">
      <div class="ct on"><div class="ctd"></div>mission.py</div>
      <div class="ctr">
        <button class="hb" id="msav">&#x1F4BE;</button>
        <button class="hb" id="mlod">&#x1F4C2;</button>
        <button class="hb" id="mmdl">&#x1F4E6;</button>
      </div>
    </div>
    <div id="edwrap"><textarea id="editor"></textarea></div>
    <div id="CON">
      <div id="conh"><span>&#x25B8; Console</span><button onclick="document.getElementById('cout').innerHTML=''">Clear</button></div>
      <div id="cout"></div>
    </div>
  </div>
</div>

<div id="mobnav">
  <button class="mb on" id="mbsim"><span class="mi">&#x1F310;</span><span class="ml">SIM</span></button>
  <button class="mb" id="mbcode"><span class="mi">&#x1F4DD;</span><span class="ml">CODE</span></button>
  <button class="mb" id="mbrun"><span class="mi" id="mbico">&#x25B6;</span><span class="ml">RUN</span></button>
  <button class="mb" id="mbmdl"><span class="mi">&#x1F4E6;</span><span class="ml">MODEL</span></button>
</div>

<script>
'use strict';

// =====================================================================
// DEFAULT CODE
// =====================================================================
var DEFAULT = [
  "# DroneLab Pro - PySimverse API",
  "# FreeCodeCamp tutorial by Murtaza Hassan",
  "from pysimverse import Drone",
  "",
  "drone = Drone()",
  "drone.connect()",
  "",
  "drone.takeoff(height=5)",
  "",
  "for i in range(4):",
  "    drone.move_forward(distance=3)",
  "    drone.rotate_cw(degrees=90)",
  "",
  "pos = drone.get_position()",
  "print('Position: ' + str(pos))",
  "print('Battery: ' + str(drone.get_battery()) + '%')",
  "",
  "drone.move_up(distance=2)",
  "drone.spiral(radius=2, height=3, turns=2)",
  "",
  "drone.go_to(x=0, y=0, z=6)",
  "drone.orbit(cx=0, cy=0, radius=3, laps=1)",
  "",
  "drone.go_to(x=0, y=0, z=5)",
  "drone.flip('forward')",
  "drone.hover(seconds=1)",
  "",
  "face = drone.detect_face()",
  "print('Face: ' + str(face['detected']))",
  "gesture = drone.detect_gesture()",
  "print('Gesture: ' + str(gesture))",
  "",
  "drone.follow_line(path=[[0,0],[2,0],[4,2],[6,2]], height=2)",
  "",
  "drone.return_home()",
  "drone.land()",
  "print('Mission complete!')"
].join('\n');

// =====================================================================
// THE KEY INSIGHT FROM GOOGLE AI STUDIO:
// Instead of fighting with Skulpt's module system,
// we PREPEND the Drone class definition to the user's code.
// Strip "from pysimverse import Drone" and prepend our class.
// This completely bypasses module import issues.
// =====================================================================

// The Drone class calls _drone_* JS builtins
var DRONE_CLASS = [
  "class Drone:",
  "    def __init__(self): pass",
  "    def connect(self): _drone_connect()",
  "    def disconnect(self): _drone_disconnect()",
  "    def takeoff(self, height=3): _drone_takeoff(height)",
  "    def land(self): _drone_land()",
  "    def hover(self, seconds=1): _drone_hover(seconds)",
  "    def return_home(self): _drone_return_home()",
  "    def emergency_land(self): _drone_land()",
  "    def move_forward(self, distance=1, speed=1): _drone_move('forward', distance, speed)",
  "    def move_backward(self, distance=1, speed=1): _drone_move('backward', distance, speed)",
  "    def move_left(self, distance=1, speed=1): _drone_move('left', distance, speed)",
  "    def move_right(self, distance=1, speed=1): _drone_move('right', distance, speed)",
  "    def move_up(self, distance=1): _drone_move('up', distance, 1)",
  "    def move_down(self, distance=1): _drone_move('down', distance, 1)",
  "    def go_to(self, x=0, y=0, z=0, speed=1): _drone_goto(x, y, z, speed)",
  "    def set_position(self, x=0, y=0, z=0, speed=1): _drone_goto(x, y, z, speed)",
  "    def rotate_cw(self, degrees=90): _drone_rotate(degrees)",
  "    def rotate_ccw(self, degrees=90): _drone_rotate(-degrees)",
  "    def set_yaw(self, angle=0): _drone_setyaw(angle)",
  "    def set_speed(self, speed=1): _drone_setspeed(speed)",
  "    def flip(self, direction='forward'): _drone_flip(direction)",
  "    def flip_forward(self): _drone_flip('forward')",
  "    def flip_backward(self): _drone_flip('backward')",
  "    def flip_left(self): _drone_flip('left')",
  "    def flip_right(self): _drone_flip('right')",
  "    def orbit(self, cx=0, cy=0, radius=2, laps=1, direction='cw'): _drone_orbit(cx, cy, radius, laps, direction)",
  "    def circle(self, radius=2, laps=1): _drone_circle(radius, laps)",
  "    def spiral(self, radius=2, height=4, turns=2): _drone_spiral(radius, height, turns)",
  "    def figure_8(self, size=3): _drone_figure8(size)",
  "    def square(self, size=2): _drone_square(size)",
  "    def triangle(self, size=2): _drone_triangle(size)",
  "    def patrol(self, waypoints): _drone_patrol(waypoints)",
  "    def lawnmower(self, width=8, length=6, rows=4): _drone_lawnmower(width, length, rows)",
  "    def zigzag(self, width=2, distance=5, steps=6): _drone_zigzag(width, distance, steps)",
  "    def take_photo(self): _drone_takephoto()",
  "    def set_camera_angle(self, pitch=0, yaw=0): _drone_cameraangle(pitch, yaw)",
  "    def detect_face(self): return _drone_detectface()",
  "    def detect_gesture(self): return _drone_detectgesture()",
  "    def detect_object(self, label='object'): return _drone_detectobject(label)",
  "    def follow_line(self, path, height=0): _drone_followline(path, height)",
  "    def follow_body(self): _drone_followbody()",
  "    def detect_color(self, color='red'): return _drone_detectcolor(color)",
  "    def detect_qr(self): return _drone_detectqr()",
  "    def navigate_to_room(self, room='garage'): _drone_navroom(room)",
  "    def get_position(self): return _drone_getpos()",
  "    def get_altitude(self): return _drone_getalt()",
  "    def get_x(self): return _drone_getx()",
  "    def get_y(self): return _drone_gety()",
  "    def get_yaw(self): return _drone_getyaw()",
  "    def get_speed(self): return _drone_getspeed()",
  "    def get_battery(self): return _drone_getbat()",
  "    def is_flying(self): return _drone_isflying()",
  "    def distance_to(self, x=0, y=0, z=0): return _drone_distto(x, y, z)",
  "    def print_status(self): _drone_status()",
  "    def log(self, msg): print(str(msg))"
].join('\n');

// Strip pysimverse import lines from user code, then prepend our class
function prepareCode(userCode) {
  var lines = userCode.split('\n');
  var filtered = lines.filter(function(line) {
    var t = line.trim();
    // Remove any pysimverse import lines
    return !(t === 'from pysimverse import Drone' ||
             t === 'import pysimverse' ||
             t.startsWith('from pysimverse import') ||
             t.startsWith('import pysimverse'));
  });
  // Prepend Drone class + blank line + filtered user code
  return DRONE_CLASS + '\n\n' + filtered.join('\n');
}

// =====================================================================
// COMMAND QUEUE & VIRTUAL STATE
// =====================================================================
var Q = [];       // command queue
var vX=0,vY=0,vZ=0,vYaw=0,vSpd=1,vBat=100,vFly=false;

function resetV(){ Q=[]; vX=0;vY=0;vZ=0;vYaw=0;vSpd=1;vBat=100;vFly=false; }

function push(type,params,dur,log){
  Q.push({type:type,p:params||{},dur:dur||500,log:log||null});
}

function doTakeoff(h){ if(vFly)return; vFly=true; push('goto',{tx:vX,ty:vY,tz:h,tyaw:vYaw},Math.max(800,h*400),'takeoff(height='+h+')'); vZ=h; }
function doLand(){ vFly=false; push('goto',{tx:vX,ty:vY,tz:0,tyaw:vYaw},Math.max(800,vZ*400),'land()'); vZ=0; }
function doHover(s){ push('hover',{},s*1000,'hover('+s+'s)'); }
function doHome(){ var d=Math.hypot(vX,vY); push('goto',{tx:0,ty:0,tz:vZ,tyaw:vYaw},Math.max(600,d*380/vSpd),'return_home()'); vX=0;vY=0; }
function doMove(dir,dist,spd){
  if(spd>0)vSpd=Math.min(5,Math.max(.1,spd));
  var r=vYaw*Math.PI/180,nx=vX,ny=vY,nz=vZ;
  if(dir==='forward'){nx+=Math.sin(r)*dist;ny+=Math.cos(r)*dist;}
  else if(dir==='backward'){nx-=Math.sin(r)*dist;ny-=Math.cos(r)*dist;}
  else if(dir==='left'){nx-=Math.cos(r)*dist;ny+=Math.sin(r)*dist;}
  else if(dir==='right'){nx+=Math.cos(r)*dist;ny-=Math.sin(r)*dist;}
  else if(dir==='up'){nz+=dist;}
  else if(dir==='down'){nz=Math.max(0,nz-dist);}
  push('goto',{tx:nx,ty:ny,tz:nz,tyaw:vYaw},Math.max(300,dist*380/vSpd),dir+'('+dist+')');
  vX=nx;vY=ny;vZ=nz;
}
function doGoto(x,y,z,spd){
  if(spd>0)vSpd=Math.min(5,Math.max(.1,spd));
  var d=Math.hypot(x-vX,y-vY,z-vZ);
  push('goto',{tx:x,ty:y,tz:z,tyaw:vYaw},Math.max(400,d*380/vSpd),'goto('+x.toFixed(1)+','+y.toFixed(1)+','+z.toFixed(1)+')');
  vX=x;vY=y;vZ=z;
}
function doRotate(deg){ push('goto',{tx:vX,ty:vY,tz:vZ,tyaw:vYaw+deg},Math.max(250,Math.abs(deg)*10/vSpd),'rotate('+deg+'deg)'); vYaw+=deg; }
function doSetyaw(a){ push('goto',{tx:vX,ty:vY,tz:vZ,tyaw:a},350,'set_yaw('+a+')'); vYaw=a; }
function doFlip(dir){ push('flip',{dir:dir},700,"flip('"+dir+"')"); }

function doOrbit(cx,cy,r,laps,direction){
  var dd=direction==='ccw'?-1:1,steps=Math.ceil(44*laps);
  clog('orbit(r='+r+',laps='+laps+')','ls');
  for(var i=1;i<=steps;i++){var a=dd*(i/44)*Math.PI*2;var nx=cx+r*Math.cos(a),ny=cy+r*Math.sin(a);push('goto',{tx:nx,ty:ny,tz:vZ,tyaw:vYaw},90,null);vX=nx;vY=ny;}
}
function doCircle(r,laps){
  var steps=Math.ceil(44*laps),sx=vX,sy=vY;
  clog('circle(r='+r+')','ls');
  for(var i=1;i<=steps;i++){var a=(i/44)*Math.PI*2;var nx=sx+r*Math.sin(a),ny=sy+r-r*Math.cos(a);push('goto',{tx:nx,ty:ny,tz:vZ,tyaw:vYaw},90,null);vX=nx;vY=ny;}
}
function doSpiral(r,h,turns){
  var steps=Math.ceil(44*turns),sx=vX,sy=vY,sz=vZ;
  clog('spiral(r='+r+',h='+h+',turns='+turns+')','ls');
  for(var i=1;i<=steps;i++){var a=(i/44)*Math.PI*2;var nx=sx+r*Math.cos(a),ny=sy+r*Math.sin(a),nz=sz+h*(i/steps);push('goto',{tx:nx,ty:ny,tz:nz,tyaw:vYaw},90,null);vX=nx;vY=ny;vZ=nz;}
}
function doFig8(size){
  var cx=vX,cy=vY;
  clog('figure_8(size='+size+')','ls');
  for(var i=1;i<=36;i++){var a=(i/36)*Math.PI*2;push('goto',{tx:cx+size*Math.sin(a),ty:cy+size*Math.sin(a)*Math.cos(a),tz:vZ,tyaw:vYaw},90,null);}
  for(var i=1;i<=36;i++){var a=(i/36)*Math.PI*2;push('goto',{tx:cx-size*Math.sin(a),ty:cy+size*Math.sin(a)*Math.cos(a),tz:vZ,tyaw:vYaw},90,null);}
}
function doSquare(size){ clog('square('+size+')','ls'); for(var i=0;i<4;i++){doMove('forward',size,1);doRotate(90);} }
function doTriangle(size){ clog('triangle('+size+')','ls'); for(var i=0;i<3;i++){doMove('forward',size,1);doRotate(120);} }
function doPatrol(wps){ clog('patrol('+wps.length+' pts)','ls'); for(var i=0;i<wps.length;i++){var wp=wps[i],a=Array.isArray(wp)?wp:Object.values(wp);doGoto(+a[0]||0,+a[1]||0,a[2]!=null?+a[2]:vZ,1);} }
function doLawnmower(w,l,rows){ clog('lawnmower','ls'); var sp=w/rows; for(var i=0;i<=rows;i++){var x=-w/2+i*sp;doGoto(x,vY,vZ,1);doGoto(x,vY+(i%2===0?l:-l),vZ,1);} }
function doZigzag(w,d,n){ clog('zigzag','ls'); var step=d/n; for(var i=0;i<n;i++){var r2=vYaw*Math.PI/180;var side=i%2===0?w:-w;var nx=vX+Math.sin(r2)*step+Math.cos(r2)*side,ny=vY+Math.cos(r2)*step-Math.sin(r2)*side;push('goto',{tx:nx,ty:ny,tz:vZ,tyaw:vYaw},Math.max(200,step*300),null);vX=nx;vY=ny;} }
function doFollowLine(path,height){ clog('follow_line('+path.length+' pts)','ls'); var ht=height||vZ; for(var i=0;i<path.length;i++){var pt=path[i],a=Array.isArray(pt)?pt:Object.values(pt);push('goto',{tx:+a[0]||0,ty:+a[1]||0,tz:ht,tyaw:vYaw},300,'->('+a[0]+','+a[1]+')');vX=+a[0]||0;vY=+a[1]||0;} }

function setupBuiltins(){
  var b=Sk.builtins, N=Sk.builtin.none.none$;
  function sk(fn){return new Sk.builtin.func(fn);}
  function jv(v,d){if(d===undefined)d=0;if(v==null||v===N)return d;return Sk.ffi.remapToJs(v);}

  b._drone_connect    =sk(function(){clog('drone.connect()','lo');beep(440,.1);return N;});
  b._drone_disconnect =sk(function(){clog('drone.disconnect()','ls');return N;});
  b._drone_takeoff    =sk(function(h){doTakeoff(jv(h,3));return N;});
  b._drone_land       =sk(function(){doLand();return N;});
  b._drone_hover      =sk(function(s){doHover(jv(s,1));return N;});
  b._drone_return_home=sk(function(){doHome();return N;});
  b._drone_move       =sk(function(dir,dist,spd){doMove(jv(dir,'forward'),jv(dist,1),jv(spd,1));return N;});
  b._drone_goto       =sk(function(x,y,z,spd){doGoto(jv(x,0),jv(y,0),jv(z,vZ),jv(spd,1));return N;});
  b._drone_rotate     =sk(function(deg){doRotate(jv(deg,90));return N;});
  b._drone_setyaw     =sk(function(a){doSetyaw(jv(a,0));return N;});
  b._drone_setspeed   =sk(function(s){vSpd=Math.max(.1,Math.min(5,jv(s,1)));return N;});
  b._drone_flip       =sk(function(dir){doFlip(jv(dir,'forward'));return N;});
  b._drone_orbit      =sk(function(cx,cy,r,laps,dir){doOrbit(jv(cx,0),jv(cy,0),jv(r,2),jv(laps,1),jv(dir,'cw'));return N;});
  b._drone_circle     =sk(function(r,laps){doCircle(jv(r,2),jv(laps,1));return N;});
  b._drone_spiral     =sk(function(r,h,t){doSpiral(jv(r,2),jv(h,4),jv(t,2));return N;});
  b._drone_figure8    =sk(function(size){doFig8(jv(size,3));return N;});
  b._drone_square     =sk(function(size){doSquare(jv(size,2));return N;});
  b._drone_triangle   =sk(function(size){doTriangle(jv(size,2));return N;});
  b._drone_patrol     =sk(function(wps){doPatrol(Sk.ffi.remapToJs(wps));return N;});
  b._drone_lawnmower  =sk(function(w,l,rows){doLawnmower(jv(w,8),jv(l,6),jv(rows,4));return N;});
  b._drone_zigzag     =sk(function(w,d,n){doZigzag(jv(w,2),jv(d,5),jv(n,6));return N;});
  b._drone_takephoto  =sk(function(){clog('take_photo()','ls');beep(1200,.08);return N;});
  b._drone_cameraangle=sk(function(p,y){clog('camera_angle('+jv(p)+','+jv(y)+')','ls');return N;});
  b._drone_detectface =sk(function(){var x=+(Math.random()*.4-.2).toFixed(3),y=+(Math.random()*.4-.2).toFixed(3);clog('detect_face() -> ('+x+','+y+')','ls');return Sk.ffi.remapToPy({detected:true,x:x,y:y,confidence:.92,label:'human_face'});});
  b._drone_detectgesture=sk(function(){var gs=['pointing','peace','thumbs_up','open_hand','fist','okay'];var g=gs[Math.floor(Math.random()*gs.length)];clog('detect_gesture() -> '+g,'ls');return Sk.ffi.remapToPy(g);});
  b._drone_detectobject=sk(function(label){var l=jv(label,'object');clog('detect_object("'+l+'")','ls');return Sk.ffi.remapToPy({detected:Math.random()>.3,label:l,confidence:+(Math.random()*.3+.7).toFixed(2)});});
  b._drone_followline =sk(function(path,height){doFollowLine(Sk.ffi.remapToJs(path),jv(height,vZ));return N;});
  b._drone_followbody =sk(function(){clog('follow_body()','ls');doMove('forward',2,1);return N;});
  b._drone_detectcolor=sk(function(c){var cl=jv(c,'red');clog('detect_color("'+cl+'")','ls');return Sk.ffi.remapToPy({detected:Math.random()>.3,color:cl});});
  b._drone_detectqr   =sk(function(){clog('detect_qr()','ls');return Sk.ffi.remapToPy({detected:true,data:'DRONELAB-1'});});
  b._drone_navroom    =sk(function(room){var r=jv(room,'garage');clog('navigate_to_room("'+r+'")','ls');doGoto(vX+3,vY+3,vZ,1);return N;});
  b._drone_getpos  =sk(function(){return Sk.ffi.remapToPy([+vX.toFixed(3),+vY.toFixed(3),+vZ.toFixed(3)]);});
  b._drone_getalt  =sk(function(){return Sk.ffi.remapToPy(+vZ.toFixed(3));});
  b._drone_getx    =sk(function(){return Sk.ffi.remapToPy(+vX.toFixed(3));});
  b._drone_gety    =sk(function(){return Sk.ffi.remapToPy(+vY.toFixed(3));});
  b._drone_getyaw  =sk(function(){return Sk.ffi.remapToPy(+vYaw.toFixed(1));});
  b._drone_getspeed=sk(function(){return Sk.ffi.remapToPy(vSpd);});
  b._drone_getbat  =sk(function(){return Sk.ffi.remapToPy(Math.round(vBat));});
  b._drone_isflying=sk(function(){return vFly?Sk.builtin.bool.true$:Sk.builtin.bool.false$;});
  b._drone_distto  =sk(function(x,y,z){return Sk.ffi.remapToPy(Math.hypot(jv(x)-vX,jv(y)-vY,jv(z)-vZ));});
  b._drone_status  =sk(function(){clog('x='+vX.toFixed(1)+' y='+vY.toFixed(1)+' z='+vZ.toFixed(1)+' yaw='+vYaw.toFixed(0)+'deg bat='+Math.round(vBat)+'%','ls');return N;});
}

function addEnv(o){scene.add(o);eObjs.push(o);}
function mkFloor(c,s){s=s||120;var m=new THREE.Mesh(new THREE.PlaneGeometry(s,s),new THREE.MeshLambertMaterial({color:c}));m.rotation.x=-Math.PI/2;m.receiveShadow=true;return m;}
function mkBox(c,w,h,d,x,y,z){var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:c}));m.position.set(x||0,y||0,z||0);m.castShadow=true;return m;}
function mkCone(c,r,h,x,y,z,seg){var m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg||8),new THREE.MeshLambertMaterial({color:c}));m.position.set(x||0,(y||0)+h/2,z||0);m.castShadow=true;return m;}
function mkStars(n,range,ymin,ymax){var sv=[];for(var i=0;i<n;i++)sv.push((Math.random()-.5)*range,Math.random()*(ymax-ymin)+ymin,(Math.random()-.5)*range);var sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));return new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.22,transparent:true,opacity:.9}));}

function setEnv(key){

  else if(key==='day'||key==='afternoon'){addEnv(mkFloor(0x4a9038));var g2=new THREE.GridHelper(100,50,0x2a7020,0x2a7020);g2.material.opacity=.28;g2.material.transparent=true;addEnv(g2);for(var t=0;t<10;t++){var tx2=(Math.random()-.5)*80,tz2=(Math.random()-.5)*80;if(Math.abs(tx2)<10&&Math.abs(tz2)<10)continue;addEnv(mkBox(0x5a3200,.6,3+Math.random()*2,.6,tx2,1.5,tz2));addEnv(mkCone(0x267a26,1.8+Math.random(),3.5+Math.random()*2,tx2,3,tz2,8));}for(var c2=0;c2<6;c2++){var cl2=new THREE.Mesh(new THREE.SphereGeometry(2+Math.random()*3,8,6),new THREE.MeshLambertMaterial({color:0xffffff}));cl2.position.set((Math.random()-.5)*80,25+Math.random()*15,(Math.random()-.5)*80);addEnv(cl2);}}
  else if(key==='evening'){addEnv(mkFloor(0x2a1a10));addEnv(mkStars(600,300,18,90));var gh=new THREE.Mesh(new THREE.PlaneGeometry(140,20),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.18,side:THREE.DoubleSide}));gh.rotation.y=Math.PI/2;gh.position.set(-50,6,0);addEnv(gh);}
  else if(key==='indoor'){addEnv(mkFloor(0x8a7a68,22));var rm=new THREE.Mesh(new THREE.BoxGeometry(24,14,24),new THREE.MeshLambertMaterial({color:0xc8b898,side:THREE.BackSide}));rm.position.y=7;addEnv(rm);var cf=new THREE.Mesh(new THREE.BoxGeometry(4,.08,4),new THREE.MeshBasicMaterial({color:0xfff6ee}));cf.position.set(0,13.94,0);addEnv(cf);var cl3=new THREE.PointLight(0xfff4cc,1.6,28);cl3.position.set(0,12,0);addEnv(cl3);addEnv(mkBox(0x4a3218,3,1.4,5,8.5,.7,0));addEnv(new THREE.GridHelper(20,20,0x9a8a78,0x9a8a78));}

  else if(key==='road'){addEnv(mkFloor(0x557766));var rd=new THREE.Mesh(new THREE.PlaneGeometry(9,100),new THREE.MeshLambertMaterial({color:0x3a3a3a}));rd.rotation.x=-Math.PI/2;rd.position.y=.01;addEnv(rd);for(var d3=0;d3<19;d3++){var da=new THREE.Mesh(new THREE.PlaneGeometry(.28,3.2),new THREE.MeshBasicMaterial({color:0xffff44}));da.rotation.x=-Math.PI/2;da.position.set(0,.02,(d3-9)*6);addEnv(da);}var cz2=[-22,-8,6,20,35],cc2=[0xcc3333,0x3366cc,0xcccc33,0x33cc66,0xcc6633];for(var ci2=0;ci2<cz2.length;ci2++){var cs2=ci2%2===0?3:-3;addEnv(mkBox(cc2[ci2],2.2,1.1,3.8,cs2,.6,cz2[ci2]));addEnv(mkBox(cc2[ci2],1.7,.85,2.2,cs2,1.6,cz2[ci2]));}addEnv(new THREE.GridHelper(120,60,0x446655,0x446655));}
  else if(key==='mountain'){addEnv(mkFloor(0x4a6240,200));addEnv(new THREE.GridHelper(120,60,0x3a5230,0x3a5230));var pks=[[40,-42,9,26],[36,48,7,20],[58,22,6,18],[-52,-28,11,30],[-38,42,8,22]];for(var pi=0;pi<pks.length;pi++){var pk=pks[pi];addEnv(mkCone(0x5a6458,pk[2],pk[3],pk[0],0,pk[1],9));addEnv(mkCone(0xeeeeff,pk[2]*.28,pk[3]*.3,pk[0],pk[3]*.72,pk[1],9));}for(var mt=0;mt<16;mt++){addEnv(mkCone(0x2a6a2a,1.2+Math.random()*.8,4+Math.random()*3,(Math.random()-.5)*48,0,(Math.random()-.5)*48,7));}addEnv(mkStars(400,300,30,100));}

var dRoot=null,propGs=[],dGlow=null,custMdl=null;

function ph(color,shin,spec,transp,opa,side){return new THREE.MeshPhongMaterial({color:color,shininess:shin||100,specular:spec||0,transparent:transp||false,opacity:opa!==undefined?opa:1,side:side||THREE.FrontSide});}
function p(group,geo,mat,px,py,pz,rx,ry,rz){px=px||0;py=py||0;pz=pz||0;rx=rx||0;ry=ry||0;rz=rz||0;var m=new THREE.Mesh(geo,mat);m.position.set(px,py,pz);m.rotation.set(rx,ry,rz);m.castShadow=true;group.add(m);return m;}

function buildMavic(){
  var G=new THREE.Group();
  var mB=ph(0x1e2a38,160,0x5588bb),mD=ph(0x0e1520,80),mA=ph(0x16202e,60),mM=ph(0x080e18,220,0x336699),mP=ph(0x2a3848,30,0,true,.82,THREE.DoubleSide),mG=ph(0x001828,280,0x88ccff,true,.65),mL=new THREE.MeshBasicMaterial({color:0x00e5ff}),mR2=new THREE.MeshBasicMaterial({color:0xff2222}),mGr=new THREE.MeshBasicMaterial({color:0x22ff55});
  p(G,new THREE.BoxGeometry(2.3,.3,1.1),mB);p(G,new THREE.BoxGeometry(1.1,.2,.68),mB,-.1,.25,0);p(G,new THREE.BoxGeometry(.25,.2,.88),mD,.97,-.04,0);p(G,new THREE.BoxGeometry(.52,.04,.05),mL,.72,.18,0);
  propGs=[];
  var mpos=[[1.85,0,-1.85],[1.85,0,1.85],[-1.85,0,-1.85],[-1.85,0,1.85]];
  for(var i=0;i<mpos.length;i++){var mx=mpos[i][0],mz=mpos[i][2],al=Math.sqrt(mx*mx+mz*mz)*.88;p(G,new THREE.BoxGeometry(al,.09,.09),mA,mx*.5,0,mz*.5,0,Math.atan2(mx,mz),0);p(G,new THREE.CylinderGeometry(.24,.24,.14,14),mM,mx,.07,mz);p(G,new THREE.CylinderGeometry(.15,.2,.1,12),mM,mx,.17,mz);var pg=new THREE.Group();pg.position.set(mx,.3,mz);for(var b=0;b<2;b++){var bl=new THREE.Mesh(new THREE.BoxGeometry(1.72,.02,.14),mP);bl.rotation.set(0,b*Math.PI/2,.065);pg.add(bl);}pg.add(new THREE.Mesh(new THREE.CylinderGeometry(.06,.09,.06,8),mM));G.add(pg);propGs.push(pg);p(G,new THREE.SphereGeometry(.07,6,6),i<2?mGr:mR2,mx,.31,mz);}
  [-0.58,0.58].forEach(function(lz){p(G,new THREE.BoxGeometry(1.85,.05,.07),mA,0,-.28,lz);p(G,new THREE.CylinderGeometry(.055,.055,.3,6),mA,-0.68,-.14,lz);p(G,new THREE.CylinderGeometry(.055,.055,.3,6),mA,0.68,-.14,lz);});
  p(G,new THREE.SphereGeometry(.17,10,8),mD,.9,-.23,0);p(G,new THREE.SphereGeometry(.11,10,8),mG,1.0,-.23,0);
  dGlow=new THREE.PointLight(0x00e5ff,0,6);dGlow.position.set(0,-1.2,0);G.add(dGlow);
  G.traverse(function(c){if(c.isMesh)c.castShadow=true;});return G;
}
function buildRacing(){
  var G=new THREE.Group(),mF=ph(0x1a0806,120,0xff3300),mA=ph(0x0a0808),mP=ph(0xff2222,30,0,true,.82,THREE.DoubleSide);
  G.add(new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,.1,5),mF));propGs=[];
  [[1,0,-1],[1,0,1],[-1,0,-1],[-1,0,1]].forEach(function(r,i){var arm=new THREE.Mesh(new THREE.BoxGeometry(Math.SQRT2*.9,.07,.07),mA);arm.position.set(r[0]*.5,0,r[2]*.5);arm.rotation.y=Math.atan2(r[0],r[2]);G.add(arm);var pg=new THREE.Group();pg.position.set(r[0],.12,r[2]);for(var b=0;b<2;b++){var bl=new THREE.Mesh(new THREE.BoxGeometry(1.3,.02,.11),mP);bl.rotation.y=b*Math.PI/2;pg.add(bl);}G.add(pg);propGs.push(pg);});
  dGlow=new THREE.PointLight(0xff3300,0,4);dGlow.position.set(0,-.5,0);G.add(dGlow);G.traverse(function(c){if(c.isMesh)c.castShadow=true;});return G;
}
function buildDelivery(){
  var G=new THREE.Group(),mB=ph(0xf0eee0,110,0x4488aa),mA=ph(0xc8c2b8),mP=ph(0x8899aa,30,0,true,.8,THREE.DoubleSide),mX=ph(0x2266cc,80,0x88aacc);
  G.add(new THREE.Mesh(new THREE.CylinderGeometry(.62,.62,.22,7),mB));var bx=new THREE.Mesh(new THREE.BoxGeometry(1.1,.7,1.1),mX);bx.position.set(0,-.46,0);G.add(bx);propGs=[];
  [0,60,120,180,240,300].forEach(function(angDeg){var ha=angDeg*Math.PI/180,hmx=2.1*Math.cos(ha),hmz=2.1*Math.sin(ha);var arm=new THREE.Mesh(new THREE.BoxGeometry(2.1,.07,.07),mA);arm.position.set(hmx*.5,0,hmz*.5);arm.rotation.y=Math.atan2(hmx,hmz);G.add(arm);var pg=new THREE.Group();pg.position.set(hmx,.14,hmz);for(var b=0;b<2;b++){var bl=new THREE.Mesh(new THREE.BoxGeometry(1.4,.02,.12),mP);bl.rotation.y=b*Math.PI/2;pg.add(bl);}G.add(pg);propGs.push(pg);});
  dGlow=new THREE.PointLight(0xffffff,0,7);dGlow.position.set(0,-1,0);G.add(dGlow);G.traverse(function(c){if(c.isMesh)c.castShadow=true;});return G;
}

function setDrone(type){
  if(dRoot)scene.remove(dRoot);propGs=[];dGlow=null;
  if(type==='custom'&&custMdl){dRoot=custMdl;scene.add(dRoot);return;}
  if(type==='racing')dRoot=buildRacing();
  else if(type==='delivery')dRoot=buildDelivery();
  else dRoot=buildMavic();
  scene.add(dRoot);
}

// Trail
var tPts=[];var tGeo=new THREE.BufferGeometry();var tLine=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:.5}));scene.add(tLine);
function addTrail(x,y,z){tPts.push(new THREE.Vector3(x,y,z));if(tPts.length>600)tPts.shift();if(tPts.length>=2)tGeo.setFromPoints(tPts);}

// Audio
var aC=null,pO=null,pG=null,aOK=false;
function initAudio(){if(aOK)return;try{aC=new(window.AudioContext||window.webkitAudioContext)();pO=aC.createOscillator();var f=aC.createBiquadFilter();f.type='lowpass';f.frequency.value=190;pG=aC.createGain();pG.gain.value=0;pO.type='sawtooth';pO.frequency.value=80;pO.connect(f);f.connect(pG);pG.connect(aC.destination);pO.start();aOK=true;}catch(e){}}
function setHum(v,f){if(!aOK)return;pG.gain.setTargetAtTime(v,aC.currentTime,.28);pO.frequency.setTargetAtTime(f,aC.currentTime,.45);}
function beep(f,d,v){f=f||880;d=d||.09;v=v||.1;if(!aOK)return;try{var o=aC.createOscillator(),g=aC.createGain();o.frequency.value=f;g.gain.setValueAtTime(v,aC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,aC.currentTime+d);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d);}catch(e){}}
['click','touchstart'].forEach(function(ev){document.addEventListener(ev,initAudio,{once:true});});

// =====================================================================
// ANIMATION ENGINE (requestAnimationFrame - same as Google AI Studio)
// =====================================================================
var animOn=false,stopFlag=false;
var dX=0,dY=0,dZ=0,dYaw=0,dBat=100,dFly=false,dFlip=false,propSpd=0,fN=0;

function execQueue(q){
  if(!q.length||stopFlag){animOn=false;if(!stopFlag){clog('Mission complete!','lo');beep(660,.2);setTimeout(function(){beep(880,.2);},240);setTimeout(function(){beep(1100,.3);},480);}setUI(false);return;}
  var cmd=q.shift();
  if(cmd.log)clog(cmd.log,'lc');
  if(cmd.type==='goto'){if(cmd.p.tz>.1&&dZ<.1&&aOK){pO.frequency.setValueAtTime(62,aC.currentTime);pO.frequency.linearRampToValueAtTime(135,aC.currentTime+1.1);pG.gain.setValueAtTime(0,aC.currentTime);pG.gain.linearRampToValueAtTime(.08,aC.currentTime+1.1);}else if(cmd.p.tz<.1&&dZ>.1&&aOK){pO.frequency.linearRampToValueAtTime(62,aC.currentTime+1);pG.gain.linearRampToValueAtTime(0,aC.currentTime+1.6);}else if(!cmd.p._fast)beep(520,.05,.06);}
  var sX=dX,sY=dY,sZ=dZ,sYaw=dYaw,t0=performance.now(),dur=Math.max(50,cmd.dur||500);
  function anim(ts){
    if(stopFlag){animOn=false;setUI(false);return;}
    var prog=Math.min((ts-t0)/dur,1),e=prog<.5?2*prog*prog:-1+(4-2*prog)*prog;
    if(cmd.type==='goto'){dX=sX+(cmd.p.tx-sX)*e;dY=sY+(cmd.p.ty-sY)*e;dZ=sZ+(cmd.p.tz-sZ)*e;dYaw=sYaw+(cmd.p.tyaw-sYaw)*e;dFly=dZ>.05;}
    else if(cmd.type==='flip'){dFlip=prog<1;}
    dBat=Math.max(0,dBat-.002);
    if(prog<1)requestAnimationFrame(anim);
    else{dFlip=false;if(cmd.type==='goto'){dX=cmd.p.tx;dY=cmd.p.ty;dZ=cmd.p.tz;dYaw=cmd.p.tyaw;dFly=dZ>.05;}execQueue(q);}
  }
  requestAnimationFrame(anim);
}

// THREE.JS RENDER LOOP
function loop(){
  fN++;
  if(dRoot){dRoot.position.set(dX,dZ,dY);dRoot.rotation.y=-dYaw*Math.PI/180;dRoot.rotation.x=dFlip?Math.sin(fN*.3)*Math.PI*1.8:0;dRoot.rotation.z=0;}
  var ts=dFly?(0.28+vSpd*.05):0;propSpd+=(ts-propSpd)*.09;
  for(var i=0;i<propGs.length;i++)propGs[i].rotation.y+=propSpd*(i%2===0?1:-1);
  if(dGlow)dGlow.intensity=dFly?.55:0;
  if(fN%30===0&&aOK){if(dFly)setHum(.07,82+dZ*3+propSpd*155);else if(!animOn)setHum(0,82);}
  if(dZ>.06)addTrail(dX,dZ,dY);
  if(dRoot)cTgt.lerp(dRoot.position,.025);updCam();
  if(fN%8===0){document.getElementById('hx').textContent=dX.toFixed(1);document.getElementById('hy').textContent=dY.toFixed(1);document.getElementById('hz').textContent=dZ.toFixed(1)+'m';document.getElementById('hyaw').textContent=((dYaw%360+360)%360).toFixed(0);var bat=Math.round(dBat);var bel=document.getElementById('hbat');bel.textContent=bat+'%';bel.style.color=bat>50?'#3fb950':bat>20?'#e3b341':'#f85149';var st=document.getElementById('hstat');st.textContent=dFly?(animOn?'FLYING':'HOVERING'):'LANDED';st.style.color=dFly?'#00e5ff':'#8b949e';}
  rndr.render(scene,cam);requestAnimationFrame(loop);
}

// =====================================================================
// CONSOLE
// =====================================================================
var cout=document.getElementById('cout');
function clog(msg,cls){cls=cls||'li';var d=document.createElement('div');d.className=cls;d.textContent=msg;cout.appendChild(d);cout.scrollTop=9999;}

// =====================================================================
// RUN MISSION  - The working flow:
// 1. setupBuiltins() - register _drone_* JS functions
// 2. Sk.configure() - set output + simple read for stdlib only
// 3. Prepend Drone class + strip import lines from user code
// 4. Sk.importMainWithBody() - runs Python, fills Q[]
// 5. execQueue(Q.slice()) - animates
// =====================================================================
function runMission(){
  if(animOn)return;
  initAudio();
  // Reset
  stopFlag=false; resetV();
  dX=0;dY=0;dZ=0;dYaw=0;dBat=100;dFly=false;dFlip=false;
  tPts=[];if(tGeo.attributes&&tGeo.attributes.position)tGeo.deleteAttribute('position');
  if(dRoot){dRoot.position.set(0,0,0);dRoot.rotation.set(0,0,0);}
  pOff.set(0,0,0);
  cout.innerHTML='';
  clog('Running mission.py...','ls');
  setUI(true);
  mobSwitch('sim');

  // STEP 1: Register JS builtins (_drone_*)
  setupBuiltins();

  // STEP 2: Configure Skulpt - simple read, no pysimverse needed
  Sk.configure({
    output: function(text){ if(text.trim())clog(text.trim(),'li'); },
    read: function(x){
      if(Sk.builtinFiles&&Sk.builtinFiles['files']&&Sk.builtinFiles['files'][x]!==undefined)
        return Sk.builtinFiles['files'][x];
      throw new Error('File not found: '+x);
    },
    __future__: Sk.python3,
    execLimit: 120000
  });

  // STEP 3: Prepare code - strip import, prepend Drone class
  var code = prepareCode(cm.getValue());

  // STEP 4: Run Python (fills Q[])
  Sk.misceval.asyncToPromise(function(){
    return Sk.importMainWithBody('<stdin>',false,code,true);
  }).then(function(){
    var n=Q.length;
    clog('OK - '+n+' commands queued','lo');
    if(n===0){clog('No commands found!','lw');setUI(false);return;}
    // STEP 5: Animate
    animOn=true;
    execQueue(Q.slice());
  }).catch(function(err){
    var msg=err.tp$str?err.tp$str().v:String(err);
    clog('Error: '+msg,'le');
    document.getElementById('dot').className='err';
    setUI(false);
  });
}

function stopMission(){stopFlag=true;animOn=false;clog('Stopped.','lw');setUI(false);if(aOK)setHum(0,82);}

function setUI(r){animOn=r;document.getElementById('RUNBTN').style.display=r?'none':'';document.getElementById('STOPBTN').style.display=r?'':'none';document.getElementById('dot').className=r?'live':'';document.getElementById('mbico').textContent=r?'stop':'play';}

// =====================================================================
// UI WIRING
// =====================================================================
document.getElementById('RUNBTN').onclick=runMission;
document.getElementById('STOPBTN').onclick=stopMission;
document.getElementById('mbrun').onclick=runMission;

document.querySelectorAll('[data-v]').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('[data-v]').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');var v=btn.dataset.v,sp=document.getElementById('SIM'),cp=document.getElementById('CODE'),spl=document.getElementById('spl');if(v==='sim'){sp.style.cssText='flex:1;display:flex';cp.style.display='none';spl.style.display='none';}else if(v==='code'){sp.style.display='none';cp.style.cssText='width:100%;display:flex';spl.style.display='none';}else{sp.style.cssText='flex:1;display:flex';cp.style.cssText='width:46%;display:flex';spl.style.display='block';}setTimeout(function(){rsz();cm.refresh();},20);});});

function mobSwitch(pane){var sp=document.getElementById('SIM'),cp=document.getElementById('CODE');sp.classList.remove('on');cp.classList.remove('on');document.getElementById('mbsim').classList.remove('on');document.getElementById('mbcode').classList.remove('on');if(pane==='sim'){sp.classList.add('on');document.getElementById('mbsim').classList.add('on');setTimeout(rsz,20);}else{cp.classList.add('on');document.getElementById('mbcode').classList.add('on');setTimeout(function(){cm.refresh();},20);}}
document.getElementById('mbsim').onclick=function(){mobSwitch('sim');};
document.getElementById('mbcode').onclick=function(){mobSwitch('code');};
document.getElementById('mbmdl').onclick=function(){document.getElementById('fglb').click();};

function saveCode(){var b=new Blob([cm.getValue()],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mission.py';a.click();clog('Saved.','lo');}
function loadCode(){document.getElementById('fpy').click();}
['SAVBTN','msav'].forEach(function(id){document.getElementById(id).onclick=saveCode;});
['LOADBTN','mlod'].forEach(function(id){document.getElementById(id).onclick=loadCode;});
document.getElementById('fpy').addEventListener('change',function(){if(!this.files[0])return;var r=new FileReader();r.onload=function(e){cm.setValue(e.target.result);clog('Loaded: '+this.files[0].name,'lo');}.bind(this);r.readAsText(this.files[0]);this.value='';});

function loadGLB(file){if(!file)return;clog('Loading '+file.name+'...','ls');new THREE.GLTFLoader().load(URL.createObjectURL(file),function(g){custMdl=g.scene;var box=new THREE.Box3().setFromObject(custMdl),sz=box.getSize(new THREE.Vector3());custMdl.scale.setScalar(4/Math.max(sz.x,sz.y,sz.z,.01));custMdl.traverse(function(c){if(c.isMesh)c.castShadow=true;});document.getElementById('dsel').value='custom';setDrone('custom');clog('Loaded: '+file.name,'lo');beep(880,.1);},null,function(err){clog('Model error: '+err.message,'le');});}
['UPBTN','mmdl'].forEach(function(id){document.getElementById(id).onclick=function(){document.getElementById('fglb').click();};});
document.getElementById('fglb').addEventListener('change',function(){loadGLB(this.files[0]);this.value='';});
document.getElementById('dsel').onchange=function(){if(this.value==='custom'){document.getElementById('fglb').click();}else{setDrone(this.value);}};
document.body.addEventListener('dragover',function(e){e.preventDefault();document.getElementById('drp').classList.add('on');});
document.body.addEventListener('dragleave',function(e){if(!e.relatedTarget)document.getElementById('drp').classList.remove('on');});
document.body.addEventListener('drop',function(e){e.preventDefault();document.getElementById('drp').classList.remove('on');var f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.glb')||f.name.endsWith('.gltf')))loadGLB(f);else clog('Drop a .glb or .gltf file','lw');});

document.getElementById('envsel').onchange=function(){setEnv(this.value);};
var dark=true;
document.getElementById('THBTN').onclick=function(){dark=!dark;document.body.style.background=dark?'#07090f':'#f6f8fa';document.body.style.color=dark?'#f0f6fc':'#1f2328';cm.setOption('theme',dark?'dracula':'default');};

var splEl=document.getElementById('spl'),splDrag=false;
splEl.addEventListener('mousedown',function(e){splDrag=true;splEl.classList.add('drag');e.preventDefault();});
document.addEventListener('mousemove',function(e){if(!splDrag)return;var rect=document.getElementById('main').getBoundingClientRect();var pct=Math.min(78,Math.max(22,(e.clientX-rect.left)/rect.width*100));document.getElementById('SIM').style.cssText='flex:0 0 '+pct+'%;display:flex';rsz();});
document.addEventListener('mouseup',function(){splDrag=false;splEl.classList.remove('drag');});
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runMission();}if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCode();}});

// =====================================================================
// CODEMIRROR
// =====================================================================
var cm=CodeMirror.fromTextArea(document.getElementById('editor'),{
  mode:'python',theme:'dracula',lineNumbers:true,autoCloseBrackets:true,
  indentUnit:4,tabSize:4,lineWrapping:false,
  extraKeys:{'Tab':function(c){c.execCommand('indentMore');},'Shift-Tab':function(c){c.execCommand('indentLess');},'Ctrl-Enter':runMission,'Cmd-Enter':runMission}
});
cm.setValue(DEFAULT);cm.setSize('100%','100%');

// =====================================================================
// INIT
// =====================================================================
setEnv('night');setDrone('mavic');rsz();updCam();
if(window.innerWidth<=768)mobSwitch('code');
clog('DroneLab Pro ready! Press Run to fly.','lo');
clog('Ctrl+Enter: Run | Ctrl+S: Save | Drop .glb: custom model','ls');
requestAnimationFrame(loop);
</script>
