<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DroneLab Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://skulpt.org/js/skulpt.min.js"></script>
<script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
<style>
[data-theme="dark"]{--bg0:#060a10;--bg1:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#f0f6fc;--sub:#8b949e;--accent:#00d9ff;--accent2:#7c3aed;--green:#3fb950;--red:#f85149;--yellow:#e3b341;--code-bg:#0d1117;--console-bg:#060a10;--hdr:#010409}
[data-theme="light"]{--bg0:#f6f8fa;--bg1:#fff;--bg2:#f0f2f5;--bg3:#e8eaed;--border:#d0d7de;--text:#1f2328;--sub:#656d76;--accent:#0969da;--accent2:#7c3aed;--green:#1a7f37;--red:#cf222e;--yellow:#9a6700;--code-bg:#fff;--console-bg:#f6f8fa;--hdr:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:'SF Mono','JetBrains Mono','Fira Code',monospace;font-size:13px;transition:background .3s,color .3s}

/* HEADER */
#hdr{height:46px;display:flex;align-items:center;padding:0 10px;gap:7px;background:var(--hdr);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
#logo{display:flex;align-items:center;gap:7px;text-decoration:none}
#logo-ico{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
#logo-txt{font-size:14px;font-weight:800;letter-spacing:.5px}
#logo-txt b{color:var(--accent)}
.badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;letter-spacing:1px}
#htabs{flex:1;display:flex;align-items:center;justify-content:center;gap:2px}
.htab{height:34px;padding:0 12px;border:none;border-radius:6px;background:none;color:var(--sub);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;border-bottom:2px solid transparent;transition:all .2s}
.htab.on{color:var(--text);border-bottom-color:var(--accent);background:rgba(0,217,255,.07)}
.htab:hover:not(.on){color:var(--text);background:rgba(255,255,255,.05)}
#hdr-r{display:flex;align-items:center;gap:5px}
.hbtn{height:28px;padding:0 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
#runbtn{background:var(--green);border-color:var(--green);color:#000;font-size:12px;height:30px;padding:0 12px}
#runbtn:hover{filter:brightness(1.15)}
#stopbtn{background:var(--red);border-color:var(--red);color:#fff;display:none;height:30px}
#sdot{width:7px;height:7px;border-radius:50%;background:var(--bg3);flex-shrink:0;transition:all .3s}
#sdot.live{background:var(--green);box-shadow:0 0 7px var(--green)}
#sdot.err{background:var(--red);box-shadow:0 0 7px var(--red)}

/* LAYOUT */
#main{height:calc(100vh - 46px);display:flex;overflow:hidden}

/* SIM PANE */
#SP{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg0)}
#stb{display:flex;align-items:center;padding:4px 8px;gap:7px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;row-gap:3px}
#stb label{font-size:9px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase}
.sel{height:24px;padding:0 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg1);color:var(--text);font-family:inherit;font-size:11px;cursor:pointer}
.sel:hover{border-color:var(--accent)}
.sbtn{height:24px;padding:0 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg1);color:var(--text);font-family:inherit;font-size:11px;cursor:pointer}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}
#cvw{flex:1;position:relative;overflow:hidden}
canvas{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
#hud{position:absolute;top:8px;left:8px;pointer-events:none;display:flex;flex-direction:column;gap:4px}
.hrow{display:flex;gap:4px;flex-wrap:wrap}
.chip{background:rgba(6,10,16,.82);border:1px solid rgba(48,54,61,.8);border-radius:5px;padding:3px 8px;backdrop-filter:blur(5px);display:flex;align-items:center;gap:4px}
[data-theme="light"] .chip{background:rgba(246,248,250,.88);border-color:var(--border)}
.hl{font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase}
.hv{font-size:11px;font-weight:700;color:var(--accent);min-width:24px}
#shint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(139,148,158,.6);pointer-events:none;background:rgba(6,10,16,.55);padding:3px 10px;border-radius:20px;white-space:nowrap}

/* SPLITTER */
#spl{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .2s}
#spl:hover,#spl.drag{background:var(--accent)}

/* CODE PANE */
#CP{width:46%;min-width:200px;display:flex;flex-direction:column;background:var(--code-bg);border-left:1px solid var(--border)}
#ctabs{display:flex;align-items:center;padding:0 8px;height:32px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:6px}
.ctab{height:26px;padding:0 10px;font-size:11px;color:var(--sub);border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:4px;border-bottom:2px solid transparent;transition:all .15s}
.ctab.on{color:var(--accent);border-bottom-color:var(--accent)}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.ctab-r{margin-left:auto;display:flex;gap:4px}
.ctab-r .hbtn{height:20px;font-size:10px;padding:0 6px}
#cmw{flex:1;overflow:hidden;min-height:0}
.CodeMirror{height:100%!important;font-size:13px!important;line-height:1.75!important;font-family:inherit!important}
.CodeMirror-scroll{height:100%!important}
[data-theme="dark"] .CodeMirror{background:#0d1117!important}
[data-theme="light"] .CodeMirror{background:#fff!important}
.CodeMirror-gutters{border-right:1px solid var(--border)!important}
[data-theme="dark"] .CodeMirror-gutters{background:#0d1117!important}
[data-theme="light"] .CodeMirror-gutters{background:#f6f8fa!important}

/* CONSOLE */
#CON{height:150px;display:flex;flex-direction:column;border-top:1px solid var(--border);flex-shrink:0}
#conh{display:flex;align-items:center;padding:0 10px;height:26px;background:var(--bg2);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
#conh span{font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase}
#conh button{margin-left:auto;background:none;border:1px solid var(--border);color:var(--sub);padding:1px 7px;font-size:10px;border-radius:4px;cursor:pointer;font-family:inherit}
#conh button:hover{border-color:var(--accent);color:var(--accent)}
#cout{flex:1;overflow-y:auto;padding:5px 10px;font-size:11.5px;line-height:1.75;background:var(--console-bg)}
#cout::-webkit-scrollbar{width:3px}
#cout::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lo{color:var(--text)}.lc{color:var(--accent)}.ls{color:var(--green)}.le{color:var(--red)}.lw{color:var(--yellow)}.li{color:#79c0ff}

/* MOBILE NAV */
#mobnav{display:none;height:52px;background:var(--hdr);border-top:1px solid var(--border);flex-shrink:0}
@media(max-width:768px){
  #htabs,.desk{display:none!important}
  #main{flex-direction:column;height:calc(100vh - 46px - 52px)}
  #SP,#CP{width:100%!important;max-width:100%;flex:1;border-left:none;border-top:1px solid var(--border);display:none!important}
  #SP.ma,#CP.ma{display:flex!important}
  #spl{display:none!important}
  #mobnav{display:flex!important;height:52px;background:var(--hdr);border-top:1px solid var(--border);flex-shrink:0}
  .mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--sub);font-family:inherit;cursor:pointer;transition:color .2s;position:relative}
  .mnb.on{color:var(--accent)}
  .mnb.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 3px 3px}
  .mi{font-size:20px}.ml{font-size:9px;font-weight:700;letter-spacing:.5px}
  #logo-txt,.badge{display:none}
  #runbtn,#stopbtn{padding:0 10px;font-size:11px;height:28px}
  #stb{overflow-x:auto;flex-wrap:nowrap}
  #CON{height:120px}
}
@media(min-width:769px){
  #SP{display:flex!important}
  #CP{display:flex!important}
  #mobnav{display:none!important}
}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#020408,#060a10,#030608);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;animation:splOut .4s 1.8s forwards}
@keyframes splOut{to{opacity:0;visibility:hidden;pointer-events:none}}
.sico{font-size:52px;animation:sRotate 1.5s ease-in-out infinite}
@keyframes sRotate{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.stitle{font-size:22px;font-weight:900;color:#00d9ff;letter-spacing:6px}
.ssub{font-size:9px;color:#8b949e;letter-spacing:3px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Drop overlay */
#dropov{position:fixed;inset:0;z-index:500;background:rgba(0,217,255,.1);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;font-size:20px;color:var(--accent)}
#dropov.show{display:flex}
</style>
</head>
<body>

<div id="splash">
  <div class="sico">🚁</div>
  <div class="stitle">DRONELAB PRO</div>
  <div class="ssub">LOADING SIMULATION ENGINE...</div>
</div>

<div id="dropov"><div>📦</div><div style="font-size:14px">Drop .glb / .gltf file to load drone model</div></div>

<!-- HEADER -->
<div id="hdr">
  <a id="logo" href="#"><div id="logo-ico">🚁</div><div id="logo-txt">Drone<b>Lab</b></div></a>
  <div class="badge">PRO</div>
  <div id="htabs">
    <button class="htab on" data-v="both">⬛ Split</button>
    <button class="htab" data-v="sim">🌐 Sim</button>
    <button class="htab" data-v="code">📝 Code</button>
  </div>
  <div id="hdr-r">
    <div id="sdot"></div>
    <button class="hbtn desk" id="savebtn">💾 Save</button>
    <button class="hbtn desk" id="loadbtn">📂 Load</button>
    <button class="hbtn desk" id="upbtn">📦 Model</button>
    <button class="hbtn" id="thbtn">🌙</button>
    <button class="hbtn" id="runbtn">▶ Run</button>
    <button class="hbtn" id="stopbtn">⛔ Stop</button>
  </div>
</div>

<input type="file" id="fpy" accept=".py" style="display:none">
<input type="file" id="fglb" accept=".glb,.gltf" style="display:none">

<!-- MAIN -->
<div id="main">
  <div id="SP" class="ma">
    <div id="stb">
      <label>ENV</label>
      <select class="sel" id="envsel">
        <option value="night" selected>🌙 Night</option>
        <option value="day">☀️ Day</option>
        <option value="afternoon">🌤 Afternoon</option>
        <option value="evening">🌅 Evening</option>
        <option value="indoor">🏠 Indoor</option>
        <option value="grass">🌿 Grass</option>
        <option value="road">🛣 Road</option>
        <option value="mountain">⛰ Mountain</option>
      </select>
      <label>DRONE</label>
      <select class="sel" id="dsel">
        <option value="mavic">DJI Mavic</option>
        <option value="racing">Racing</option>
        <option value="delivery">Delivery</option>
        <option value="custom">Custom GLB</option>
      </select>
      <button class="sbtn" id="recam">⌖ Reset View</button>
    </div>
    <div id="cvw">
      <canvas id="cvs"></canvas>
      <div id="hud">
        <div class="hrow">
          <div class="chip"><span class="hl">X</span><span class="hv" id="hx">0.0</span></div>
          <div class="chip"><span class="hl">Y</span><span class="hv" id="hy">0.0</span></div>
          <div class="chip"><span class="hl">ALT</span><span class="hv" id="hz">0.0m</span></div>
        </div>
        <div class="hrow">
          <div class="chip"><span class="hl">YAW</span><span class="hv" id="hyaw">0°</span></div>
          <div class="chip"><span class="hl">SPD</span><span class="hv" id="hspd">—</span></div>
          <div class="chip"><span class="hl">BAT</span><span class="hv" id="hbat" style="color:var(--green)">100%</span></div>
        </div>
      </div>
      <div id="shint">Drag: orbit · Pinch/Scroll: zoom · Right-drag: pan</div>
    </div>
  </div>

  <div id="spl"></div>

  <div id="CP">
    <div id="ctabs">
      <div class="ctab on"><div class="cdot"></div>mission.py</div>
      <div class="ctab-r">
        <button class="hbtn" id="msave">💾</button>
        <button class="hbtn" id="mload">📂</button>
        <button class="hbtn" id="mmodel">📦</button>
      </div>
    </div>
    <div id="cmw"><textarea id="code"></textarea></div>
    <div id="CON">
      <div id="conh"><span>▸ Console</span><button onclick="document.getElementById('cout').innerHTML=''">Clear</button></div>
      <div id="cout"></div>
    </div>
  </div>
</div>

<div id="mobnav">
  <button class="mnb on" id="mbn-sim"><span class="mi">🌐</span><span class="ml">SIM</span></button>
  <button class="mnb" id="mbn-code"><span class="mi">📝</span><span class="ml">CODE</span></button>
  <button class="mnb" id="mbn-run"><span class="mi" id="run-ico">▶</span><span class="ml">RUN</span></button>
  <button class="mnb" id="mbn-model"><span class="mi">📦</span><span class="ml">MODEL</span></button>
</div>

<script>
'use strict';
// ═══════════════ DEFAULT CODE ════════════════════
const DEFAULT=`# DroneLab Pro — PySimverse API
# Compatible with FreeCodeCamp tutorial by Murtaza Hassan
from pysimverse import Drone
import math

drone = Drone()
drone.connect()

# ── Mission 1: Basic Navigation ─────────────────
drone.takeoff(height=5)
drone.set_speed(1.5)

# Square pattern
for i in range(4):
    drone.move_forward(distance=3)
    drone.rotate_cw(degrees=90)

# ── Mission 2: Sensor Data ──────────────────────
pos = drone.get_position()
print(f"Position: x={pos[0]:.1f}, y={pos[1]:.1f}, z={pos[2]:.1f}")
print(f"Battery: {drone.get_battery()}%")

# ── Mission 3: Patterns ─────────────────────────
drone.move_up(distance=2)
drone.spiral(radius=2, height=3, turns=2)
drone.go_to(x=0, y=0, z=6)
drone.orbit(cx=0, cy=0, radius=3, laps=1)

# ── Mission 4: Flips & Stunts ───────────────────
drone.go_to(x=0, y=0, z=5)
drone.flip('forward')
drone.hover(seconds=1)

# ── Mission 5: CV Simulation (FreeCodeCamp) ─────
face = drone.detect_face()
print(f"Face: {face}")

gesture = drone.detect_gesture()
print(f"Gesture: {gesture}")

# Line following (like FreeCodeCamp mission)
drone.go_to(x=-4, y=-4, z=2)
drone.follow_line(path=[(0,0),(2,0),(4,2),(6,2)], height=2)

# ── Return Home ─────────────────────────────────
drone.return_home()
drone.land()
print("Mission complete! ✅")
`;

// ═══════════════ THREE.JS SETUP ═════════════════
const cvs=document.getElementById('cvs');
const cvw=document.getElementById('cvw');
const renderer=new THREE.WebGLRenderer({canvas:cvs,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,1,.05,800);

let camR=22,camTh=40,camPh=28;
const camTgt=new THREE.Vector3(0,2,0);
const panOff=new THREE.Vector3();

function updateCam(){
  const ph=camPh*Math.PI/180,th=camTh*Math.PI/180;
  camera.position.set(
    camTgt.x+panOff.x+camR*Math.cos(ph)*Math.sin(th),
    camTgt.y+panOff.y+camR*Math.sin(ph),
    camTgt.z+panOff.z+camR*Math.cos(ph)*Math.cos(th)
  );
  camera.lookAt(camTgt.x+panOff.x,camTgt.y+panOff.y,camTgt.z+panOff.z);
}

function resz(){
  const W=cvw.clientWidth,H=cvw.clientHeight;
  if(!W||!H)return;
  renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
}
window.addEventListener('resize',resz);

// orbit controls
let dn=false,lx=0,ly=0,rmb=false,pd=0;
cvs.addEventListener('mousedown',e=>{dn=true;lx=e.clientX;ly=e.clientY;rmb=e.button===2;e.preventDefault();});
cvs.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('mousemove',e=>{
  if(!dn)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
  if(rmb){panOff.x-=dx*.025;panOff.z-=dy*.025;}
  else{camTh-=dx*.4;camPh=Math.max(3,Math.min(89,camPh+dy*.32));}
});
document.addEventListener('mouseup',()=>dn=false);
cvs.addEventListener('wheel',e=>{camR=Math.max(3,Math.min(80,camR+e.deltaY*.05));},{passive:true});
cvs.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){dn=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  if(e.touches.length===2){dn=false;pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:false});
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dn){const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;camTh-=dx*.45;camPh=Math.max(3,Math.min(89,camPh+dy*.35));lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);camR=Math.max(3,Math.min(80,camR-(d-pd)*.06));pd=d;}
},{passive:false});
cvs.addEventListener('touchend',()=>dn=false);
document.getElementById('recam').onclick=()=>{camR=22;camTh=40;camPh=28;panOff.set(0,0,0);camTgt.set(0,2,0);};

// ═══════════════ ENVIRONMENTS ════════════════════
let envObj=[],sun,fill,amb;
const ENVS={
  night:  {sky:0x020408,fog:0x060a10,fd:.02, si:0.3,sc:0x334466,sp:[10,20,10],ai:.15,ac:0x1a2240},
  day:    {sky:0x87ceeb,fog:0xb8e4ff,fd:.012,si:1.2,sc:0xfff5cc,sp:[20,40,20],ai:.6, ac:0xfff0dd},
  afternoon:{sky:0x6ab0d4,fog:0x9ecee8,fd:.012,si:1.0,sc:0xffdd99,sp:[10,25,20],ai:.55,ac:0xffeedd},
  evening:{sky:0x1a0a3a,fog:0x3a1a2a,fd:.018,si:0.7,sc:0xff6633,sp:[-5,8,20],ai:.35,ac:0xff9944},
  indoor: {sky:0x1a1a24,fog:0x1a1a24,fd:.04, si:0.8,sc:0xfff4cc,sp:[0,10,0], ai:.5, ac:0xfff0cc},
  grass:  {sky:0x6ec6e6,fog:0x8ddaf0,fd:.01, si:1.1,sc:0xffffff,sp:[15,35,10],ai:.55,ac:0xddfadd},
  road:   {sky:0x8ab8d4,fog:0x9ecad8,fd:.012,si:1.0,sc:0xffffff,sp:[20,30,10],ai:.5, ac:0xddeeff},
  mountain:{sky:0x3a6080,fog:0x2a5070,fd:.015,si:0.9,sc:0xffeebb,sp:[20,40,5],ai:.4, ac:0xddeeff},
};

function plane(color,sx=120,sz=120){const m=new THREE.Mesh(new THREE.PlaneGeometry(sx,sz),new THREE.MeshLambertMaterial({color}));m.rotation.x=-Math.PI/2;m.receiveShadow=true;return m;}
function box(w,h,d,color,x=0,y=0,z=0){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color}));m.position.set(x,y,z);m.castShadow=true;return m;}
function cone(r,h,color,x=0,y=0,z=0,seg=8){const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),new THREE.MeshLambertMaterial({color}));m.position.set(x,y+h/2,z);m.castShadow=true;return m;}

function setEnv(key){
  envObj.forEach(o=>scene.remove(o)); envObj=[];
  const E=ENVS[key]||ENVS.night;
  renderer.setClearColor(E.sky);
  scene.background=new THREE.Color(E.sky);
  scene.fog=new THREE.FogExp2(E.fog,E.fd);
  scene.remove(sun);scene.remove(fill);scene.remove(amb);
  amb=new THREE.AmbientLight(E.ac,E.ai);
  sun=new THREE.DirectionalLight(E.sc,E.si);
  sun.position.set(...E.sp); sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.left=sun.shadow.camera.bottom=-40;
  sun.shadow.camera.right=sun.shadow.camera.top=40;
  sun.shadow.camera.near=.5; sun.shadow.camera.far=120;
  fill=new THREE.PointLight(0x00d9ff,.4,40); fill.position.set(-8,8,-8);
  scene.add(amb,sun,fill);
  const add=o=>{scene.add(o);envObj.push(o);};

  if(key==='day'||key==='afternoon'){
    add(plane(0x4a8a35));
    add(new THREE.GridHelper(80,40,0x2a6a20,0x2a6a20));
    for(let i=0;i<8;i++){const x=(Math.random()-.5)*60,z=(Math.random()-.5)*60;if(Math.abs(x)<8&&Math.abs(z)<8)continue;add(box(.6,3,.6,0x4a2800,x,1.5,z));add(cone(2,4,0x2d6a2d,x,3,z,7));}
  } else if(key==='evening'){
    add(plane(0x2a1a10));
    add(new THREE.GridHelper(80,40,0x3a2010,0x3a2010));
    const sv=[];for(let i=0;i<500;i++)sv.push((Math.random()-.5)*200,Math.random()*60+20,(Math.random()-.5)*200);
    const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
    add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.25,transparent:true,opacity:.7})));
  } else if(key==='night'){
    add(plane(0x060810));
    add(new THREE.GridHelper(80,40,0x0d2030,0x081018));
    const sv=[];for(let i=0;i<700;i++)sv.push((Math.random()-.5)*300,Math.random()*80+15,(Math.random()-.5)*300);
    const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
    add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.22,transparent:true,opacity:.9})));
    const moon=new THREE.Mesh(new THREE.SphereGeometry(3,12,12),new THREE.MeshBasicMaterial({color:0xeeeedd}));
    moon.position.set(-45,52,-60);add(moon);
    for(let i=-2;i<=2;i++){
      add(box(.12,5,.12,0x333344,i*10,2.5,15));
      const bl=new THREE.Mesh(new THREE.SphereGeometry(.28,6,6),new THREE.MeshBasicMaterial({color:0xffee88}));bl.position.set(i*10,5.3,15);add(bl);
      const pl=new THREE.PointLight(0xffee88,.9,14);pl.position.set(i*10,5,15);add(pl);
    }
  } else if(key==='indoor'){
    add(plane(0x8a7a6a,22,22));
    const wm=new THREE.MeshLambertMaterial({color:0xc8b89a,side:THREE.BackSide});
    const rm=new THREE.Mesh(new THREE.BoxGeometry(24,14,24),wm);rm.position.set(0,7,0);add(rm);
    const cl=new THREE.Mesh(new THREE.BoxGeometry(3,.1,3),new THREE.MeshBasicMaterial({color:0xfff8ee}));cl.position.set(0,13.9,0);add(cl);
    const pl=new THREE.PointLight(0xfff4cc,1.5,25);pl.position.set(0,12,0);add(pl);
    add(new THREE.GridHelper(20,20,0x9a8a7a,0x9a8a7a));
  } else if(key==='grass'){
    add(plane(0x3d8a28));
    add(new THREE.GridHelper(80,40,0x2a6a18,0x2a6a18));
    for(let i=0;i<20;i++){const x=(Math.random()-.5)*70,z=(Math.random()-.5)*70;const s=new THREE.Mesh(new THREE.SphereGeometry(.4,5,5),new THREE.MeshLambertMaterial({color:Math.random()>.5?0xffdd44:0xff6688}));s.position.set(x,.4,z);add(s);}
  } else if(key==='road'){
    add(plane(0x556655));
    const rd=new THREE.Mesh(new THREE.PlaneGeometry(8,100),new THREE.MeshLambertMaterial({color:0x3a3a3a}));rd.rotation.x=-Math.PI/2;rd.position.y=.01;add(rd);
    for(let i=-10;i<=10;i++){const m=new THREE.Mesh(new THREE.PlaneGeometry(.28,2.8),new THREE.MeshBasicMaterial({color:0xffff00}));m.rotation.x=-Math.PI/2;m.position.set(0,.02,i*6);add(m);}
    const cc=[0xdd3333,0x3366dd,0xdddd33,0x33dd66];
    [-20,-5,12,28].forEach((z,i)=>{add(box(2,1.2,3.5,cc[i],i%2===0?2.5:-2.5,.6,z));add(box(1.6,.8,2,cc[i],i%2===0?2.5:-2.5,1.65,z));});
    add(new THREE.GridHelper(120,60,0x445544,0x445544));
  } else if(key==='mountain'){
    add(plane(0x4a6038,200,200));
    add(new THREE.GridHelper(120,60,0x3a5028,0x3a5028));
    [[40,0,-40,8,22],[-35,0,45,6,18],[55,0,20,5,15],[-50,0,-30,10,28]].forEach(([x,y,z,r,h])=>{add(cone(r,h,0x6a7060,x,0,z,8));add(cone(r*.28,h*.28,0xeeeeff,x,h*.72,z,8));});
    for(let i=0;i<12;i++){const x=(Math.random()-.5)*40,z=(Math.random()-.5)*40;add(cone(1.4,5,0x2a6a2a,x,0,z,7));}
  }
  // Landing pad + axes (always)
  const lp=new THREE.Mesh(new THREE.CircleGeometry(1.6,32),new THREE.MeshBasicMaterial({color:0x00d9ff,transparent:true,opacity:.15}));lp.rotation.x=-Math.PI/2;lp.position.y=.01;add(lp);
  const lr=new THREE.Mesh(new THREE.RingGeometry(1.5,1.7,32),new THREE.MeshBasicMaterial({color:0x00d9ff,transparent:true,opacity:.5,side:THREE.DoubleSide}));lr.rotation.x=-Math.PI/2;lr.position.y=.02;add(lr);
  [[new THREE.Vector3(0,.01,0),new THREE.Vector3(3,.01,0),0xf85149],[new THREE.Vector3(0,.01,0),new THREE.Vector3(0,3,0),0x3fb950],[new THREE.Vector3(0,.01,0),new THREE.Vector3(0,.01,3),0x00d9ff]].forEach(([a,b,c])=>{const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineBasicMaterial({color:c}));add(l);});
}

let droneRoot=null,propGs=[],droneGlow,customMdl=null;

function buildMavic(){
  const G=new THREE.Group();
  const mb=new THREE.MeshPhongMaterial({color:0x1c2535,shininess:140,specular:0x446688});
  const md=new THREE.MeshPhongMaterial({color:0x0e1520,shininess:80});
  const ma=new THREE.MeshPhongMaterial({color:0x151e2a,shininess:60});
  const mm=new THREE.MeshPhongMaterial({color:0x08101a,shininess:220,specular:0x4488cc});
  const mp=new THREE.MeshPhongMaterial({color:0x253040,transparent:true,opacity:.85,shininess:30,side:THREE.DoubleSide});
  const mg=new THREE.MeshPhongMaterial({color:0x001020,transparent:true,opacity:.65,shininess:300,specular:0x88ccff});
  const mled=new THREE.MeshBasicMaterial({color:0x00d9ff});
  const mR=new THREE.MeshBasicMaterial({color:0xff2222});
  const mGr=new THREE.MeshBasicMaterial({color:0x22ff44});
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.2,.32,1.1),mb);body.castShadow=true;G.add(body);
  const hump=new THREE.Mesh(new THREE.BoxGeometry(1,.22,.7),mb);hump.position.set(-.1,.27,0);G.add(hump);
  const sens=new THREE.Mesh(new THREE.BoxGeometry(.22,.2,.9),md);sens.position.set(.95,-.04,0);G.add(sens);
  const led=new THREE.Mesh(new THREE.BoxGeometry(.5,.04,.05),mled);led.position.set(.7,.18,0);G.add(led);
  const mPos=[[1.7,0,-1.7],[1.7,0,1.7],[-1.7,0,-1.7],[-1.7,0,1.7]];
  propGs=[];
  mPos.forEach(([mx,my,mz],idx)=>{
    const al=Math.sqrt(mx*mx+mz*mz)*.95;
    const arm=new THREE.Mesh(new THREE.BoxGeometry(al,.08,.1),ma);arm.position.set(mx*.5,0,mz*.5);arm.rotation.y=Math.atan2(mx,mz);arm.castShadow=true;G.add(arm);
    const ring=new THREE.Mesh(new THREE.CylinderGeometry(.22,.22,.14,14),mm);ring.position.set(mx,.07,mz);G.add(ring);
    const bell=new THREE.Mesh(new THREE.CylinderGeometry(.14,.19,.12,12),mm);bell.position.set(mx,.18,mz);G.add(bell);
    const pg=new THREE.Group();pg.position.set(mx,.25,mz);
    for(let b=0;b<2;b++){const blade=new THREE.Mesh(new THREE.BoxGeometry(1.7,.02,.15),mp);blade.rotation.y=b*Math.PI/2;blade.rotation.z=.06;pg.add(blade);}
    G.add(pg);propGs.push(pg);
    const tm=idx<2?mGr:mR;const tip=new THREE.Mesh(new THREE.SphereGeometry(.06,5,5),tm);tip.position.set(mx,.26,mz);G.add(tip);
  });
  [-0.6,0.6].forEach(z=>{
    const sk=new THREE.Mesh(new THREE.BoxGeometry(1.8,.05,.07),ma);sk.position.set(0,-.28,z);sk.castShadow=true;G.add(sk);
    [-0.7,0.7].forEach(x=>{const st=new THREE.Mesh(new THREE.BoxGeometry(.06,.28,.06),ma);st.position.set(x,-.14,z);G.add(st);});
  });
  const gim=new THREE.Mesh(new THREE.SphereGeometry(.16,10,8),md);gim.position.set(.88,-.22,0);G.add(gim);
  const lens=new THREE.Mesh(new THREE.SphereGeometry(.1,10,8),mg);lens.position.set(.98,-.22,0);G.add(lens);
  const lring=new THREE.Mesh(new THREE.TorusGeometry(.1,.02,6,16),mm);lring.position.set(.98,-.22,0);lring.rotation.y=Math.PI/2;G.add(lring);
  droneGlow=new THREE.PointLight(0x00d9ff,0,5);droneGlow.position.set(0,-1,0);G.add(droneGlow);
  G.traverse(c=>{if(c.isMesh)c.castShadow=true;});
  return G;
}

function buildRacing(){
  const G=new THREE.Group();
  const mf=new THREE.MeshPhongMaterial({color:0x1a0505,shininess:120,specular:0xff3300});
  const ma=new THREE.MeshPhongMaterial({color:0x0a0a0a});
  const mp=new THREE.MeshPhongMaterial({color:0xff2222,transparent:true,opacity:.8,side:THREE.DoubleSide});
  G.add(new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,.1,6),mf));
  propGs=[];
  [[1,0,-1],[1,0,1],[-1,0,-1],[-1,0,1]].forEach(([mx,_,mz],i)=>{
    const arm=new THREE.Mesh(new THREE.BoxGeometry(Math.SQRT2,.06,.06),ma);arm.position.set(mx*.5,0,mz*.5);arm.rotation.y=Math.atan2(mx,mz);G.add(arm);
    const pg=new THREE.Group();pg.position.set(mx,.1,mz);
    for(let b=0;b<2;b++){const blade=new THREE.Mesh(new THREE.BoxGeometry(1.2,.02,.12),mp);blade.rotation.y=b*Math.PI/2;pg.add(blade);}
    G.add(pg);propGs.push(pg);
  });
  droneGlow=new THREE.PointLight(0xff3300,0,4);droneGlow.position.set(0,-.5,0);G.add(droneGlow);
  G.traverse(c=>{if(c.isMesh)c.castShadow=true;});return G;
}

function buildDelivery(){
  const G=new THREE.Group();
  const mb=new THREE.MeshPhongMaterial({color:0xfaf0e0,shininess:100,specular:0x446688});
  const ma=new THREE.MeshPhongMaterial({color:0xc8c0b0});
  const mp=new THREE.MeshPhongMaterial({color:0x8899aa,transparent:true,opacity:.8,side:THREE.DoubleSide});
  G.add(new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,.25,6),mb));
  const bx=new THREE.Mesh(new THREE.BoxGeometry(1,.6,1),new THREE.MeshPhongMaterial({color:0x4488cc}));bx.position.set(0,-.4,0);G.add(bx);
  propGs=[];
  [0,60,120,180,240,300].map(a=>[2*Math.cos(a*Math.PI/180),0,2*Math.sin(a*Math.PI/180)]).forEach(([mx,my,mz],i)=>{
    const arm=new THREE.Mesh(new THREE.BoxGeometry(2,.07,.07),ma);arm.position.set(mx*.5,0,mz*.5);arm.rotation.y=Math.atan2(mx,mz);G.add(arm);
    const pg=new THREE.Group();pg.position.set(mx,.15,mz);
    for(let b=0;b<2;b++){const blade=new THREE.Mesh(new THREE.BoxGeometry(1.3,.02,.12),mp);blade.rotation.y=b*Math.PI/2;pg.add(blade);}
    G.add(pg);propGs.push(pg);
  });
  droneGlow=new THREE.PointLight(0xffffff,0,6);droneGlow.position.set(0,-1,0);G.add(droneGlow);
  G.traverse(c=>{if(c.isMesh)c.castShadow=true;});return G;
}

function setDrone(type){
  if(droneRoot)scene.remove(droneRoot);propGs=[];droneGlow=null;
  if(type==='custom'&&customMdl){droneRoot=customMdl;scene.add(droneRoot);return;}
  droneRoot=type==='racing'?buildRacing():type==='delivery'?buildDelivery():buildMavic();
  scene.add(droneRoot);
}

// ═══════════════ AUDIO ═══════════════════════════
let aC=null,pOsc=null,pGain=null,aOK=false;
function initAudio(){if(aOK)return;try{aC=new(window.AudioContext||window.webkitAudioContext)();pOsc=aC.createOscillator();const f=aC.createBiquadFilter();f.type='lowpass';f.frequency.value=200;pGain=aC.createGain();pGain.gain.value=0;pOsc.type='sawtooth';pOsc.frequency.value=80;pOsc.connect(f);f.connect(pGain);pGain.connect(aC.destination);pOsc.start();aOK=true;}catch(e){}}
function setHum(v,f){if(!aOK)return;pGain.gain.setTargetAtTime(v,aC.currentTime,.25);pOsc.frequency.setTargetAtTime(f,aC.currentTime,.4);}
function beep(f=880,d=.09,v=.1){if(!aOK)return;try{const o=aC.createOscillator(),g=aC.createGain();o.frequency.value=f;g.gain.setValueAtTime(v,aC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,aC.currentTime+d);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d);}catch(e){}}
function tsound(){if(!aOK)return;pOsc.frequency.setValueAtTime(60,aC.currentTime);pOsc.frequency.linearRampToValueAtTime(130,aC.currentTime+1.2);pGain.gain.setValueAtTime(0,aC.currentTime);pGain.gain.linearRampToValueAtTime(.08,aC.currentTime+1.2);}
function lsound(){if(!aOK)return;pOsc.frequency.linearRampToValueAtTime(60,aC.currentTime+1);pGain.gain.linearRampToValueAtTime(0,aC.currentTime+1.5);}
['click','touchstart'].forEach(ev=>document.addEventListener(ev,initAudio,{once:true}));

let P={x:0,y:0,z:0,yaw:0,spd:1,flying:false,battery:100};
let C={x:0,y:0,z:0,yaw:0,flying:false,battery:100};
let cmdQ=[],curC=null,cFrom=null,cT0=0;
let running=false,stop=false,done=true,bDrain=0,fAngle=0,frameN=0;
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t}
function qm(tx,ty,tz,ty2,ms,log,fast=false){cmdQ.push({t:'move',tx,ty,tz,ty2,dur:Math.max(fast?90:300,ms),log,fast});P.x=tx;P.y=ty;P.z=tz;P.yaw=ty2;}
function qh(ms,log){cmdQ.push({t:'hover',dur:ms,log});}
function qfl(dir){cmdQ.push({t:'flip',dir,dur:680,log:`🤸 flip('${dir}')`});}
function qfn(fn){cmdQ.push({t:'fn',fn});}

// ═══════════════ SKULPT SETUP ════════════════════
const NONE=()=>Sk.builtin.none.none$;
function N(v,d=0){return v!=null?Sk.ffi.remapToJs(v):d}
function S(v,d=''){return v!=null?Sk.ffi.remapToJs(v):d}
function sk(fn){return new Sk.builtin.func(fn)}

function makeDrone(){
  return Sk.misceval.buildClass(Sk.builtins,function($g,$l){
    $l.__init__=sk(function(self){return NONE();});
    $l.connect=sk(function(self){qfn(()=>{clog('🔗 drone.connect()','ls');beep(440,.1);});return NONE();});
    $l.disconnect=sk(function(self){qfn(()=>clog('🔌 drone.disconnect()','li'));return NONE();});
    $l.takeoff=sk(function(self,h){const ht=N(h,3);if(P.flying){clog('⚠ Already flying!','lw');return NONE();}P.flying=true;qm(P.x,P.y,ht,P.yaw,Math.max(900,ht*400/P.spd),`🚀 takeoff(height=${ht})`);qfn(()=>tsound());return NONE();});
    $l.land=sk(function(self){P.flying=false;qm(P.x,P.y,0,P.yaw,Math.max(900,P.z*400/P.spd),`🛬 land()`);qfn(()=>lsound());return NONE();});
    $l.hover=sk(function(self,s){const sec=N(s,1);qh(sec*1000,`⏸ hover(${sec}s)`);return NONE();});
    $l.return_home=sk(function(self){const d=Math.hypot(P.x,P.y);qm(0,0,P.z,P.yaw,Math.max(600,d*380/P.spd),`🏠 return_home()`);return NONE();});
    $l.emergency_land=sk(function(self){P.flying=false;qm(P.x,P.y,0,P.yaw,400,`🚨 emergency_land()`);return NONE();});
    function mv(n,xs,zs){return sk(function(self,d,sp){const dist=N(d,1);if(sp)P.spd=Math.max(.1,Math.min(5,N(sp)));const r=P.yaw*Math.PI/180;qm(P.x+xs(r)*dist,P.y+zs(r)*dist,P.z,P.yaw,Math.max(300,dist*380/P.spd),`${n}(${dist})`);return NONE();});}
    $l.move_forward =mv('⬆ move_forward', r=>Math.sin(r),r=>Math.cos(r));
    $l.move_backward=mv('⬇ move_backward',r=>-Math.sin(r),r=>-Math.cos(r));
    $l.move_left    =mv('← move_left',    r=>-Math.cos(r),r=>Math.sin(r));
    $l.move_right   =mv('→ move_right',   r=>Math.cos(r), r=>-Math.sin(r));
    $l.move_up=sk(function(self,d){const dist=N(d,1);qm(P.x,P.y,P.z+dist,P.yaw,Math.max(300,dist*360/P.spd),`↑ move_up(${dist})`);return NONE();});
    $l.move_down=sk(function(self,d){const dist=N(d,1);qm(P.x,P.y,Math.max(0,P.z-dist),P.yaw,Math.max(300,dist*360/P.spd),`↓ move_down(${dist})`);return NONE();});
    $l.go_to=sk(function(self,x,y,z,sp){const tx=N(x,P.x),ty=N(y,P.y),tz=N(z,P.z);if(sp)P.spd=Math.max(.1,Math.min(5,N(sp)));const d=Math.hypot(tx-P.x,ty-P.y,tz-P.z);qm(tx,ty,tz,P.yaw,Math.max(400,d*380/P.spd),`📍 go_to(${tx.toFixed(1)},${ty.toFixed(1)},${tz.toFixed(1)})`);return NONE();});
    $l.set_position=$l.go_to;
    $l.rotate_cw=sk(function(self,deg){const d=N(deg,90);qm(P.x,P.y,P.z,P.yaw+d,Math.max(250,d*10/P.spd),`↻ rotate_cw(${d}°)`);return NONE();});
    $l.rotate_ccw=sk(function(self,deg){const d=N(deg,90);qm(P.x,P.y,P.z,P.yaw-d,Math.max(250,d*10/P.spd),`↺ rotate_ccw(${d}°)`);return NONE();});
    $l.set_yaw=sk(function(self,a){const ang=N(a,0);qm(P.x,P.y,P.z,ang,350,`🧭 set_yaw(${ang}°)`);return NONE();});
    $l.face=sk(function(self,d){const a={north:0,east:90,south:180,west:270,n:0,e:90,s:180,w:270}[S(d).toLowerCase()]??0;qm(P.x,P.y,P.z,a,350,`🧭 face('${S(d)}')`);return NONE();});
    $l.set_speed=sk(function(self,s){P.spd=Math.max(.1,Math.min(5,N(s,1)));qfn(()=>{clog(`⚡ set_speed(${P.spd.toFixed(1)})`,'li');beep(660,.06);});return NONE();});
    $l.flip=sk(function(self,d){qfl(S(d,'forward'));return NONE();});
    $l.flip_forward=sk(function(self){qfl('forward');return NONE();});
    $l.flip_backward=sk(function(self){qfl('backward');return NONE();});
    $l.flip_left=sk(function(self){qfl('left');return NONE();});
    $l.flip_right=sk(function(self){qfl('right');return NONE();});
    // Patterns
    $l.orbit=sk(function(self,cx,cy,r,laps,dir){const ocx=N(cx,0),ocy=N(cy,0),rad=N(r,2),l=N(laps,1);const d=S(dir,'cw')==='ccw'?-1:1;clog(`🔵 orbit(r=${rad},laps=${l})`,'li');const steps=Math.ceil(42*l);for(let i=1;i<=steps;i++){const a=d*(i/42)*Math.PI*2;qm(ocx+rad*Math.cos(a),ocy+rad*Math.sin(a),P.z,P.yaw,90,null,true);}return NONE();});
    $l.circle=sk(function(self,r,laps){const rad=N(r,2),l=N(laps,1),sx=P.x,sy=P.y;clog(`⭕ circle(r=${rad})`,'li');const steps=Math.ceil(42*l);for(let i=1;i<=steps;i++){const a=(i/42)*Math.PI*2;qm(sx+rad*Math.sin(a),sy+rad-rad*Math.cos(a),P.z,P.yaw,90,null,true);}return NONE();});
    $l.spiral=sk(function(self,r,h,t){const rad=N(r,3),ht=N(h,5),turns=N(t,3);clog(`🌀 spiral(r=${rad},h=${ht})`,'li');const steps=Math.ceil(42*turns),sx=P.x,sy=P.y,sz=P.z;for(let i=1;i<=steps;i++){const a=(i/42)*Math.PI*2;qm(sx+rad*Math.cos(a),sy+rad*Math.sin(a),sz+ht*(i/steps),P.yaw,90,null,true);}return NONE();});
    $l.figure_8=sk(function(self,size){const s=N(size,3),cx=P.x,cy=P.y;clog(`∞ figure_8(s=${s})`,'li');for(let i=1;i<=36;i++){const a=(i/36)*Math.PI*2;qm(cx+s*Math.sin(a),cy+s*Math.sin(a)*Math.cos(a),P.z,P.yaw,90,null,true);}for(let i=1;i<=36;i++){const a=(i/36)*Math.PI*2;qm(cx-s*Math.sin(a),cy+s*Math.sin(a)*Math.cos(a),P.z,P.yaw,90,null,true);}return NONE();});
    $l.square=sk(function(self,size){const s=N(size,2);clog(`⬛ square(${s})`,'li');for(let i=0;i<4;i++){const r=P.yaw*Math.PI/180;qm(P.x+Math.sin(r)*s,P.y+Math.cos(r)*s,P.z,P.yaw,Math.max(350,s*380),`  side ${i+1}`);qm(P.x,P.y,P.z,P.yaw+90,280,null);}return NONE();});
    $l.triangle=sk(function(self,size){const s=N(size,2);clog(`▲ triangle(${s})`,'li');for(let i=0;i<3;i++){const r=P.yaw*Math.PI/180;qm(P.x+Math.sin(r)*s,P.y+Math.cos(r)*s,P.z,P.yaw,Math.max(350,s*380),`  side ${i+1}`);qm(P.x,P.y,P.z,P.yaw+120,320,null);}return NONE();});
    $l.patrol=sk(function(self,wps){const list=Sk.ffi.remapToJs(wps);clog(`🗺 patrol(${list.length} pts)`,'li');list.forEach(wp=>{const a=Array.isArray(wp)?wp:Object.values(wp);const tx=+a[0]||0,ty=+a[1]||0,tz=a[2]!=null?+a[2]:P.z;qm(tx,ty,tz,P.yaw,Math.max(400,Math.hypot(tx-P.x,ty-P.y)*380),`  📍(${tx},${ty},${tz.toFixed(1)})`);});return NONE();});
    $l.lawnmower=sk(function(self,w,l,rows){const ww=N(w,8),ll=N(l,6),rr=N(rows,4);clog(`🌿 lawnmower`,'li');const sp=ww/rr;for(let i=0;i<=rr;i++){const x=-ww/2+i*sp;qm(x,P.y,P.z,P.yaw,300,null);qm(x,P.y+(i%2===0?ll:-ll),P.z,P.yaw,Math.max(400,ll*320),null);}return NONE();});
    $l.zigzag=sk(function(self,w,d,n){const ww=N(w,2),dd=N(d,5),nn=N(n,6);clog(`↯ zigzag`,'li');const step=dd/nn;for(let i=0;i<nn;i++){const r=P.yaw*Math.PI/180;const side=i%2===0?ww:-ww;qm(P.x+Math.sin(r)*step+Math.cos(r)*side,P.y+Math.cos(r)*step-Math.sin(r)*side,P.z,P.yaw,Math.max(200,step*300),null);}return NONE();});
    // Camera & CV
    $l.take_photo=sk(function(self){qfn(()=>{clog('📸 take_photo()','li');beep(1200,.08);});return NONE();});
    $l.set_camera_angle=sk(function(self,p,y){qfn(()=>clog(`🎥 set_camera_angle(${N(p)},${N(y)})`,'li'));return NONE();});
    $l.detect_face=sk(function(self){const x=+(Math.random()*.4-.2).toFixed(3),y=+(Math.random()*.4-.2).toFixed(3);clog(`👤 detect_face() → (${x},${y})`,'li');return Sk.ffi.remapToPy({detected:true,x,y,confidence:0.92,label:'human_face'});});
    $l.detect_gesture=sk(function(self){const gs=['pointing','peace','thumbs_up','open_hand','fist','okay'];const g=gs[Math.floor(Math.random()*gs.length)];clog(`🤚 detect_gesture() → "${g}"`,'li');return Sk.ffi.remapToPy(g);});
    $l.detect_object=sk(function(self,label){const lbl=S(label,'object');clog(`🔍 detect_object('${lbl}')`,'li');return Sk.ffi.remapToPy({detected:Math.random()>.3,label:lbl,x:Math.random()-.5,y:Math.random()-.5,confidence:+(Math.random()*.3+.7).toFixed(2)});});
    $l.follow_line=sk(function(self,path,height){const pts=Sk.ffi.remapToJs(path);const ht=N(height,P.z);clog(`〰 follow_line(${pts.length} pts)`,'li');pts.forEach(pt=>{const a=Array.isArray(pt)?pt:Object.values(pt);qm(+a[0]||0,+a[1]||0,ht,P.yaw,300,`  →(${a[0]},${a[1]})`,true);});return NONE();});
    $l.follow_body=sk(function(self){clog('🚶 follow_body() → tracking','li');qm(P.x+2,P.y,P.z,P.yaw,1200,'  tracking...');return NONE();});
    $l.detect_color=sk(function(self,color){const c=S(color,'red');clog(`🎨 detect_color('${c}')`,'li');return Sk.ffi.remapToPy({detected:Math.random()>.3,color:c,x:Math.random()-.5,y:Math.random()-.5});});
    $l.detect_qr=sk(function(self){clog('📱 detect_qr() → "DRONELAB-TARGET-1"','li');return Sk.ffi.remapToPy({detected:true,data:'DRONELAB-TARGET-1',x:.01,y:-.05});});
    $l.get_camera_frame=sk(function(self){clog('🎞 get_camera_frame()','li');return Sk.ffi.remapToPy({width:640,height:480,fps:30,simulated:true});});
    $l.navigate_to_room=sk(function(self,room){const r=S(room,'garage');clog(`🏠 navigate_to_room('${r}')`,'li');qm(P.x+3,P.y+3,P.z,P.yaw,1800,`  → ${r}`);return NONE();});
    // Sensors
    $l.get_position=sk(function(self){return Sk.ffi.remapToPy([+P.x.toFixed(3),+P.y.toFixed(3),+P.z.toFixed(3)]);});
    $l.get_altitude=sk(function(self){return Sk.ffi.remapToPy(+P.z.toFixed(3));});
    $l.get_x=sk(function(self){return Sk.ffi.remapToPy(+P.x.toFixed(3));});
    $l.get_y=sk(function(self){return Sk.ffi.remapToPy(+P.y.toFixed(3));});
    $l.get_yaw=sk(function(self){return Sk.ffi.remapToPy(+P.yaw.toFixed(1));});
    $l.get_speed=sk(function(self){return Sk.ffi.remapToPy(P.spd);});
    $l.get_battery=sk(function(self){return Sk.ffi.remapToPy(Math.round(P.battery));});
    $l.is_flying=sk(function(self){return P.flying?Sk.builtin.bool.true$:Sk.builtin.bool.false$;});
    $l.distance_to=sk(function(self,x,y,z){return Sk.ffi.remapToPy(Math.hypot(N(x)-P.x,N(y)-P.y,N(z)-P.z));});
    $l.print_status=sk(function(self){clog(`📊 x=${P.x.toFixed(1)} y=${P.y.toFixed(1)} z=${P.z.toFixed(1)} yaw=${P.yaw.toFixed(0)}° bat=${Math.round(P.battery)}%`,'li');return NONE();});
    $l.log=sk(function(self,msg){clog(S(msg),'lo');return NONE();});
  },'Drone',[]);
}

function setupSkulpt(){
  Sk.configure({
    output:(txt)=>txt.split('\n').forEach(l=>{if(l.trim())clog(l,'lo');}),
    read:(x)=>{if(x.endsWith('/pysimverse.js'))return '';if(x.endsWith('/time.js'))return `def sleep(s):\n  pass\n`;if(Sk.builtinFiles&&Sk.builtinFiles['files'][x]!==undefined)return Sk.builtinFiles['files'][x];throw new Error("Module not found: '"+x+"'");},
    __future__:Sk.python3,execLimit:150000,
  });
  const psv=new Sk.builtin.module();psv.tp$name='pysimverse';psv.$d={Drone:makeDrone()};
  Sk.sysmodules.mp$ass_subscript(new Sk.builtin.str('pysimverse'),psv);
}

function runPython(code){
  P={x:0,y:0,z:0,yaw:0,spd:1,flying:false,battery:100};cmdQ=[];curC=null;
  setupSkulpt();
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody('<stdin>',false,code,true))
    .then(()=>{clog('','lo');clog(`▸ ${cmdQ.length} commands queued`,'ls');beginSim();})
    .catch(err=>{clog('','le');clog('❌ '+(err.tp$str?err.tp$str().v:err.toString()),'le');document.getElementById('sdot').className='err';setRunning(false);});
}

// ═══════════════ SIM ENGINE ══════════════════════
function beginSim(){trailPts=[];if(tGeo.attributes.position)tGeo.deleteAttribute('position');C={x:0,y:0,z:0,yaw:0,flying:false,battery:100};bDrain=0;done=false;fAngle=0;panOff.set(0,0,0);}

function simTick(ts){
  if(done||stop)return;
  while(cmdQ.length&&cmdQ[0].t==='fn')cmdQ.shift().fn();
  if(!cmdQ.length&&!curC){if(!done){done=true;clog('✅ Mission complete!','ls');beep(660,.2);setTimeout(()=>beep(880,.2),230);setTimeout(()=>beep(1100,.3),460);setRunning(false);}return;}
  if(!curC&&cmdQ.length){curC=cmdQ.shift();cFrom={x:C.x,y:C.y,z:C.z,yaw:C.yaw};cT0=ts;if(curC.log)clog(curC.log,'lc');if(curC.t==='move'){if(curC.tz>.1&&cFrom.z<.1)tsound();else if(curC.tz<.1&&cFrom.z>.1)lsound();else beep(520,.05,.06);}}
  if(!curC)return;
  const t=Math.min((ts-cT0)/Math.max(1,curC.dur),1);
  const e=curC.fast?t:ease(t);
  if(curC.t==='move'){C.x=cFrom.x+(curC.tx-cFrom.x)*e;C.y=cFrom.y+(curC.ty-cFrom.y)*e;C.z=cFrom.z+(curC.tz-cFrom.z)*e;C.yaw=cFrom.yaw+(curC.ty2-cFrom.yaw)*e;}
  else if(curC.t==='flip')fAngle=e*360;
  C.flying=C.z>.05;
  if(t>=1){if(curC.t==='move'){C.x=curC.tx;C.y=curC.ty;C.z=curC.tz;C.yaw=curC.ty2;}if(curC.t==='move'){bDrain+=.3;C.battery=Math.max(0,100-bDrain);P.battery=C.battery;}fAngle=0;curC=null;}
  if(C.z>.05)addTrail(C.x,C.z,C.y);
}

// ═══════════════ RENDER LOOP ═════════════════════
let propSpin=0;
function loop(ts){
  frameN++;simTick(ts);
  if(droneRoot){droneRoot.position.set(C.x,C.z,C.y);droneRoot.rotation.y=-C.yaw*Math.PI/180;droneRoot.rotation.x=fAngle*Math.PI/180;droneRoot.rotation.z=0;}
  const tSpd=C.flying?(0.32+P.spd*.04):0;propSpin+=(tSpd-propSpin)*.09;
  propGs.forEach((pg,i)=>pg.rotation.y+=propSpin*(i%2===0?1:-1));
  if(droneGlow)droneGlow.intensity=C.flying?.5:0;
  if(frameN%30===0&&aOK){if(C.flying)setHum(.07,80+C.z*3+propSpin*160);else if(!running)setHum(0,80);}
  if(droneRoot)camTgt.lerp(droneRoot.position,.03);
  updateCam();
  if(frameN%8===0){
    document.getElementById('hx').textContent=C.x.toFixed(1);
    document.getElementById('hy').textContent=C.y.toFixed(1);
    document.getElementById('hz').textContent=C.z.toFixed(1)+'m';
    document.getElementById('hyaw').textContent=((C.yaw%360+360)%360).toFixed(0)+'°';
    document.getElementById('hspd').textContent=running?P.spd.toFixed(1):'—';
    const bat=Math.round(C.battery);const bel=document.getElementById('hbat');bel.textContent=bat+'%';bel.style.color=bat>50?'var(--green)':bat>20?'var(--yellow)':'var(--red)';
  }
  renderer.render(scene,camera);requestAnimationFrame(loop);
}

// ═══════════════ CONSOLE ═════════════════════════
const cout=document.getElementById('cout');
function clog(msg,cls='lo'){const d=document.createElement('div');d.className=cls;d.textContent=msg;cout.appendChild(d);cout.scrollTop=9999;}

// ═══════════════ UI LOGIC ════════════════════════
function setRunning(r){running=r;document.getElementById('runbtn').style.display=r?'none':'';document.getElementById('stopbtn').style.display=r?'':'none';document.getElementById('sdot').className=r?'live':'';document.getElementById('run-ico').textContent=r?'⏹':'▶';}

function doRun(){
  if(running)return;initAudio();stop=false;done=true;bDrain=0;trailPts=[];
  if(droneRoot){droneRoot.position.set(0,0,0);droneRoot.rotation.set(0,0,0);}
  C={x:0,y:0,z:0,yaw:0,flying:false,battery:100};
  cout.innerHTML='';clog('▸ Running mission.py...','li');setRunning(true);
  mobSwitch('sim');setTimeout(()=>runPython(editor.getValue()),80);
}
function doStop(){stop=true;curC=null;cmdQ=[];clog('⛔ Stopped.','lw');setRunning(false);if(aOK)setHum(0,80);}

document.getElementById('runbtn').onclick=doRun;
document.getElementById('stopbtn').onclick=doStop;
document.getElementById('mbn-run').onclick=doRun;

// Desktop view tabs
document.querySelectorAll('[data-v]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
    const v=btn.dataset.v,sp=document.getElementById('SP'),cp=document.getElementById('CP'),spl=document.getElementById('spl');
    if(v==='sim'){sp.style.cssText='flex:1;display:flex';cp.style.display='none';spl.style.display='none';}
    else if(v==='code'){sp.style.display='none';cp.style.cssText='width:100%;display:flex';spl.style.display='none';}
    else{sp.style.cssText='flex:1;display:flex';cp.style.cssText='width:46%;display:flex';spl.style.display='block';}
    setTimeout(()=>{resz();editor.refresh();},20);
  });
});

// Mobile nav
function mobSwitch(pane){
  const sp=document.getElementById('SP'),cp=document.getElementById('CP');
  sp.classList.remove('ma');cp.classList.remove('ma');
  document.querySelectorAll('.mnb:not(#mbn-run)').forEach(b=>b.classList.remove('on'));
  if(pane==='sim'){sp.classList.add('ma');document.getElementById('mbn-sim').classList.add('on');setTimeout(resz,20);}
  else{cp.classList.add('ma');document.getElementById('mbn-code').classList.add('on');setTimeout(()=>editor.refresh(),20);}
}
document.getElementById('mbn-sim').onclick=()=>mobSwitch('sim');
document.getElementById('mbn-code').onclick=()=>mobSwitch('code');
document.getElementById('mbn-model').onclick=()=>document.getElementById('fglb').click();

// Save/Load .py
function saveCode(){const blob=new Blob([editor.getValue()],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mission.py';a.click();clog('💾 Saved mission.py','ls');}
function loadCode(){document.getElementById('fpy').click();}
['savebtn','msave'].forEach(id=>document.getElementById(id).onclick=saveCode);
['loadbtn','mload'].forEach(id=>document.getElementById(id).onclick=loadCode);
document.getElementById('fpy').addEventListener('change',function(){if(!this.files[0])return;const r=new FileReader();r.onload=e=>{editor.setValue(e.target.result);clog('📂 '+this.files[0].name,'ls');};r.readAsText(this.files[0]);this.value='';});

// Upload model
function loadGLB(file){
  if(!file)return;
  clog(`📦 Loading ${file.name}...`,'li');
  const loader=new THREE.GLTFLoader();
  loader.load(URL.createObjectURL(file),gltf=>{
    customMdl=gltf.scene;
    const box=new THREE.Box3().setFromObject(customMdl);
    const sz=box.getSize(new THREE.Vector3());
    customMdl.scale.setScalar(4/Math.max(sz.x,sz.y,sz.z));
    customMdl.traverse(c=>{if(c.isMesh)c.castShadow=true;});
    document.getElementById('dsel').value='custom';setDrone('custom');
    clog(`✅ Model loaded: ${file.name}`,'ls');beep(880,.1);
  },null,err=>clog(`❌ ${err.message}`,'le'));
}
['upbtn','mmodel'].forEach(id=>document.getElementById(id).onclick=()=>document.getElementById('fglb').click());
document.getElementById('fglb').onchange=function(){loadGLB(this.files[0]);this.value='';};
document.getElementById('dsel').onchange=function(){if(this.value==='custom')document.getElementById('fglb').click();else setDrone(this.value);};

// Drag-drop model
document.body.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dropov').classList.add('show');});
document.body.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('dropov').classList.remove('show');});
document.body.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dropov').classList.remove('show');const f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.glb')||f.name.endsWith('.gltf')))loadGLB(f);else clog('⚠ Drop a .glb or .gltf file','lw');});

// Environment
document.getElementById('envsel').onchange=function(){setEnv(this.value);};

// Theme
let dark=true;
document.getElementById('thbtn').onclick=()=>{dark=!dark;document.documentElement.dataset.theme=dark?'dark':'light';document.getElementById('thbtn').textContent=dark?'🌙':'☀️';editor.setOption('theme',dark?'dracula':'eclipse');};

// Splitter drag
const spl=document.getElementById('spl');let splDrag=false;
spl.addEventListener('mousedown',e=>{splDrag=true;spl.classList.add('drag');e.preventDefault();});
document.addEventListener('mousemove',e=>{if(!splDrag)return;const rect=document.getElementById('main').getBoundingClientRect();const pct=Math.min(78,Math.max(22,(e.clientX-rect.left)/rect.width*100));document.getElementById('SP').style.cssText=`flex:0 0 ${pct}%;display:flex`;resz();});
document.addEventListener('mouseup',()=>{splDrag=false;spl.classList.remove('drag');});

// Keyboard
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();doRun();}if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCode();}});

// ═══════════════ CODEMIRROR ═══════════════════════
const editor=CodeMirror.fromTextArea(document.getElementById('code'),{
  mode:'python',theme:'dracula',lineNumbers:true,autoCloseBrackets:true,matchBrackets:true,
  indentUnit:4,tabSize:4,lineWrapping:false,
  extraKeys:{'Tab':cm=>cm.execCommand('indentMore'),'Shift-Tab':cm=>cm.execCommand('indentLess'),'Ctrl-Enter':()=>doRun(),'Cmd-Enter':()=>doRun()}
});
editor.setValue(DEFAULT);editor.setSize('100%','100%');

// ═══════════════ INIT ═════════════════════════════
setEnv('night');setDrone('mavic');resz();updateCam();
if(window.innerWidth<=768)mobSwitch('code');
clog('🚁 DroneLab Pro v4 ready','ls');
clog('  PySimverse API + CV missions + 8 environments','li');
clog('  Drop .glb to use your own drone · Ctrl+Enter: Run','li');
requestAnimationFrame(loop);
</script>
