<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DroneLab Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://skulpt.org/js/skulpt.min.js"></script>
<script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0d1117;color:#e6edf3;
  font-family:'SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace}

/* TOP BAR */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:0 12px;height:44px;
  background:#161b22;border-bottom:1px solid #21262d;
  flex-shrink:0;
}
#logo{font-size:14px;font-weight:700;letter-spacing:1.5px;color:#fff}
#logo span{color:#58a6ff}
.pill{
  font-size:9px;padding:2px 7px;border-radius:10px;
  background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb55;
  letter-spacing:1px;font-weight:600;
}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#runbtn,#stopbtn{
  padding:6px 14px;border:none;border-radius:6px;
  font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;letter-spacing:.5px;display:flex;align-items:center;gap:5px
}
#runbtn{background:#238636;color:#fff}
#runbtn:active{background:#2ea043}
#stopbtn{background:#da3633;color:#fff;display:none}
#statusdot{width:8px;height:8px;border-radius:50%;background:#30363d;flex-shrink:0}
#statusdot.live{background:#3fb950;box-shadow:0 0 6px #3fb950}
#statusdot.err{background:#da3633;box-shadow:0 0 6px #da3633}

/* CONTENT AREA */
#content{height:calc(100vh - 44px - 52px);display:flex;flex-direction:column;overflow:hidden}

/* PANELS */
.panel{flex:1;display:none;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* EDITOR */
#editor-panel{background:#0d1117}
#editor-toolbar{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0
}
#editor-toolbar span{font-size:11px;color:#8b949e}
#run-hint{margin-left:auto;font-size:10px;color:#30363d}
.CodeMirror{height:100%!important;font-size:13px!important;line-height:1.7!important;
  font-family:inherit!important;background:#0d1117!important}
.CodeMirror-scroll{height:100%!important}
#cm-wrap{flex:1;overflow:hidden}

/* SIM */
#sim-panel{background:#010409;position:relative}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
#cvs{width:100%;height:100%;display:block}
#hud-bar{
  display:flex;gap:0;flex-shrink:0;
  background:#161b22;border-top:1px solid #21262d
}
.hud-item{flex:1;text-align:center;padding:5px 0;border-right:1px solid #21262d}
.hud-item:last-child{border-right:none}
.hud-label{font-size:8px;color:#8b949e;letter-spacing:1px;display:block}
.hud-val{font-size:12px;color:#58a6ff;font-weight:700;display:block}

/* CONSOLE */
#console-panel{background:#0d1117;display:flex;flex-direction:column}
#console-bar{
  display:flex;align-items:center;padding:5px 10px;gap:8px;
  background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0
}
#console-bar span{font-size:11px;color:#8b949e}
#clrbtn{margin-left:auto;background:none;border:1px solid #21262d;
  color:#8b949e;padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer;font-family:inherit}
#cout{flex:1;overflow-y:auto;padding:8px 12px;font-size:12px;line-height:1.75}
#cout::-webkit-scrollbar{width:3px}
#cout::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px}
.lo{color:#e6edf3}.lc{color:#58a6ff}.ls{color:#3fb950}
.le{color:#f85149}.lw{color:#d29922}.li{color:#79c0ff}

/* BOTTOM NAV */
#nav{
  display:flex;height:52px;
  background:#161b22;border-top:1px solid #21262d;flex-shrink:0
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;cursor:pointer;
  color:#8b949e;font-family:inherit;position:relative;transition:color .2s
}
.nav-btn.on{color:#58a6ff}
.nav-btn.on::after{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:#58a6ff;border-radius:0 0 2px 2px
}
.nav-icon{font-size:18px}
.nav-label{font-size:9px;letter-spacing:.5px;font-weight:600}

/* run animation on run button */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.running{animation:pulse 1s infinite}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">🚁 Drone<span>Lab</span></div>
  <div class="pill">PRO</div>
  <div id="topbar-right">
    <div id="statusdot"></div>
    <button id="runbtn">▶ RUN</button>
    <button id="stopbtn">⛔ STOP</button>
  </div>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- CODE PANEL -->
  <div class="panel active" id="editor-panel">
    <div id="editor-toolbar">
      <span>📄 mission.py</span>
      <span id="run-hint">Ctrl+Enter to run</span>
    </div>
    <div id="cm-wrap"><textarea id="code"></textarea></div>
  </div>

  <!-- SIM PANEL -->
  <div class="panel" id="sim-panel">
    <div id="canvas-wrap"><canvas id="cvs"></canvas></div>
    <div id="hud-bar">
      <div class="hud-item"><span class="hud-label">X (m)</span><span class="hud-val" id="hx">0.0</span></div>
      <div class="hud-item"><span class="hud-label">Y (m)</span><span class="hud-val" id="hy">0.0</span></div>
      <div class="hud-item"><span class="hud-label">ALT (m)</span><span class="hud-val" id="hz">0.0</span></div>
      <div class="hud-item"><span class="hud-label">YAW (°)</span><span class="hud-val" id="hyaw">0</span></div>
      <div class="hud-item"><span class="hud-label">BATT</span><span class="hud-val" id="hbat" style="color:#3fb950">100%</span></div>
    </div>
  </div>

  <!-- CONSOLE PANEL -->
  <div class="panel" id="console-panel">
    <div id="console-bar">
      <span>🖥 Console</span>
      <button id="clrbtn" onclick="document.getElementById('cout').innerHTML=''">Clear</button>
    </div>
    <div id="cout"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <button class="nav-btn on" data-tab="editor-panel">
    <span class="nav-icon">📝</span>
    <span class="nav-label">CODE</span>
  </button>
  <button class="nav-btn" data-tab="sim-panel">
    <span class="nav-icon">🚁</span>
    <span class="nav-label">SIMULATE</span>
  </button>
  <button class="nav-btn" data-tab="console-panel">
    <span class="nav-icon">🖥</span>
    <span class="nav-label">CONSOLE</span>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════
// DEFAULT MISSION CODE  (PySimverse compatible)
// ═══════════════════════════════════════════════
const DEFAULT = `# DroneLab Pro — PySimverse-compatible API
# Same syntax as the FreeCodeCamp tutorial!
from pysimverse import Drone
import math
import time

# Connect & arm
drone = Drone()
drone.connect()

# ── Basic Flight ──────────────────────────────
drone.takeoff(height=5)

# Fly a square
for i in range(4):
    drone.move_forward(distance=3, speed=1)
    drone.rotate_cw(degrees=90)

# Altitude change
drone.move_up(distance=2)
drone.hover(seconds=1)

# Advanced patterns
drone.spiral(radius=2, height=3, turns=2)
drone.go_to(x=0, y=0, z=5)

# Sensors
pos = drone.get_position()
print(f"Position: {pos}")
alt = drone.get_altitude()
print(f"Altitude: {alt:.1f}m")
bat = drone.get_battery()
print(f"Battery: {bat}%")

# Flip!
drone.flip('forward')

# Land safely
drone.return_home()
drone.land()
print("Mission complete!")
`;

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let P = {x:0,y:0,z:0,yaw:0,spd:1,flying:false,battery:100}; // planned (Python reads/writes)
let C = {x:0,y:0,z:0,yaw:0,flying:false,battery:100,flipAngle:0}; // current animated
let trail = [];
let cmdQ = [];
let curCmd = null;
let cmdFrom = null;
let cmdT0 = 0;
let missionDone = true;
let shouldStop = false;
let running = false;
let frame = 0;
let batDrain = 0;
let flashFrames = 0;

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

function resizeCvs() {
  const w = document.getElementById('canvas-wrap');
  cvs.width = w.clientWidth;
  cvs.height = w.clientHeight;
}
window.addEventListener('resize', resizeCvs);

// ISO projection with camera tilt
function proj(x, y, z) {
  const W = cvs.width, H = cvs.height;
  const CELL = Math.min(W,H)*0.065;
  const ZS = CELL*1.25;
  return {
    sx: W/2 + (x - y) * CELL,
    sy: H*0.55 + (x + y)*CELL*0.5 - z*ZS
  };
}

// ═══════════════════════════════════════════════
// CONSOLE
// ═══════════════════════════════════════════════
const cout = document.getElementById('cout');
let logBadge = document.querySelector('[data-tab="console-panel"] .nav-icon');
let unread = 0;

function clog(msg, cls='lo') {
  const s = document.createElement('div');
  s.className = cls; s.textContent = msg;
  cout.appendChild(s); cout.scrollTop = 9999;
  // badge if not on console tab
  if (!document.getElementById('console-panel').classList.contains('active')) {
    unread++;
    logBadge.textContent = unread > 9 ? '🔴' : '🖥';
  }
}

// ═══════════════════════════════════════════════
// COMMAND QUEUE HELPERS
// ═══════════════════════════════════════════════
function qmove(tx,ty,tz,tyaw,ms,log,fast=false) {
  cmdQ.push({t:'move',tx,ty,tz,tyaw,dur:Math.max(fast?80:300,ms),log,fast});
  P.x=tx; P.y=ty; P.z=tz; P.yaw=tyaw;
}
function qhover(ms,log) { cmdQ.push({t:'hover',dur:ms,log}); }
function qflip(dir) { cmdQ.push({t:'flip',dir,dur:650,log:`🤸 flip('${dir}')`}); }
function qinstant(fn) { cmdQ.push({t:'instant',fn}); }

// ═══════════════════════════════════════════════
// SKULPT — pysimverse module + builtins
// ═══════════════════════════════════════════════
function N(v,def=0){return v!=null?Sk.ffi.remapToJs(v):def}
function S(v,def=''){return v!=null?Sk.ffi.remapToJs(v):def}
function sk(fn){return new Sk.builtin.func(fn)}
const NONE = Sk.builtin.none.none$;
const TRUE = Sk.builtin.bool.true$;
const FALSE = Sk.builtin.bool.false$;

function makeDroneClass() {
  // Build a Drone class that wraps all commands
  const DroneClass = Sk.misceval.buildClass(Sk.builtins, function($gbl,$loc){

    $loc.__init__ = sk(function(self) {
      self.connected = false;
      return NONE;
    });

    $loc.connect = sk(function(self) {
      self.connected = true;
      qinstant(()=>{ clog('🔗 drone.connect() — connected!','ls'); });
      return NONE;
    });

    $loc.disconnect = sk(function(self) {
      qinstant(()=>{ clog('🔌 drone.disconnect()','li'); });
      return NONE;
    });

    // ── TAKEOFF / LAND ────────────────────────
    $loc.takeoff = sk(function(self, height) {
      const h = N(height, 3);
      if (P.flying) { clog('⚠ Already flying!','lw'); return NONE; }
      P.flying = true;
      const dur = Math.max(800, h*380/P.spd);
      qmove(P.x,P.y,h,P.yaw,dur,`🚀 takeoff(height=${h})`);
      return NONE;
    });

    $loc.land = sk(function(self) {
      P.flying = false;
      const dur = Math.max(800, P.z*350/P.spd);
      qmove(P.x,P.y,0,P.yaw,dur,`🛬 land()`);
      return NONE;
    });

    $loc.hover = sk(function(self, seconds) {
      const s = N(seconds,1);
      qhover(s*1000, `⏸ hover(seconds=${s})`);
      return NONE;
    });

    $loc.return_home = sk(function(self) {
      const d = Math.hypot(P.x,P.y);
      qmove(0,0,P.z,P.yaw, Math.max(500,d*320/P.spd), `🏠 return_home()`);
      return NONE;
    });

    $loc.emergency_land = sk(function(self) {
      P.flying = false;
      qmove(P.x,P.y,0,P.yaw,400,`🚨 emergency_land()`);
      return NONE;
    });

    // ── DIRECTIONAL ───────────────────────────
    $loc.move_forward = sk(function(self, distance, speed) {
      const dist=N(distance,1);
      if(speed) P.spd=Math.max(.1,Math.min(5,N(speed)));
      const r=P.yaw*Math.PI/180;
      qmove(P.x+Math.sin(r)*dist, P.y+Math.cos(r)*dist, P.z, P.yaw,
            Math.max(300,dist*380/P.spd), `⬆ move_forward(${dist})`);
      return NONE;
    });

    $loc.move_backward = sk(function(self, distance, speed) {
      const dist=N(distance,1); if(speed) P.spd=Math.max(.1,N(speed));
      const r=P.yaw*Math.PI/180;
      qmove(P.x-Math.sin(r)*dist, P.y-Math.cos(r)*dist, P.z, P.yaw,
            Math.max(300,dist*380/P.spd), `⬇ move_backward(${dist})`);
      return NONE;
    });

    $loc.move_left = sk(function(self, distance, speed) {
      const dist=N(distance,1); if(speed) P.spd=Math.max(.1,N(speed));
      const r=P.yaw*Math.PI/180;
      qmove(P.x-Math.cos(r)*dist, P.y+Math.sin(r)*dist, P.z, P.yaw,
            Math.max(300,dist*380/P.spd), `← move_left(${dist})`);
      return NONE;
    });

    $loc.move_right = sk(function(self, distance, speed) {
      const dist=N(distance,1); if(speed) P.spd=Math.max(.1,N(speed));
      const r=P.yaw*Math.PI/180;
      qmove(P.x+Math.cos(r)*dist, P.y-Math.sin(r)*dist, P.z, P.yaw,
            Math.max(300,dist*380/P.spd), `→ move_right(${dist})`);
      return NONE;
    });

    $loc.move_up = sk(function(self, distance) {
      const dist=N(distance,1);
      qmove(P.x,P.y,P.z+dist,P.yaw,Math.max(300,dist*350/P.spd),`↑ move_up(${dist})`);
      return NONE;
    });

    $loc.move_down = sk(function(self, distance) {
      const dist=N(distance,1);
      qmove(P.x,P.y,Math.max(0,P.z-dist),P.yaw,Math.max(300,dist*350/P.spd),`↓ move_down(${dist})`);
      return NONE;
    });

    // ── GO TO ─────────────────────────────────
    $loc.go_to = sk(function(self,x,y,z,speed) {
      const tx=N(x,P.x),ty=N(y,P.y),tz=N(z,P.z);
      if(speed) P.spd=Math.max(.1,N(speed));
      const d=Math.hypot(tx-P.x,ty-P.y,tz-P.z);
      qmove(tx,ty,tz,P.yaw,Math.max(400,d*380/P.spd),
            `📍 go_to(x=${tx.toFixed(1)},y=${ty.toFixed(1)},z=${tz.toFixed(1)})`);
      return NONE;
    });

    $loc.set_position = $loc.go_to;

    // ── ROTATION ──────────────────────────────
    $loc.rotate_cw = sk(function(self, degrees) {
      const deg=N(degrees,90);
      qmove(P.x,P.y,P.z,P.yaw+deg,Math.max(250,deg*10/P.spd),`↻ rotate_cw(${deg}°)`);
      return NONE;
    });

    $loc.rotate_ccw = sk(function(self, degrees) {
      const deg=N(degrees,90);
      qmove(P.x,P.y,P.z,P.yaw-deg,Math.max(250,deg*10/P.spd),`↺ rotate_ccw(${deg}°)`);
      return NONE;
    });

    $loc.set_yaw = sk(function(self,angle) {
      const a=N(angle,0);
      qmove(P.x,P.y,P.z,a,Math.max(250,Math.abs(a-P.yaw)*10),`🧭 set_yaw(${a}°)`);
      return NONE;
    });

    $loc.face = sk(function(self,dir) {
      const d=S(dir,'north');
      const a={north:0,east:90,south:180,west:270,n:0,e:90,s:180,w:270}[d.toLowerCase()]??0;
      qmove(P.x,P.y,P.z,a,350,`🧭 face('${d}')`);
      return NONE;
    });

    // ── SPEED ─────────────────────────────────
    $loc.set_speed = sk(function(self,speed) {
      P.spd=Math.max(.1,Math.min(5,N(speed,1)));
      qinstant(()=>{ clog(`⚡ set_speed(${P.spd.toFixed(1)})`, 'li'); });
      return NONE;
    });

    // ── FLIPS ─────────────────────────────────
    $loc.flip = sk(function(self,dir) { qflip(S(dir,'forward')); return NONE; });
    $loc.flip_forward  = sk(function(self){ qflip('forward'); return NONE; });
    $loc.flip_backward = sk(function(self){ qflip('backward'); return NONE; });
    $loc.flip_left     = sk(function(self){ qflip('left'); return NONE; });
    $loc.flip_right    = sk(function(self){ qflip('right'); return NONE; });

    // ── CAMERA ────────────────────────────────
    $loc.take_photo = sk(function(self) {
      qinstant(()=>{ flashFrames=8; clog('📸 take_photo() — snapshot captured!','li'); });
      return NONE;
    });

    $loc.set_camera_angle = sk(function(self,pitch,yaw) {
      qinstant(()=>{ clog(`🎥 set_camera_angle(pitch=${N(pitch)}, yaw=${N(yaw)})`, 'li'); });
      return NONE;
    });

    // ── LED ───────────────────────────────────
    $loc.set_led = sk(function(self,r,g,b) {
      const col=`rgb(${N(r)},${N(g)},${N(b)})`;
      qinstant(()=>{ C.led=col; clog(`💡 set_led(${N(r)},${N(g)},${N(b)})`, 'li'); });
      return NONE;
    });

    $loc.led_off = sk(function(self) {
      qinstant(()=>{ C.led='#30363d'; }); return NONE;
    });

    // ── PATTERNS ─────────────────────────────
    $loc.orbit = sk(function(self,cx,cy,radius,laps,direction) {
      const ocx=N(cx,0),ocy=N(cy,0),r=N(radius,2),l=N(laps,1);
      const dir=S(direction,'cw')==='ccw'?-1:1;
      clog(`🔵 orbit(cx=${ocx},cy=${ocy},r=${r},laps=${l})`, 'li');
      const steps=Math.ceil(36*l);
      for(let i=1;i<=steps;i++){
        const a=dir*(i/36)*Math.PI*2;
        qmove(ocx+r*Math.cos(a),ocy+r*Math.sin(a),P.z,P.yaw,80,null,true);
      }
      return NONE;
    });

    $loc.circle = sk(function(self,radius,laps) {
      const r=N(radius,2),l=N(laps,1);
      const sx=P.x,sy=P.y;
      clog(`⭕ circle(r=${r},laps=${l})`, 'li');
      const steps=Math.ceil(36*l);
      for(let i=1;i<=steps;i++){
        const a=(i/36)*Math.PI*2;
        qmove(sx+r*Math.sin(a),sy+r-r*Math.cos(a),P.z,P.yaw,80,null,true);
      }
      return NONE;
    });

    $loc.spiral = sk(function(self,radius,height,turns) {
      const r=N(radius,3),h=N(height,5),t=N(turns,3);
      clog(`🌀 spiral(r=${r},height=${h},turns=${t})`, 'li');
      const steps=Math.ceil(36*t);
      const sx=P.x,sy=P.y,sz=P.z;
      for(let i=1;i<=steps;i++){
        const a=(i/36)*Math.PI*2;
        const frac=i/steps;
        qmove(sx+r*Math.cos(a),sy+r*Math.sin(a),sz+h*frac,P.yaw,90,null,true);
      }
      return NONE;
    });

    $loc.figure_8 = sk(function(self,size) {
      const s=N(size,3);
      const cx=P.x,cy=P.y;
      clog(`∞ figure_8(size=${s})`, 'li');
      for(let i=1;i<=36;i++){const a=(i/36)*Math.PI*2; qmove(cx+s*Math.sin(a),cy+s*Math.sin(a)*Math.cos(a),P.z,P.yaw,90,null,true);}
      for(let i=1;i<=36;i++){const a=(i/36)*Math.PI*2; qmove(cx-s*Math.sin(a),cy+s*Math.sin(a)*Math.cos(a),P.z,P.yaw,90,null,true);}
      return NONE;
    });

    $loc.square = sk(function(self,size) {
      const s=N(size,2);
      clog(`⬛ square(size=${s})`, 'li');
      for(let i=0;i<4;i++){
        const r=P.yaw*Math.PI/180;
        qmove(P.x+Math.sin(r)*s,P.y+Math.cos(r)*s,P.z,P.yaw,Math.max(300,s*380),`  ↗ side ${i+1}`);
        qmove(P.x,P.y,P.z,P.yaw+90,350,null);
      }
      return NONE;
    });

    $loc.triangle = sk(function(self,size) {
      const s=N(size,2);
      clog(`▲ triangle(size=${s})`, 'li');
      for(let i=0;i<3;i++){
        const r=P.yaw*Math.PI/180;
        qmove(P.x+Math.sin(r)*s,P.y+Math.cos(r)*s,P.z,P.yaw,Math.max(300,s*380),`  ↗ side ${i+1}`);
        qmove(P.x,P.y,P.z,P.yaw+120,400,null);
      }
      return NONE;
    });

    $loc.zigzag = sk(function(self,width,length,steps) {
      const w=N(width,2),d=N(length,5),n=N(steps,6);
      clog(`↯ zigzag(width=${w},length=${d})`, 'li');
      const step=d/n;
      for(let i=0;i<n;i++){
        const side=(i%2===0?w:-w);
        const r=P.yaw*Math.PI/180;
        qmove(P.x+Math.sin(r)*step+Math.cos(r)*side, P.y+Math.cos(r)*step-Math.sin(r)*side, P.z, P.yaw, Math.max(200,step*300), null);
      }
      return NONE;
    });

    $loc.patrol = sk(function(self,waypoints) {
      const wps=Sk.ffi.remapToJs(waypoints);
      clog(`🗺 patrol(${wps.length} waypoints)`, 'li');
      for(const wp of wps){
        const a=Array.isArray(wp)?wp:Object.values(wp);
        const tx=+a[0]||0,ty=+a[1]||0,tz=a[2]!=null?+a[2]:P.z;
        qmove(tx,ty,tz,P.yaw,Math.max(400,Math.hypot(tx-P.x,ty-P.y,tz-P.z)*350),`  📍→(${tx},${ty},${tz.toFixed(1)})`);
      }
      return NONE;
    });

    $loc.lawnmower = sk(function(self,width,length,rows) {
      const w=N(width,8),l=N(length,6),r=N(rows,4);
      clog(`🌿 lawnmower(${w}x${l},rows=${r})`, 'li');
      const sp=w/r;
      for(let i=0;i<=r;i++){const x=-w/2+i*sp; qmove(x,P.y,P.z,P.yaw,400,null); qmove(x,P.y+(i%2===0?l:-l),P.z,P.yaw,Math.max(400,l*320),null);}
      return NONE;
    });

    // ── SENSORS ───────────────────────────────
    $loc.get_position = sk(function(self) {
      return Sk.ffi.remapToPy([+P.x.toFixed(3), +P.y.toFixed(3), +P.z.toFixed(3)]);
    });
    $loc.get_altitude = sk(function(self){return Sk.ffi.remapToPy(+P.z.toFixed(3));});
    $loc.get_x = sk(function(self){return Sk.ffi.remapToPy(+P.x.toFixed(3));});
    $loc.get_y = sk(function(self){return Sk.ffi.remapToPy(+P.y.toFixed(3));});
    $loc.get_yaw = sk(function(self){return Sk.ffi.remapToPy(+P.yaw.toFixed(1));});
    $loc.get_speed = sk(function(self){return Sk.ffi.remapToPy(P.spd);});
    $loc.get_battery = sk(function(self){return Sk.ffi.remapToPy(P.battery);});
    $loc.is_flying = sk(function(self){return P.flying?TRUE:FALSE;});
    $loc.distance_to = sk(function(self,x,y,z){
      return Sk.ffi.remapToPy(Math.hypot(N(x)-P.x,N(y)-P.y,N(z)-P.z));
    });

    // ── LOG ───────────────────────────────────
    $loc.log = sk(function(self,msg){clog(Sk.ffi.remapToJs(msg),'lo'); return NONE;});
    $loc.print_status = sk(function(self){
      clog(`📊 x=${P.x.toFixed(1)} y=${P.y.toFixed(1)} z=${P.z.toFixed(1)} yaw=${P.yaw.toFixed(0)}° bat=${P.battery}%`,'li');
      return NONE;
    });
  }, 'Drone', []);
  return DroneClass;
}

function setupSkulpt() {
  // Override time.sleep → hover
  Sk.configure({
    output: (txt) => {
      const lines = txt.split('\n');
      for (const l of lines) if(l.trim()) clog(l,'lo');
    },
    read: (x) => {
      if (x.endsWith('/time.js')) return `def sleep(secs):\n  hover(secs)\ndef time():\n  return 0\n`;
      if (Sk.builtinFiles && Sk.builtinFiles['files'][x] !== undefined)
        return Sk.builtinFiles['files'][x];
      // pysimverse module
      if (x.endsWith('/pysimverse.js')) return '';
      throw new Error("Module not found: '"+x+"'");
    },
    __future__: Sk.python3,
    execLimit: 90000,
  });

  // Create pysimverse module
  const psv = new Sk.builtin.module();
  psv.tp$name = 'pysimverse';
  psv.$d = { Drone: makeDroneClass() };
  Sk.sysmodules.mp$ass_subscript(new Sk.builtin.str('pysimverse'), psv);

  // Also expose hover as standalone builtin (for time.sleep override)
  Sk.builtins.hover = new Sk.builtin.func(function(secs){
    const s = secs ? Sk.ffi.remapToJs(secs) : 1;
    qhover(s*1000, null);
    return NONE;
  });
}

function runPython(code) {
  // Reset planned state
  P = {x:0,y:0,z:0,yaw:0,spd:1,flying:false,battery:100};
  cmdQ = [];
  setupSkulpt();

  const pr = Sk.misceval.asyncToPromise(() =>
    Sk.importMainWithBody('<stdin>', false, code, true)
  );
  pr.then(() => {
    clog('', 'lo');
    clog(`▸ Script queued ${cmdQ.length} command(s), animating...`, 'ls');
    startAnimation();
  }).catch((err) => {
    const msg = err.tp$str ? err.tp$str().v : err.toString();
    clog('', 'le');
    clog('❌ ' + msg, 'le');
    setRunning(false);
    document.getElementById('statusdot').className = 'err';
  });
}

// ═══════════════════════════════════════════════
// ANIMATION ENGINE
// ═══════════════════════════════════════════════
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t}

function startAnimation() {
  trail = [];
  C = {x:0,y:0,z:0,yaw:0,flying:false,battery:100,led:'#58a6ff',flipAngle:0};
  curCmd = null; missionDone = false; batDrain = 0;
}

function tick(ts) {
  if (missionDone || shouldStop) return;

  // Instant commands
  while (cmdQ.length && cmdQ[0].t==='instant') {
    cmdQ.shift().fn();
  }
  if (!cmdQ.length && !curCmd) {
    if (!missionDone) {
      missionDone=true;
      clog('✅ Mission complete! Drone safe.','ls');
      setRunning(false);
    }
    return;
  }
  if (!curCmd && cmdQ.length) {
    curCmd=cmdQ.shift(); cmdFrom={x:C.x,y:C.y,z:C.z,yaw:C.yaw}; cmdT0=ts;
    if (curCmd.log) clog(curCmd.log,'lc');
  }
  if (!curCmd) return;

  const elapsed=ts-cmdT0;
  const t=Math.min(elapsed/Math.max(1,curCmd.dur),1);
  const e=curCmd.fast?t:ease(t);

  if (curCmd.t==='move') {
    C.x=cmdFrom.x+(curCmd.tx-cmdFrom.x)*e;
    C.y=cmdFrom.y+(curCmd.ty-cmdFrom.y)*e;
    C.z=cmdFrom.z+(curCmd.tz-cmdFrom.z)*e;
    C.yaw=cmdFrom.yaw+(curCmd.tyaw-cmdFrom.yaw)*e;
    C.flying=C.z>0.05;
  } else if (curCmd.t==='flip') {
    C.flipAngle=e*360;
  }

  if (t>=1) {
    if (curCmd.t==='move'){C.x=curCmd.tx;C.y=curCmd.ty;C.z=curCmd.tz;C.yaw=curCmd.tyaw;C.flying=C.z>0.05;}
    if (curCmd.t==='move') {batDrain+=0.35; C.battery=Math.max(0,100-batDrain); P.battery=C.battery;}
    C.flipAngle=0; curCmd=null;
  }

  // Trail
  if (C.z>0.05) {
    const last=trail[trail.length-1];
    if (!last||Math.hypot(C.x-last.x,C.y-last.y,C.z-last.z)>0.05)
      trail.push({x:C.x,y:C.y,z:C.z});
    if (trail.length>500) trail.shift();
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function draw(ts) {
  frame++;
  const W=cvs.width, H=cvs.height;
  ctx.clearRect(0,0,W,H);

  drawEnvironment(W,H,ts);
  drawTrail();
  drawDrone(ts);
  if(flashFrames>0){
    ctx.fillStyle=`rgba(255,255,255,${flashFrames*.05})`;
    ctx.fillRect(0,0,W,H); flashFrames--;
  }
  drawCompass(W-36,34,C.yaw);
  if(frame%10===0) updateHUD();
}

function drawEnvironment(W,H,ts) {
  // ── Sky gradient background
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a1628'); sky.addColorStop(1,'#162032');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // ── Floor tiles
  const GR=8;
  for(let i=-GR;i<=GR;i++){
    for(let j=-GR;j<=GR;j++){
      const p=proj(i,j,0);
      const p2=proj(i+1,j,0);
      const p3=proj(i+1,j+1,0);
      const p4=proj(i,j+1,0);
      const alt=(i+j)%2===0;
      ctx.beginPath();
      ctx.moveTo(p.sx,p.sy);ctx.lineTo(p2.sx,p2.sy);ctx.lineTo(p3.sx,p3.sy);ctx.lineTo(p4.sx,p4.sy);
      ctx.closePath();
      ctx.fillStyle=alt?'#0d1f0e':'#0a1a0b';ctx.fill();
      ctx.strokeStyle='#112211';ctx.lineWidth=.5;ctx.stroke();
    }
  }

  // ── Grid border glow
  const corners=[[-GR,-GR],[GR,-GR],[GR,GR],[-GR,GR]].map(([x,y])=>proj(x,y,0));
  ctx.beginPath(); corners.forEach((p,i)=>i?ctx.lineTo(p.sx,p.sy):ctx.moveTo(p.sx,p.sy));
  ctx.closePath(); ctx.strokeStyle='#1a4a1a'; ctx.lineWidth=1.5; ctx.stroke();

  // ── Axes arrows
  const O=proj(0,0,0);
  [[proj(3,0,0),'#f85149','X'],[proj(0,3,0),'#3fb950','Y'],[proj(0,0,3),'#58a6ff','Z']].forEach(([P2,col,lbl])=>{
    ctx.beginPath(); ctx.moveTo(O.sx,O.sy); ctx.lineTo(P2.sx,P2.sy);
    ctx.strokeStyle=col; ctx.lineWidth=1.8; ctx.stroke();
    ctx.fillStyle=col; ctx.font=`${Math.max(9,W*0.022)}px monospace`;
    ctx.fillText(lbl,P2.sx+3,P2.sy+3);
  });

  // ── Origin marker
  ctx.beginPath(); ctx.arc(O.sx,O.sy,3,0,Math.PI*2);
  ctx.fillStyle='#58a6ff'; ctx.fill();

  // ── Landing pad
  const lp=proj(0,0,0);
  ctx.beginPath(); ctx.ellipse(lp.sx,lp.sy,20,10,0,0,Math.PI*2);
  ctx.fillStyle='rgba(88,166,255,0.08)'; ctx.fill();
  ctx.strokeStyle='rgba(88,166,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lp.sx-14,lp.sy); ctx.lineTo(lp.sx+14,lp.sy);
  ctx.moveTo(lp.sx,lp.sy-7); ctx.lineTo(lp.sx,lp.sy+7);
  ctx.strokeStyle='rgba(88,166,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
}

function drawTrail() {
  for(let i=1;i<trail.length;i++){
    const a=proj(trail[i-1].x,trail[i-1].y,trail[i-1].z);
    const b=proj(trail[i].x,trail[i].y,trail[i].z);
    ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy);
    ctx.strokeStyle=`rgba(88,166,255,${.05+.5*(i/trail.length)})`;
    ctx.lineWidth=1.8; ctx.stroke();
  }
}

function drawDrone(ts) {
  const pos=proj(C.x,C.y,C.z);
  const shd=proj(C.x,C.y,0);
  const LED=C.led||'#58a6ff';
  const spin=ts*0.025;
  const yawRad=C.yaw*Math.PI/180;
  const ARM=14;
  const BASE_ANG=(yawRad+Math.PI/4);

  if(C.z>0.05){
    // Shadow blob
    const sz=Math.max(3,12-C.z*.5);
    ctx.beginPath(); ctx.ellipse(shd.sx,shd.sy,sz,sz*.5,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,0,0,${Math.max(.05,.4-C.z*.025)})`; ctx.fill();

    // Altitude wire
    ctx.beginPath(); ctx.moveTo(pos.sx,pos.sy); ctx.lineTo(shd.sx,shd.sy);
    ctx.setLineDash([2,5]); ctx.strokeStyle='rgba(88,166,255,.15)'; ctx.lineWidth=1; ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.save(); ctx.translate(pos.sx,pos.sy);
  if(C.flipAngle>0) ctx.scale(1,Math.cos(C.flipAngle*Math.PI/180));

  // ── 4 Arms ──
  for(let i=0;i<4;i++){
    const ang=BASE_ANG+i*(Math.PI/2);
    const ax=Math.cos(ang)*ARM, ay=Math.sin(ang)*ARM*.5;

    // Arm tube
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ax,ay);
    ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=4.5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ax,ay);
    ctx.strokeStyle='#2a5a2a'; ctx.lineWidth=2.5; ctx.stroke();

    // Motor mount
    ctx.beginPath(); ctx.arc(ax,ay,4.5,0,Math.PI*2);
    ctx.fillStyle='#1a2a1a'; ctx.fill();
    ctx.strokeStyle='#3a6a3a'; ctx.lineWidth=1.5; ctx.stroke();

    // Propeller (spinning ellipse)
    if(C.z>0.05||running){
      ctx.save(); ctx.translate(ax,ay);
      ctx.beginPath();
      ctx.ellipse(0,0,9.5,2.5,ang+spin+i*Math.PI/2,0,Math.PI*2);
      ctx.fillStyle=`rgba(88,166,255,0.22)`; ctx.fill();
      ctx.strokeStyle='rgba(88,166,255,0.5)'; ctx.lineWidth=1.2; ctx.stroke();
      // Second blade (opposite)
      ctx.beginPath();
      ctx.ellipse(0,0,9.5,2.5,ang+spin+i*Math.PI/2+Math.PI*.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(63,185,80,0.18)`; ctx.fill();
      ctx.strokeStyle='rgba(63,185,80,0.4)'; ctx.lineWidth=1; ctx.stroke();
      ctx.restore();
    }

    // Prop hub
    ctx.beginPath(); ctx.arc(ax,ay,2.2,0,Math.PI*2);
    ctx.fillStyle='#58a6ff'; ctx.fill();
  }

  // ── Landing gear (4 legs) ──
  if(C.z<0.5){
    for(let i=0;i<4;i++){
      const ang=BASE_ANG+i*(Math.PI/2);
      const ax=Math.cos(ang)*ARM*.65, ay=Math.sin(ang)*ARM*.3;
      ctx.beginPath(); ctx.moveTo(ax*.6,ay*.6);
      ctx.lineTo(ax*.6+2, ay*.6+6);
      ctx.lineTo(ax*.6-2, ay*.6+6);
      ctx.strokeStyle='#2a4a2a'; ctx.lineWidth=2; ctx.stroke();
    }
  }

  // ── Body center ──
  // Outer ring
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2);
  ctx.fillStyle='#0d1f0e'; ctx.fill();
  ctx.strokeStyle='#2a6a2a'; ctx.lineWidth=2; ctx.stroke();

  // Inner plate
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fillStyle='#1a3a1a'; ctx.fill();

  // Center LED
  ctx.beginPath(); ctx.arc(0,0,3.5,0,Math.PI*2);
  ctx.fillStyle=LED;
  ctx.shadowBlur=8; ctx.shadowColor=LED;
  ctx.fill(); ctx.shadowBlur=0;

  // Front indicator (small nose dot)
  const nr=yawRad+BASE_ANG;
  ctx.beginPath(); ctx.arc(Math.cos(nr)*9,Math.sin(nr)*4.5,1.5,0,Math.PI*2);
  ctx.fillStyle='#f85149'; ctx.fill();

  // Blink LED
  if(C.z>0.05&&Math.floor(ts/500)%2===0){
    ctx.beginPath(); ctx.arc(-Math.cos(nr)*9,-Math.sin(nr)*4.5,1.5,0,Math.PI*2);
    ctx.fillStyle='#3fb950'; ctx.shadowBlur=5; ctx.shadowColor='#3fb950';
    ctx.fill(); ctx.shadowBlur=0;
  }

  // Camera gimbal (bottom)
  ctx.beginPath(); ctx.ellipse(0,3,4,2,0,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a'; ctx.fill();
  ctx.strokeStyle='#30363d'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,3,1.8,0,Math.PI*2);
  ctx.fillStyle='#58a6ff'; ctx.fill();

  ctx.restore();
}

function drawCompass(x,y,yaw) {
  const R=22;
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2);
  ctx.fillStyle='rgba(13,17,23,.85)'; ctx.fill();
  ctx.strokeStyle='#21262d'; ctx.lineWidth=1.5; ctx.stroke();
  [['N',0,'#f85149'],['E',90,'#3fb950'],['S',180,'#8b949e'],['W',270,'#8b949e']].forEach(([l,a,c])=>{
    const r=a*Math.PI/180;
    ctx.fillStyle=c; ctx.font=`bold 8px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(l,Math.sin(r)*15,-Math.cos(r)*15);
  });
  const r2=yaw*Math.PI/180;
  ctx.beginPath(); ctx.moveTo(Math.sin(r2)*(-6),-Math.cos(r2)*(-6));
  ctx.lineTo(Math.sin(r2)*16,-Math.cos(r2)*16);
  ctx.strokeStyle='#58a6ff'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fillStyle='#58a6ff'; ctx.fill();
  ctx.restore();
}

function updateHUD() {
  document.getElementById('hx').textContent=C.x.toFixed(1);
  document.getElementById('hy').textContent=C.y.toFixed(1);
  document.getElementById('hz').textContent=C.z.toFixed(1);
  document.getElementById('hyaw').textContent=((C.yaw%360+360)%360).toFixed(0);
  const bat=Math.round(C.battery);
  const el=document.getElementById('hbat');
  el.textContent=bat+'%';
  el.style.color=bat>50?'#3fb950':bat>20?'#d29922':'#f85149';
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  if (!missionDone) tick(ts);
  draw(ts);
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
function setRunning(r) {
  running=r;
  document.getElementById('runbtn').style.display=r?'none':'';
  document.getElementById('stopbtn').style.display=r?'':'none';
  const d=document.getElementById('statusdot');
  d.className=r?'live':'';
}

function doRun() {
  if(running) return;
  shouldStop=false; missionDone=true; trail=[];
  batDrain=0; flashFrames=0;
  C={x:0,y:0,z:0,yaw:0,flying:false,battery:100,led:'#58a6ff',flipAngle:0};
  cout.innerHTML='';
  clog('▸ Running mission.py...','li');
  setRunning(true);
  // Switch to SIM tab
  switchTab('sim-panel');
  setTimeout(()=>{ runPython(editor.getValue()); }, 50);
}

function doStop() {
  shouldStop=true; curCmd=null; cmdQ=[];
  clog('⛔ Stopped.','lw'); setRunning(false);
}

function doReset() {
  doStop();
  C={x:0,y:0,z:0,yaw:0,flying:false,battery:100,led:'#58a6ff',flipAngle:0};
  trail=[]; missionDone=true; batDrain=0;
  cout.innerHTML=''; clog('↺ Reset.','li');
}

document.getElementById('runbtn').onclick=doRun;
document.getElementById('stopbtn').onclick=doStop;

// ═══════════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════════
function switchTab(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`[data-tab="${id}"]`).classList.add('on');
  if(id!=='console-panel'){unread=0;logBadge.textContent='🖥';}
  if(id==='sim-panel') setTimeout(resizeCvs,10);
  if(id==='editor-panel') setTimeout(()=>editor.refresh(),10);
}

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

// Keyboard shortcut
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();doRun();}
});

// ═══════════════════════════════════════════════
// EDITOR INIT
// ═══════════════════════════════════════════════
const editor = CodeMirror.fromTextArea(document.getElementById('code'),{
  mode:'python', theme:'dracula',
  lineNumbers:true, autoCloseBrackets:true, matchBrackets:true,
  indentUnit:4, tabSize:4, lineWrapping:false,
  extraKeys:{
    'Tab':cm=>cm.execCommand('indentMore'),
    'Shift-Tab':cm=>cm.execCommand('indentLess'),
    'Ctrl-Enter':()=>doRun(), 'Cmd-Enter':()=>doRun()
  }
});
editor.setValue(DEFAULT);
editor.setSize('100%','100%');

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
resizeCvs();
clog('🚁 DroneLab Pro ready','ls');
clog('  Use PySimverse API: from pysimverse import Drone','li');
clog('  Press ▶ RUN or Ctrl+Enter to fly','li');
requestAnimationFrame(loop);
</script>
